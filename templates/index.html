<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Messenger</title>
    <style>
        :root {
            --dark-blue: #020617;
            --liquid-glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
        }
        body {
            background: var(--dark-blue);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* Жидкое стекло */
        .glass-card {
            background: var(--liquid-glass);
            backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 40px;
            width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }
        h1 { font-size: 2rem; font-weight: 900; letter-spacing: -1px; margin-top: 0; }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .verified-badge {
            color: #3b82f6;
            margin-left: 5px;
            font-size: 1.2rem;
        }
        .search-results {
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>FLUX</h1>
        <div id="auth-ui">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn" onclick="register()">Создать аккаунт</button>
        </div>
        
        <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px;">
            <input type="text" id="search" placeholder="Поиск по нику..." oninput="searchUser()">
            <div id="results" class="search-results"></div>
        </div>
        
        <p style="margin-top: 20px; opacity: 0.5;">Основатель: bloody <span class="verified-badge">✔</span></p>
    </div>

    <script>
        async function register() {
            const nick = document.getElementById('nick').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nick, email, password })
            });
            const data = await res.json();
            alert(data.status === 'ok' ? 'Успех!' : data.message);
        }

        async function searchUser() {
            const q = document.getElementById('search').value;
            if(q.length < 2) return;
            const res = await fetch('/search_user?q=' + q);
            const users = await res.json();
            document.getElementById('results').innerHTML = users.map(u => 
                `<div>${u.nick} ${u.is_admin ? '<span class="verified-badge">✔</span>' : ''}</div>`
            ).join('');
        }
    </script>
</body>
</html>
