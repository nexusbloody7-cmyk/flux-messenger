<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Messenger | Liquid Glass</title>
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #007aff;
        }
        body {
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1e293b, transparent);
        }
        .container {
            background: var(--glass); backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 40px;
            width: 400px; padding: 40px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        h1 { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin: 0; }
        p.slogan { opacity: 0.5; font-size: 0.9rem; margin-bottom: 30px; }
        input {
            width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.2);
            border: 1px solid var(--border); border-radius: 15px; color: white; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 15px; background: var(--accent); border: none;
            border-radius: 15px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .verified { color: #007aff; margin-left: 5px; }
        #chat-ui { display: none; }
    </style>
</head>
<body>
    <div class="container" id="auth-ui">
        <h1>FLUX</h1>
        <p class="slogan">Будущее общение здесь!</p>
        <div id="reg-form">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn" onclick="auth('register')">Создать аккаунт</button>
            <p onclick="toggleAuth()" style="cursor:pointer; font-size: 0.8rem; margin-top: 15px;">Уже есть аккаунт? Войти</p>
        </div>
    </div>

    <div class="container" id="chat-ui" style="width: 90%; max-width: 800px; height: 80vh;">
        <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <h2 id="user-display"></h2>
            <input type="text" placeholder="Поиск по нику..." style="width: 200px; margin: 0; padding: 8px;">
        </div>
        <div id="msg-box" style="height: 60%; overflow-y: auto; text-align: left; padding: 20px;">
            </div>
        <div style="display:flex; gap: 10px;">
            <input type="text" id="msg-input" placeholder="Введите сообщение...">
            <button class="btn" style="width: 80px; margin: 0;">🚀</button>
        </div>
    </div>

    <script>
        let isLogin = false;
        function toggleAuth() {
            isLogin = !isLogin;
            document.querySelector('h1').innerText = isLogin ? 'LOG IN' : 'FLUX';
            document.getElementById('email').style.display = isLogin ? 'none' : 'block';
            document.querySelector('.btn').innerText = isLogin ? 'Войти в сеть' : 'Создать аккаунт';
        }

        async function auth(type) {
            const nick = document.getElementById('nick').value;
            const pass = document.getElementById('pass').value;
            const email = document.getElementById('email').value;
            
            const url = isLogin ? '/api/login' : '/api/register';
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nick, email, password: pass })
            });
            const data = await res.json();
            
            if(data.status === 'ok') {
                if(isLogin) {
                    document.getElementById('auth-ui').style.display = 'none';
                    document.getElementById('chat-ui').style.display = 'block';
                    document.getElementById('user-display').innerHTML = `${data.user.nick} ${data.user.is_admin ? '<span class="verified">✔</span>' : ''}`;
                } else { alert("Регистрация успешна! Теперь войдите."); toggleAuth(); }
            } else { alert("Ошибка входа/регистрации"); }
        }
    </script>
</body>
</html>
