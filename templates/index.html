<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Messenger | Liquid Glass</title>
    <style>
        :root {
            --bg-color: #050a18; /* Тот самый глубокий темно-синий */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #007aff;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 122, 255, 0.1) 0px, transparent 50%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Эффект жидкого стекла */
        .flux-container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px #00ff88;
        }

        .input-group {
            margin-top: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.07);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-blue);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px -5px rgba(0, 122, 255, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(0, 122, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="flux-container">
        <h1>FLUX</h1>
        <p style="opacity: 0.6; font-size: 0.9rem;"><span class="status-dot"></span> Система активна</p>
        
        <div class="input-group">
            <input type="text" placeholder="Никнейм">
            <input type="password" placeholder="Пароль">
            <button class="login-btn">Войти в сеть</button>
        </div>
    </div>
</body>
</html>
