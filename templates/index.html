<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Flux Pro Fixed</title>
    <style>
        :root {
            --bg: #030812;
            --panel: rgba(10, 25, 47, 0.9);
            --accent: #007AFF;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Фикс высоты для мобилок */
        html, body { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background: var(--bg); color: white;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; /* Запрещаем общий скролл */
        }

        /* Главный контейнер на весь экран */
        .app-container {
            display: flex;
            height: 100vh; /* Для ПК */
            height: -webkit-fill-available; /* Для iOS/Android */
            width: 100%;
        }

        /* Сайдбар */
        #sidebar { 
            width: 300px; 
            background: var(--panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            backdrop-filter: blur(20px);
            z-index: 100;
            transition: 0.3s;
        }

        /* Чат */
        #main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: radial-gradient(circle at top right, #0a192f, #030812);
            position: relative;
            min-width: 0;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            #sidebar {
                position: absolute;
                left: -300px; top: 0; bottom: 0;
            }
            #sidebar.open { left: 0; width: 80%; }
        }

        /* Шапка чата */
        .top-bar { 
            height: 60px;
            padding: 0 15px; 
            background: var(--panel); 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* ОБЛАСТЬ СООБЩЕНИЙ - теперь со скроллом */
        #msgs { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }

        /* ПОЛЕ ВВОДА - прижимаем намертво */
        .input-box { 
            padding: 10px 15px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* Для iPhone с челкой */
            background: var(--panel); 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        input { 
            flex: 1; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: 12px; 
            color: white; 
            font-size: 16px; 
            outline: none; 
        }

        .send-btn { 
            width: 45px; height: 45px; 
            border-radius: 12px; 
            background: var(--accent); 
            border: none; color: white; 
            display: flex; align-items: center; justify-content: center;
        }

        /* Пузыри сообщений */
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; }
        .my { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .other { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        .badge { width: 14px; height: 14px; background: var(--accent); border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; font-size: 8px; margin-left: 3px;}

        /* Скрываем бургер на ПК */
        .menu-btn { display: none; margin-right: 10px; background: none; border: none; color: white; font-size: 24px; }
        @media (max-width: 768px) { .menu-btn { display: block; } }
    </style>
</head>
<body>

<div id="auth" style="position:fixed; inset:0; background:var(--bg); z-index:3000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="width:100%; max-width:320px; text-align:center;">
        <h1 style="font-size:3rem; color:var(--accent); margin-bottom:20px;">FLUX</h1>
        <input type="email" id="l-email" placeholder="Email" style="width:100%; margin-bottom:10px; padding:12px; border-radius:10px; background:#111; border:1px solid var(--border); color:white;">
        <input type="password" id="l-pass" placeholder="Пароль" style="width:100%; margin-bottom:10px; padding:12px; border-radius:10px; background:#111; border:1px solid var(--border); color:white;">
        <button class="send-btn" style="width:100%; margin-top:10px" onclick="doAuth()">Войти</button>
    </div>
</div>

<div class="app-container">
    <div id="sidebar">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <b>Flux Чаты</b>
            <img id="my-mini-ava" src="" style="width:35px; height:35px; border-radius:8px; cursor:pointer" onclick="alert('Профиль скоро!')">
        </div>
        <div id="chat-list" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div id="main">
        <div class="top-bar">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div id="curr-chat-icon" style="width:35px; height:35px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:bold;">F</div>
            <div style="margin-left:12px">
                <div id="curr-chat-name" style="font-weight:bold; font-size:14px">Flux Community</div>
                <div style="font-size:10px; color:#4caf50;">онлайн</div>
            </div>
        </div>

        <div id="msgs"></div>

        <div class="input-box">
            <input type="text" id="m-text" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>
</div>

<script>
    let me = null;
    let currentChat = 'community';

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    async function doAuth() {
        const body = {
            action: 'login',
            email: document.getElementById('l-email').value,
            password: document.getElementById('l-pass').value
        };
        const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        const d = await r.json();
        if(d.status === 'ok') {
            me = d.user;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('my-mini-ava').src = me.avatar;
            init();
        } else { alert("Ошибка входа"); }
    }

    async function loadChats() {
        const r = await fetch('/api/chats');
        const chats = await r.json();
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        chats.forEach(c => {
            const el = document.createElement('div');
            el.style.padding = '15px';
            el.style.cursor = 'pointer';
            el.style.borderBottom = '1px solid rgba(255,255,255,0.03)';
            el.innerHTML = `<b># ${c.name}</b>`;
            el.onclick = () => { 
                currentChat = c.id; 
                document.getElementById('curr-chat-name').innerText = c.name;
                if(window.innerWidth <= 768) toggleSidebar();
                loadMsgs();
            };
            list.appendChild(el);
        });
    }

    async function loadMsgs() {
        const r = await fetch(`/api/messages?chat_id=${currentChat}`);
        const msgs = await r.json();
        const cont = document.getElementById('msgs');
        let html = '';
        msgs.forEach(m => {
            const isMe = m.sender === me.nick;
            html += `
                <div class="bubble ${isMe ? 'my' : 'other'}">
                    <div style="font-size:11px; font-weight:bold; color:#8ebfff; margin-bottom:3px">${m.sender} ${m.is_v ? '<span class="badge">✓</span>':''}</div>
                    <div>${m.text}</div>
                    <div style="font-size:9px; opacity:0.5; text-align:right; margin-top:3px">${m.time}</div>
                </div>`;
        });
        cont.innerHTML = html;
        cont.scrollTop = cont.scrollHeight;
    }

    async function send() {
        const t = document.getElementById('m-text');
        if(!t.value.trim()) return;
        await fetch('/api/messages', { method:'POST', headers:{'Content-Type':'application/json'}, 
            body: JSON.stringify({ chat_id: currentChat, sender: me.nick, text: t.value }) });
        t.value = '';
        loadMsgs();
    }

    function init() { loadChats(); loadMsgs(); setInterval(loadMsgs, 3000); }
</script>
</body>
</html>
