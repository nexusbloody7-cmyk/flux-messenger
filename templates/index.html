<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#020818">
<title>Flux Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#020818;--blue-500:#1e5fb8;--blue-400:#2979d4;--blue-300:#4a9cf8;
  --glass:rgba(41,121,212,.13);--text:#e8f4ff;--text2:rgba(200,228,255,.65);
  --muted:rgba(200,228,255,.35);--red:#ff4d6d;--green:#4dffb0;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--navy);overscroll-behavior:none;}
body{font-family:'DM Sans',sans-serif;color:var(--text);touch-action:manipulation;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.5;pointer-events:none;z-index:0;}
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.13;}
.o1{width:400px;height:400px;background:radial-gradient(circle,#1e5fb8,transparent);top:-150px;left:-100px;}
.o2{width:300px;height:300px;background:radial-gradient(circle,#0f3460,transparent);bottom:-80px;right:-80px;}
.o3{width:250px;height:250px;background:radial-gradient(circle,#2979d4,transparent);top:50%;left:50%;transform:translate(-50%,-50%);}
::-webkit-scrollbar{width:0;height:0;}

/* AUTH */
#auth-screen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 20px calc(20px + var(--safe-bot));background:radial-gradient(ellipse at 30% 20%,rgba(41,121,212,.15),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(15,52,96,.3),transparent 60%),var(--navy);overflow-y:auto;}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.auth-logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 28px rgba(41,121,212,.5);}
.auth-logo h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.5px;}
.auth-logo span{color:var(--blue-300);}
.auth-card{width:100%;max-width:400px;background:rgba(8,20,40,.75);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(74,156,248,.2);border-radius:24px;padding:28px 24px;box-shadow:0 0 60px rgba(41,121,212,.12);position:relative;overflow:hidden;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(74,156,248,.5),transparent);}
.auth-tabs{display:flex;gap:4px;margin-bottom:24px;background:rgba(0,0,0,.25);border-radius:14px;padding:4px;}
.auth-tab{flex:1;padding:10px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border-radius:10px;cursor:pointer;transition:all .2s;}
.auth-tab.active{background:rgba(41,121,212,.28);color:var(--text);}
.auth-form{display:none;flex-direction:column;gap:14px;}
.auth-form.show{display:flex;}
.inp-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.auth-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.15);border-radius:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
.auth-input:focus{border-color:rgba(74,156,248,.45);background:rgba(74,156,248,.07);}
.auth-btn{margin-top:6px;padding:16px;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 24px rgba(41,121,212,.4);}
.auth-btn:active{opacity:.9;}
.auth-btn:disabled{opacity:.6;}
.auth-err{padding:11px 14px;background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:12px;color:var(--red);font-size:13px;text-align:center;}

/* APP */
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10;padding-top:var(--safe-top);}
#app.hidden{display:none;}
#view-chats{display:flex;flex-direction:column;flex:1;min-height:0;}
#view-chat{display:none;flex-direction:column;flex:1;min-height:0;}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-shrink:0;background:rgba(5,13,31,.7);backdrop-filter:blur(24px);border-bottom:1px solid rgba(74,156,248,.09);height:58px;}
.top-bar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;flex:1;}
.top-bar-title span{color:var(--blue-300);}
.my-av{width:36px;height:36px;border-radius:50%;border:2px solid rgba(74,156,248,.35);overflow:hidden;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;position:relative;}
.my-av img{width:100%;height:100%;object-fit:cover;}
.my-av.online::after{content:'';position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid #050d1f;}
.tbar-btn{width:38px;height:38px;border:none;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.12);border-radius:12px;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;}
.tbar-btn:active{background:var(--glass);}

/* SEARCH */
.search-bar{padding:10px 14px;flex-shrink:0;}
.search-inner{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.12);border-radius:14px;padding:10px 14px;}
.search-inner input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;}
.search-inner input::placeholder{color:var(--muted);}

/* PILLS */
.filter-pills{display:flex;gap:8px;padding:0 14px 10px;overflow-x:auto;flex-shrink:0;}
.filter-pills::-webkit-scrollbar{display:none;}
.pill{padding:7px 16px;border-radius:20px;border:1px solid rgba(74,156,248,.15);background:rgba(255,255,255,.04);color:var(--muted);font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;flex-shrink:0;}
.pill.active{background:rgba(41,121,212,.22);border-color:rgba(74,156,248,.35);color:var(--blue-300);font-weight:600;}

/* CHAT LIST */
.chat-list{flex:1;overflow-y:auto;padding:0 10px 8px;-webkit-overflow-scrolling:touch;}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:16px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;}
.chat-item:active{background:var(--glass);}
.chat-item.active-chat{background:rgba(41,121,212,.18);border-color:rgba(74,156,248,.2);}
.ci-av{width:50px;height:50px;border-radius:16px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;position:relative;}
.ci-av.round{border-radius:50%;}
.ci-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
.ci-prev{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.ci-time{font-size:11px;color:var(--muted);}
.vbadge{color:var(--blue-300);font-size:13px;flex-shrink:0;}

/* FAB */
.fab{position:absolute;right:16px;bottom:calc(64px + 16px + var(--safe-bot));width:54px;height:54px;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));border-radius:18px;border:none;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 4px 24px rgba(41,121,212,.5);z-index:5;}
.fab:active{transform:scale(.93);}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:rgba(5,13,31,.75);backdrop-filter:blur(32px);border-top:1px solid rgba(74,156,248,.1);padding-bottom:var(--safe-bot);flex-shrink:0;height:calc(64px + var(--safe-bot));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--muted);cursor:pointer;padding:6px 4px;font-size:11px;font-weight:500;}
.nav-item.active{color:var(--blue-300);}
.nav-item .ni{font-size:22px;line-height:1;}

/* CHAT VIEW */
.chat-header{display:flex;align-items:center;gap:10px;padding:10px 14px;flex-shrink:0;background:rgba(5,13,31,.7);backdrop-filter:blur(24px);border-bottom:1px solid rgba(74,156,248,.09);height:58px;}
.back-btn{width:36px;height:36px;border:none;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.12);border-radius:12px;color:var(--text2);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.ch-av{width:36px;height:36px;border-radius:12px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;}
.ch-av.round{border-radius:50%;}
.ch-av img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
.ch-sub{font-size:11px;color:var(--muted);margin-top:1px;}

/* MESSAGES */
.messages-area{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch;}
.date-sep{display:flex;align-items:center;gap:10px;padding:10px 0;color:var(--muted);font-size:11px;font-weight:600;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:rgba(74,156,248,.1);}
.sys-msg{text-align:center;padding:5px 14px;background:rgba(41,121,212,.07);border:1px solid rgba(74,156,248,.1);border-radius:20px;font-size:11px;color:var(--muted);margin:3px auto;max-width:85%;}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeUp .18s ease;}
.msg-row.own{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.msg-av img{width:100%;height:100%;object-fit:cover;}
.msg-bubble{max-width:72%;padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg-row:not(.own) .msg-bubble{background:rgba(13,31,63,.75);border:1px solid rgba(74,156,248,.12);border-bottom-left-radius:4px;}
.msg-row.own .msg-bubble{background:linear-gradient(135deg,rgba(30,95,184,.75),rgba(41,121,212,.6));border:1px solid rgba(74,156,248,.22);border-bottom-right-radius:4px;}
.msg-sender{font-size:11px;font-weight:700;color:var(--blue-300);margin-bottom:3px;}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px;text-align:right;}
.msg-row:not(.own) .msg-time{text-align:left;}

/* INPUT */
.input-area{padding:10px 12px;padding-bottom:calc(10px + var(--safe-bot));background:rgba(5,13,31,.6);backdrop-filter:blur(24px);border-top:1px solid rgba(74,156,248,.09);flex-shrink:0;}
.emoji-strip{display:flex;gap:2px;padding-bottom:8px;overflow-x:auto;}
.emoji-strip::-webkit-scrollbar{display:none;}
.em-btn{background:none;border:none;font-size:22px;padding:4px 6px;cursor:pointer;flex-shrink:0;}
.input-row{display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.15);border-radius:18px;padding:10px 14px;}
.input-row:focus-within{border-color:rgba(74,156,248,.4);background:rgba(74,156,248,.06);}
.msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.4;resize:none;max-height:100px;}
.msg-input::placeholder{color:var(--muted);}
.send-btn{width:38px;height:38px;border:none;flex-shrink:0;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));border-radius:12px;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.send-btn:active{transform:scale(.92);}
.readonly-banner{padding:14px;padding-bottom:calc(14px + var(--safe-bot));text-align:center;background:rgba(41,121,212,.07);border-top:1px solid rgba(74,156,248,.1);color:var(--muted);font-size:13px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(2,8,24,.75);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal{width:100%;max-width:500px;background:rgba(8,20,40,.92);backdrop-filter:blur(40px);border:1px solid rgba(74,156,248,.2);border-radius:24px 24px 0 0;padding:16px 20px calc(20px + var(--safe-bot));max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 18px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.modal-close{width:32px;height:32px;border:none;background:rgba(255,255,255,.08);border-radius:10px;color:var(--text2);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.modal-form{display:flex;flex-direction:column;gap:14px;}
.modal-input{width:100%;padding:14px;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.15);border-radius:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
.modal-input:focus{border-color:rgba(74,156,248,.4);}
.modal-btn{padding:14px;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.modal-btn:active{opacity:.9;}
.modal-btn.secondary{background:rgba(255,255,255,.07);color:var(--text2);border:1px solid rgba(74,156,248,.15);}
.modal-btn.danger{background:linear-gradient(135deg,#c0392b,#e74c3c);}
.modal-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}

/* PROFILE */
.ps-av{width:88px;height:88px;border-radius:50%;margin:0 auto 14px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;border:3px solid rgba(74,156,248,.3);}
.ps-av img{width:100%;height:100%;object-fit:cover;}
.ps-name{text-align:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px;}
.ps-handle{text-align:center;color:var(--muted);font-size:13px;margin-top:2px;}
.ps-role{display:inline-flex;margin:8px auto 0;padding:4px 14px;background:rgba(41,121,212,.15);border:1px solid rgba(74,156,248,.2);border-radius:20px;font-size:11px;font-weight:700;color:var(--blue-300);}
.flux-id-box{margin-top:10px;padding:10px 14px;background:rgba(41,121,212,.08);border:1px solid rgba(74,156,248,.15);border-radius:12px;text-align:center;}
.flux-id-label{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.flux-id-value{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--blue-300);}
.ps-stats{display:flex;gap:1px;background:rgba(74,156,248,.08);border:1px solid rgba(74,156,248,.1);border-radius:16px;overflow:hidden;margin-top:14px;}
.ps-stat{flex:1;padding:14px 8px;text-align:center;background:rgba(255,255,255,.02);}
.ps-stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.ps-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.ps-actions{display:flex;gap:8px;margin-top:14px;}
.ps-act-btn{flex:1;padding:13px;border-radius:14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;}
.ps-act-btn.primary{background:linear-gradient(135deg,var(--blue-500),var(--blue-400));color:#fff;}
.ps-act-btn.secondary{background:rgba(255,255,255,.07);border:1px solid rgba(74,156,248,.15);color:var(--text2);}
.online-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}
.dot.off{background:var(--muted);}

/* USER LIST */
.ul-item{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:14px;cursor:pointer;}
.ul-item:active{background:var(--glass);}
.ul-av{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;overflow:hidden;}
.ul-av img{width:100%;height:100%;object-fit:cover;}
.ul-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:4px;}
.ul-handle{font-size:12px;color:var(--muted);margin-top:1px;}

/* ADMIN GRID */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.admin-card{padding:16px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(74,156,248,.1);border-radius:14px;text-align:center;cursor:pointer;}
.admin-card:active{background:rgba(41,121,212,.12);}
.ac-icon{font-size:26px;margin-bottom:6px;}
.ac-label{font-size:12px;font-weight:600;color:var(--text2);}

/* NOTIF */
.notif{position:fixed;top:calc(16px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-120%);z-index:500;background:rgba(8,20,40,.92);backdrop-filter:blur(20px);border:1px solid rgba(74,156,248,.2);border-radius:16px;padding:13px 18px;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;}
.notif.show{transform:translateX(-50%) translateY(0);}

.g0{background:linear-gradient(135deg,#1e5fb8,#4a9cf8);}
.g1{background:linear-gradient(135deg,#0f3460,#2979d4);}
.g2{background:linear-gradient(135deg,#1a237e,#3949ab);}
.g3{background:linear-gradient(135deg,#004d40,#00897b);}
.g4{background:linear-gradient(135deg,#bf360c,#e64a19);}
.g5{background:linear-gradient(135deg,#4a148c,#7b1fa2);}
.g6{background:linear-gradient(135deg,#1b5e20,#388e3c);}
.g7{background:linear-gradient(135deg,#e65100,#f57c00);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">
    <div class="auth-logo-icon">⚡</div>
    <h1>Flux <span>Messenger</span></h1>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" id="tab-reg" onclick="switchTab('reg')">Регистрация</button>
    </div>

    <!-- LOGIN -->
    <div id="form-login" class="auth-form show">
      <div><div class="inp-lbl">Email</div><input class="auth-input" id="l-email" type="email" placeholder="you@example.com"></div>
      <div><div class="inp-lbl">Пароль</div><input class="auth-input" id="l-pass" type="password" placeholder="••••••••"></div>
      <div id="l-err" class="auth-err" style="display:none;"></div>
      <button class="auth-btn" id="l-btn" onclick="doLogin()">Войти ⚡</button>
    </div>

    <!-- REGISTER -->
    <div id="form-reg" class="auth-form">
      <div><div class="inp-lbl">Email</div><input class="auth-input" id="r-email" type="email" placeholder="you@example.com"></div>
      <div><div class="inp-lbl">Ник</div><input class="auth-input" id="r-nick" type="text" placeholder="Ваше имя"></div>
      <div><div class="inp-lbl">Username (@)</div><input class="auth-input" id="r-user" type="text" placeholder="username"></div>

<div class="modal-overlay hidden" id="modal-ov" onclick="modalBg(event)">
  <div class="modal"><div class="modal-handle"></div><div id="modal-body"></div></div>
</div>

<!-- NOTIF -->
<div class="notif" id="notif"><span id="n-ic"></span><span id="n-tx"></span></div>

<script>
// ═══════ STATE ═══════
var me=null, allChats=[], allUsers={}, activeChat=null, chatFilter='all', rfTimer=null, hbTimer=null, sending=false, chatMsgs=[], lastTs=0;

// ═══════ API ═══════
async function api(method, path, body) {
  try {
    var opts = {method:method, credentials:'include', headers:{'Content-Type':'application/json'}};
    if(body) opts.body = JSON.stringify(body);
    var res = await fetch('/api'+path, opts);
    var data = await res.json();
    if(!res.ok) return {error: data.error||'Ошибка'};
    return data;
  } catch(e) { return {error:'Нет соединения'}; }
}

// ═══════ UTILS ═══════
function esc(s){return s?(s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function grad(s){var h=0;for(var c of (s||''))h=(h*31+c.charCodeAt(0))&0xff;return 'g'+(h%8);}
function fmtTime(ts){
  if(!ts)return'';
  var d=new Date(ts),n=new Date();
  if(d.toDateString()===n.toDateString())return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}
function fmtMsg(text){
  if(!text)return'';
  var t=esc(text);
  t=t.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:var(--blue-300);">$1</a>');
  t=t.replace(/@(\w+)/g,'<strong style="color:var(--blue-300);">@$1</strong>');
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\n/g,'<br>');
  return t;
}
function avHtml(u,size,r){
  size=size||36; r=r||'50%';
  if(!u)return '<div style="width:'+size+'px;height:'+size+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(size*.4|0)+'px;" class="g0">?</div>';
  if(u.avatar)return '<img src="'+u.avatar+'" style="width:'+size+'px;height:'+size+'px;border-radius:'+r+';object-fit:cover;">';
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(size*.4|0)+'px;" class="'+grad(u.id)+'">'+(u.nick||'?')[0].toUpperCase()+'</div>';
}
function chatName(c){
  if(c.type==='dm'){var o=allUsers[c.members.find(function(m){return m!==me.id;})];return o?o.nick:'Пользователь';}
  return c.name||'';
}
function chatAv(c,size,r){
  if(c.type==='dm'){var oId=c.members.find(function(m){return m!==me.id;});return avHtml(allUsers[oId],size,'50%');}
  if(c.avatar)return '<img src="'+c.avatar+'" style="width:'+size+'px;height:'+size+'px;border-radius:'+r+';object-fit:cover;">';
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-size:'+(size*.44|0)+'px;" class="'+grad(c.id)+'">'+(c.icon||(c.name||'?')[0])+'</div>';
}
function isCreator(id){var u=allUsers[id];return u&&u.role==='creator';}
function isChatAdmin(cid){
  var c=allChats.find(function(x){return x.id===cid;});
  if(!c)return false;
  return me.role==='creator'||me.role==='admin'||(c.admins&&c.admins.indexOf(me.id)>-1);
}
function isOnline(u){return !!(u&&u.online&&(Date.now()-u.last_seen<15000));}

var ntTimer=null;
function notify(ic,tx){
  document.getElementById('n-ic').textContent=ic;
  document.getElementById('n-tx').textContent=tx;
  var el=document.getElementById('notif');el.classList.add('show');
  clearTimeout(ntTimer);ntTimer=setTimeout(function(){el.classList.remove('show');},3000);
}

// ═══════ AUTH ═══════
function switchTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-reg').classList.toggle('active',t==='reg');
  document.getElementById('form-login').classList.toggle('show',t==='login');
  document.getElementById('form-reg').classList.toggle('show',t==='reg');
}

async function doLogin(){
  var email=document.getElementById('l-email').value.trim().toLowerCase();
  var pass=document.getElementById('l-pass').value;
  var err=document.getElementById('l-err'); err.style.display='none';
  if(!email||!pass){err.textContent='Заполните все поля';err.style.display='block';return;}
  var btn=document.getElementById('l-btn');btn.disabled=true;btn.textContent='Входим...';
  var res=await api('POST','/login',{email:email,password:pass});
  btn.disabled=false;btn.textContent='Войти ⚡';
  if(res.error){err.textContent=res.error;err.style.display='block';return;}
  me=res.user; enterApp();
}

async function doRegister(){
  var email=document.getElementById('r-email').value.trim().toLowerCase();
  var nick=document.getElementById('r-nick').value.trim();
  var username=document.getElementById('r-user').value.trim().toLowerCase();
  var pass=document.getElementById('r-pass').value;
  var err=document.getElementById('r-err'); err.style.display='none';
  var btn=document.getElementById('r-btn');btn.disabled=true;btn.textContent='Создаём...';
  var res=await api('POST','/register',{email:email,nick:nick,username:username,password:pass});
  btn.disabled=false;btn.textContent='⚡ Зарегистрировать Flux ID';
  if(res.error){err.textContent=res.error;err.style.display='block';return;}
  me=res.user; enterApp();
}

async function doLogout(){
  await api('POST','/logout');
  me=null;activeChat=null;clearInterval(rfTimer);clearInterval(hbTimer);
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').classList.add('hidden');
  closeModal();
}

// ═══════ APP ENTER ═══════
async function enterApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').classList.remove('hidden');
  renderMyAv();
  await loadAll();
  renderChatList();
  startTimers();
  notify('⚡','Добро пожаловать, '+me.nick+'!');
}

async function loadAll(){
  var r1=await api('GET','/chats');
  var r2=await api('GET','/users');
  if(!r1.error)allChats=r1;
  if(!r2.error){allUsers={};r2.forEach(function(u){allUsers[u.id]=u;});}
  allUsers[me.id]=me;
}

function startTimers(){
  clearInterval(rfTimer);clearInterval(hbTimer);
  hbTimer=setInterval(function(){api('POST','/users/heartbeat');},8000);
  rfTimer=setInterval(async function(){
    await loadAll();
    renderChatList(true);
    if(activeChat)await pollMsgs();
  },2500);
}

function renderMyAv(){
  var el=document.getElementById('my-av');
  el.innerHTML=avHtml(me,36,'50%');
}

// ═══════ CHAT LIST ═══════
function renderChatList(silent){
  renderMyAv();
  var q=(document.getElementById('search-inp')||{}).value||'';q=q.trim().toLowerCase();
  var chats=allChats.filter(function(c){return c.members&&c.members.indexOf(me.id)>-1;});
  if(chatFilter!=='all')chats=chats.filter(function(c){return c.type===chatFilter;});
  if(q)chats=chats.filter(function(c){return chatName(c).toLowerCase().indexOf(q)>-1;});
  chats.sort(function(a,b){return (b.pinned?1:0)-(a.pinned?1:0);});
  var list=document.getElementById('chat-list');
  if(!chats.length){list.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;">Нет чатов<br><span style="font-size:32px;">💬</span></div>';return;}
  list.innerHTML=chats.map(function(c){
    var name=chatName(c);
    var av=chatAv(c,50,c.type==='dm'?'50%':'16px');
    var prefix=c.pinned?'⚡ ':c.type==='channel'?'📢 ':'';
    var otherC=c.type==='dm'&&isCreator(c.members.find(function(m){return m!==me.id;}));
    return '<div class="chat-item'+(activeChat===c.id?' active-chat':'')+'" onclick="openChat(\''+c.id+'\')">'
      +'<div class="ci-av'+(c.type==='dm'?' round':'')+'">'+av+'</div>'
      +'<div class="ci-info">'
      +'<div class="ci-name">'+(prefix?'<span>'+prefix+'</span>':'')+esc(name)+(otherC?'<span class="vbadge" style="font-size:12px;">✓</span>':'')+'</div>'
      +'<div class="ci-prev">'+(c.type==='dm'?'Нажмите для открытия':(c.members.length+' участников'))+'</div>'
      +'</div></div>';
  }).join('');
}

function filterPill(btn,f){
  chatFilter=f;
  document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  renderChatList();
}

// ═══════ OPEN CHAT ═══════
async function openChat(cid){
  var c=allChats.find(function(x){return x.id===cid;});
  if(!c)return;
  activeChat=cid;chatMsgs=[];lastTs=0;
  document.getElementById('view-chats').style.display='none';
  var vc=document.getElementById('view-chat');vc.style.display='flex';vc.style.flexDirection='column';
  var chav=document.getElementById('chav');
  if(c.type==='dm'){
    var oId=c.members.find(function(m){return m!==me.id;});
    var o=allUsers[oId];
    chav.className='ch-av round';chav.innerHTML=avHtml(o,36,'50%');
    document.getElementById('chname').innerHTML=esc(o?o.nick:'?')+(isCreator(oId)?'<span class="vbadge" style="font-size:12px;margin-left:3px;">✓</span>':'');
    var on=isOnline(o);
    document.getElementById('chsub').innerHTML='<span class="dot '+(on?'on':'off')+'" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle;"></span>'+(on?'В сети':'Не в сети');
  } else {
    chav.className='ch-av';chav.innerHTML=chatAv(c,36,'12px');
    document.getElementById('chname').textContent=(c.type==='channel'?'📢 ':'')+c.name;
    document.getElementById('chsub').textContent=c.members.length+' участников';
  }
  var canAdm=isChatAdmin(cid);
  document.getElementById('adm-btn').style.display=canAdm?'flex':'none';
  var canWrite=c.type!=='channel'||canAdm;
  document.getElementById('write-wrap').style.display=canWrite?'block':'none';
  document.getElementById('ro-wrap').style.display=canWrite?'none':'block';
  renderChatList(true);
  await loadMsgs();
}

function goBack(){
  activeChat=null;chatMsgs=[];lastTs=0;
  document.getElementById('view-chat').style.display='none';
  document.getElementById('view-chats').style.display='flex';
  renderChatList();
}

// ═══════ MESSAGES ═══════
async function loadMsgs(){
  if(!activeChat)return;
  var res=await api('GET','/chats/'+activeChat+'/messages?since=0');
  if(res.error)return;
  chatMsgs=res;
  if(res.length)lastTs=res[res.length-1].timestamp;
  renderMsgs();
}

async function pollMsgs(){
  if(!activeChat)return;
  var res=await api('GET','/chats/'+activeChat+'/messages?since=0');
  if(res.error)return;
  if(res.length!==chatMsgs.length){chatMsgs=res;if(res.length)lastTs=res[res.length-1].timestamp;renderMsgs();}
}

function renderMsgs(){
  var area=document.getElementById('msgs');
  var atBot=area.scrollHeight-area.scrollTop-area.clientHeight<80;
  var html='';var lastDate='';
  chatMsgs.forEach(function(m){
    var d=new Date(m.timestamp);
    var ds=d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
    if(ds!==lastDate){html+='<div class="date-sep">'+ds+'</div>';lastDate=ds;}
    if(m.system){html+='<div class="sys-msg">'+esc(m.text)+'</div>';return;}
    var own=m.sender_id===me.id;
    var sender=allUsers[m.sender_id]||{id:m.sender_id,nick:m.sender_nick||'?',avatar:null};
    var c=allChats.find(function(x){return x.id===activeChat;});
    var showSender=!own&&c&&c.type!=='dm';
    html+='<div class="msg-row'+(own?' own':'')+'">'
      +(!own?'<div class="msg-av" onclick="showUserProfile(\''+m.sender_id+'\')">'+avHtml(sender,28,'50%')+'</div>':'')
      +'<div class="msg-bubble">'
      +(showSender?'<div class="msg-sender">'+esc(sender.nick)+(isCreator(m.sender_id)?'<span class="vbadge" style="font-size:10px;">✓</span>':'')+'</div>':'')
      +'<div>'+fmtMsg(m.text)+'</div>'
      +'<div class="msg-time">'+fmtTime(m.timestamp)+'</div>'
      +'</div>'
      +(own?'<div class="msg-av">'+avHtml(me,28,'50%')+'</div>':'')
      +'</div>';
  });
  area.innerHTML=html||'<div style="text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;line-height:1.8;">Нет сообщений<br><span style="font-size:32px;">👋</span></div>';
  if(atBot||chatMsgs.length===0)area.scrollTop=area.scrollHeight;
}

async function sendMsg(){
  var inp=document.getElementById('msg-inp');
  var text=inp.value.trim();
  if(!text||!activeChat||sending)return;
  sending=true;
  var res=await api('POST','/chats/'+activeChat+'/messages',{text:text});
  sending=false;inp.value='';inp.style.height='auto';
  if(res.error){notify('❌',res.error);return;}
  if(res.command){notify('✅','Команда выполнена');await loadAll();await loadMsgs();renderChatList(true);return;}
  chatMsgs.push(res);lastTs=res.timestamp;renderMsgs();
}

function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function resizeInp(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function addEmoji(e){var i=document.getElementById('msg-inp');i.value+=e;i.focus();}

// ═══════ CREATE CHATS ═══════
function showNewDM(){
  var others=Object.values(allUsers).filter(function(u){return u.id!==me.id;});
  var html='<div class="modal-header"><div class="modal-title">💬 Новое ЛС</div><button class="modal-close" onclick="closeModal()">✕</button></div>';
  if(!others.length){html+='<p style="text-align:center;color:var(--muted);padding:20px 0;">Нет пользователей</p>';}
  html+=others.map(function(u){
    return '<div class="ul-item" onclick="startDM(\''+u.id+'\')"><div class="ul-av">'+avHtml(u,44,'50%')+'</div><div><div class="ul-name">'+esc(u.nick)+(u.role==='creator'?'<span class="vbadge" style="font-size:11px;">✓</span>':'')+'</div><div class="ul-handle">@'+u.username+'</div></div></div>';
  }).join('');
  showModal(html);
}

async function startDM(uid){
  closeModal();
  var res=await api('POST','/chats/dm',{user_id:uid});
  if(res.error){notify('❌',res.error);return;}
  await loadAll();renderChatList();openChat(res.id);
}

function showFabMenu(){
  showModal('<div class="modal-header"><div class="modal-title">✨ Создать</div><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div style="display:flex;flex-direction:column;gap:10px;">'
    +'<button class="modal-btn secondary" onclick="closeModal();showNewDM()">💬 Личное сообщение</button>'
    +'<button class="modal-btn secondary" onclick="closeModal();showCreateGroup()">👥 Новая группа</button>'
    +'<button class="modal-btn secondary" onclick="closeModal();showCreateChannel()">📢 Новый канал</button>'
    +'</div>');
}

function showCreateGroup(){
  showModal('<div class="modal-header"><div class="modal-title">👥 Новая группа</div><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-form"><div><div class="modal-lbl">Название</div><input class="modal-input" id="gn" placeholder="Название группы..."></div>'
    +'<div><div class="modal-lbl">Иконка</div><input class="modal-input" id="gi" placeholder="👥" maxlength="2"></div>'
    +'<button class="modal-btn" onclick="createGroup()">Создать группу ✨</button></div>');
}

async function createGroup(){
  var name=document.getElementById('gn').value.trim();
  var icon=document.getElementById('gi').value.trim()||'👥';
  if(!name){notify('❌','Укажи название');return;}
  var res=await api('POST','/chats',{type:'group',name:name,icon:icon});
  if(res.error){notify('❌',res.error);return;}
  closeModal();await loadAll();renderChatList();openChat(res.id);notify('✅','Группа создана!');
}

function showCreateChannel(){
  showModal('<div class="modal-header"><div class="modal-title">📢 Новый канал</div><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-form"><div><div class="modal-lbl">Название</div><input class="modal-input" id="cn" placeholder="Название канала..."></div>'
    +'<button class="modal-btn" onclick="createChannel()">Создать канал 📢</button></div>');
}

async function createChannel(){
  var name=document.getElementById('cn').value.trim();
  if(!name){notify('❌','Укажи название');return;}
  var res=await api('POST','/chats',{type:'channel',name:name});
  if(res.error){notify('❌',res.error);return;}
  closeModal();await loadAll();renderChatList();openChat(res.id);notify('✅','Канал создан!');
}

// ═══════ PROFILES ═══════
function openMyProfile(){showUserProfile(me.id);}

async function showUserProfile(uid){
  var res=await api('GET','/users/'+uid);
  var u=res.error?(allUsers[uid]||me):res;
  if(!res.error)allUsers[uid]=u;
  var rl={creator:'👑 Создатель',admin:'🛡️ Администратор',user:'👤 Пользователь'};
  var on=isOnline(u);
  var actBtns='';
  if(u.id===me.id){
    actBtns='<button class="ps-act-btn secondary" onclick="closeModal();showEditProfile()">✏️ Редактировать</button>'
           +'<button class="ps-act-btn secondary" onclick="doLogout()">🚪 Выйти</button>';
  } else {
    actBtns='<button class="ps-act-btn primary" onclick="closeModal();startDM(\''+u.id+'\')">✉️ Написать</button>';
  }
  var fluxBlock=u.flux_id?'<div class="flux-id-box"><div class="flux-id-label">Flux ID</div><div class="flux-id-value">⚡ '+esc(u.flux_id)+'</div></div>':'';
  var services=(u.linked_services||[]).length?'<div style="margin-top:10px;">'+(u.linked_services||[]).map(function(s){return '<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(74,156,248,.1);border-radius:10px;margin-bottom:6px;"><span style="font-size:18px;">'+svcIcon(s.service)+'</span><div><div style="font-size:12px;font-weight:600;">'+esc(s.service)+'</div><div style="font-size:11px;color:var(--muted);">'+esc(s.value)+'</div></div></div>';}).join('')+'</div>':'';
  var linkBtn=u.id===me.id?'<button class="modal-btn secondary" style="margin-top:8px;" onclick="closeModal();showLinkService()">🔗 Привязать сервис</button>':'';
  var adminSec='';
  if((me.role==='admin'||me.role==='creator')&&u.id!==me.id&&u.role!=='creator'){
    adminSec='<div style="border-top:1px solid rgba(74,156,248,.1);margin-top:14px;padding-top:14px;">'
      +'<div class="modal-lbl" style="margin-bottom:8px;">Управление</div>'
      +'<div style="display:flex;flex-direction:column;gap:8px;">'
      +'<button class="modal-btn secondary" onclick="adminAct(\''+u.id+'\',\''+(u.banned?'unban':'ban')+'\')">'+(u.banned?'✅ Разбанить':'🔨 Заблокировать')+'</button>'
      +'<button class="modal-btn secondary" onclick="adminAct(\''+u.id+'\',\''+(u.muted?'unmute':'mute')+'\')">'+(u.muted?'🔊 Размьютить':'🔇 Замьютить')+'</button>'
      +(me.role==='creator'?'<button class="modal-btn secondary" onclick="closeModal();showGiveRole(\''+u.id+'\')">👑 Назначить роль</button>':'')
      +'</div></div>';
  }
  showModal('<div style="padding:0 4px;">'
    +'<div class="ps-av">'+avHtml(u,88,'50%')+'</div>'
    +'<div class="ps-name">'+esc(u.nick)+(u.role==='creator'?'<span class="vbadge">✓</span>':'')+'</div>'
    +'<div class="ps-handle">@'+u.username+'</div>'
    +'<div style="text-align:center;"><span class="ps-role">'+(rl[u.role]||'Пользователь')+'</span></div>'
    +fluxBlock
    +'<div class="online-row" style="justify-content:center;margin-top:10px;"><span class="dot '+(on?'on':'off')+'"></span><span>'+(on?'В сети':'Был(а) '+fmtTime(u.last_seen))+'</span></div>'
    +'<div class="ps-actions">'+actBtns+'</div>'
    +linkBtn+services+adminSec
    +'</div>');
}

function svcIcon(s){var m={telegram:'✈️',instagram:'📸',youtube:'▶️',tiktok:'🎵',twitter:'🐦',discord:'💬',github:'💻',vk:'💙',twitch:'🎮',spotify:'🎧'};return m[s.toLowerCase()]||'🔗';}

async function adminAct(uid,action){
  var res=await api('POST','/admin/users/'+uid+'/action',{action:action});
  if(res.error){notify('❌',res.error);return;}
  await loadAll();notify('✅','Готово');closeModal();showUserProfile(uid);
}

function showGiveRole(uid){
  var u=allUsers[uid]||{};
  showModal('<div class="modal-header"><div class="modal-title">👑 Назначить роль</div><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div style="color:var(--muted);font-size:13px;margin-bottom:14px;">Для: <strong style="color:var(--text);">'+esc(u.nick||uid)+'</strong></div>'
    +'<div style="display:flex;flex-direction:column;gap:8px;">'
    +'<button class="modal-btn secondary" onclick="giveRole(\''+uid+'\',\'user\')">👤 Пользователь</button>'
    +'<button class="modal-btn" onclick="giveRole(\''+uid+'\',\'admin\')">🛡️ Администратор</button>'
    +(me.role==='creator'?'<button class="modal-btn danger" onclick="giveRole(\''+uid+'\',\'creator\')">👑 Создатель</button>':'')
    +'</div>');
}

async function giveRole(uid,role){
  var res=await api('POST','/admin/users/'+uid+'/action',{action:'give_role',role:role});
  if(res.error){notify('❌',res.error);return;}
  await loadAll();closeModal();notify('✅','Роль назначена');
}

function showLinkService(){
  var svcs=['Telegram','Instagram','YouTube','TikTok','Twitter','Discord','GitHub','VK','Twitch','Spotify'];
  var cur=me.linked_services||[];
  showModal('<div class="modal-header"><div class="modal-title">🔗 Привязать сервис</div><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-form">'
    +'<div><div class="modal-lbl">Сервис</div><select class="modal-input" id="ls-svc" style="background:rgba(255,255,255,.06);color:var(--text);">'+svcs.map(function(s){return '<option value="'+s+'" style="background:#0d1f3f;">'+svcIcon(s.toLowerCase())+' '+s+'</option>';}).join('')+'</select></div>'
    +'<div><div class="modal-lbl">Ссылка или никнейм</div><input class="modal-input" id="ls-val" placeholder="https://... или @username"></div>'
    +'<button class="modal-btn" onclick="doLinkSvc()">Привязать ✅</button>'
    +(cur.length?'<div style="border-top:1px solid rgba(74,156,248,.1);padding-top:14px;"><div class="modal-lbl" style="margin-bottom:8px;">Привязанные</div>'+cur.map(function(s){return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:10px;margin-bottom:6px;"><span>'+svcIcon(s.service)+' '+esc(s.service)+'</span><button onclick="doUnlinkSvc(\''+s.service+'\')" style="background:rgba(255,77,109,.15);border:1px solid rgba(255,77,109,.3);color:var(--red);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;">Удалить</button></div>';}).join('')+'</div>':'')
    +'</div>');
}

async function doLinkSvc(){
  var svc=document.getElementById('ls-svc').value;
  var val=document.getElementById('ls-val').value.trim();
  if(!val){notify('❌','Укажи ссылку');return;}
  var res=await api('POST','/users/me/link-service',{service:svc,value:val});
  if(res.error){notify('❌',res.error);return;}
  me=Object.assign(me,{linked_services:res.user.linked_services});
  allUsers[me.id]=me;closeModal();notify('✅',svc+' привязан!');
}

async function doUnlinkSvc(svc){
  var res=await api('POST','/users/me/unlink-service',{service:svc});
  if(res.error){notify('❌',res.error);return;}
  me=Object.assign(me,{linked_services:res.user.linked_services});
  allUsers[me.id]=me;closeModal();notify('✅','Сервис удалён');
}

function showEditProfile(){
  showModal('<div class="modal-header"><div class="modal-title">✏️ Редактировать</div><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-form">'
    +'<div style="text-align:center;"><div id="ep-av" style="width:80px;height:80px;border-radius:50%;margin:0 auto 10px;overflow:hidden;border:3px solid rgba(74,156,248,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;" onclick="document.getElementById(\'av-file\').click()">'+avHtml(me,80,'50%')+'</div>'
    +'<input type="file" id="av-file" accept="image/*" style="display:none" onchange="previewAv(event)">'
    +'<div style="font-size:12px;color:var(--muted);">Нажми для смены фото</div></div>'
    +'<div><div class="modal-lbl">Ник</div><input class="modal-input" id="ep-nick" value="'+esc(me.nick)+'"></div>'
    +'<div><div class="modal-lbl">Username</div><input class="modal-input" id="ep-user" value="'+esc(me.username)+'"></div>'
    +'<button class="modal-btn" onclick="saveProfile()">Сохранить ✅</button>'
    +'</div>');
}

function previewAv(e){
  var file=e.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){var el=document.getElementById('ep-av');el.innerHTML='<img src="'+ev.target.result+'" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">';el.dataset.av=ev.target.result;};
  r.readAsDataURL(file);
}

async function saveProfile(){
  var nick=document.getElementById('ep-nick').value.trim();
  var username=document.getElementById('ep-user').value.trim().toLowerCase();
  var avEl=document.getElementById('ep-av');
  var avatar=avEl.dataset.av||me.avatar;
  if(!nick||!username){notify('❌','Заполни поля');return;}
  var res=await api('PUT','/users/me/profile',{nick:nick,username:username,avatar:avatar});
  if(res.error){notify('❌',res.error);return;}
  me=Object.assign(me,res);allUsers[me.id]=me;closeModal();renderMyAv();renderChatList();notify('✅','Профиль обновлён!');
}

// ═══════ CHAT INFO/ADMIN ═══════
function showChatInfo(){
  if(!activeChat)return;
  var c=allChats.find(function(x){return x.id===activeChat;});
  if(!c)return;
  if(c.type==='dm'){showUserProfile(c.members.find(function(m){return m!==me.id;}));return;}
  var canAdm=isChatAdmin(activeChat);
  showModal('<div style="padding:0 4px;">'
    +'<div class="ps-av">'+chatAv(c,88,'50%')+'</div>'
    +'<div class="ps-name">'+esc(c.name)+'</div>'
    +'<div style="text-align:center;color:var(--muted);font-size:13px;margin-top:6px;">'+(c.type==='channel'?'Канал':'Группа')+' · '+c.members.length+' участников</div>'
    +'<div class="ps-actions" style="margin-top:14px;">'
    +(canAdm?'<button class="ps-act-btn secondary" onclick="closeModal();showAddMember(\''+activeChat+'\')">➕ Добавить</button>':'')
    +(c.creator_id!==me.id?'<button class="ps-act-btn secondary" onclick="closeModal();leaveChat(\''+activeChat+'\')">🚪 Покинуть</button>':'')
    +'</div></div>');
}

function showChatAdminPanel(){
  if(!activeChat)return;
  showModal('<div class="modal-header"><div class="modal-title">⚙️ Управление</div><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="admin-grid">'
    +'<div class="admin-card" onclick="closeModal();showAddMember(\''+activeChat+'\')"><div class="ac-icon">➕</div><div class="ac-label">Добавить</div></div>'
    +'<div class="admin-card" onclick="clearMsgs()"><div class="ac-icon">🗑️</div><div class="ac-label">Очистить</div></div>'
    +'<div class="admin-card" onclick="closeModal();showEditChat()"><div class="ac-icon">✏️</div><div class="ac-label">Редактировать</div></div>'
    +((me.role==='creator'||me.role==='admin')?'<div class="admin-card" onclick="confirmDelete(\''+activeChat+'\')"><div class="ac-icon">⛔</div><div class="ac-label">Удалить</div></div>':'')
    +'</div>'
    +'<div style="margin-top:16px;padding:14px;background:rgba(0,0,0,.15);border:1px solid rgba(74,156,248,.08);border-radius:14px;">'
    +'<div class="modal-lbl" style="margin-bottom:8px;">Команды</div>'
    +'<div style="font-size:12px;color:var(--text2);line-height:2.3;">'
    +'<span style="color:var(--blue-300);">/ban @user</span> · <span style="color:var(--blue-300);">/unban @user</span><br>'
    +'<span style="color:var(--blue-300);">/mute @user</span> · <span style="color:var(--blue-300);">/unmute @user</span><br>'
    +(me.role==='creator'?'<span style="color:var(--blue-300);">/give_role @user admin</span><br><span style="color:var(--blue-300);">/announce текст</span>':'')
    +'</div></div>');
}

async function clearMsgs(){
  var res=await api('POST','/chats/'+activeChat+'/clear');
  if(res.error){notify('❌',res.error);return;}
  closeModal();chatMsgs=[];lastTs=0;renderMsgs();notify('✅','Очищено');
}

function confirmDelete(cid){
  closeModal();
  showModal('<div class="modal-header"><div class="modal-title" style="color:var(--red);">⛔ Удалить чат?</div><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<p style="color:var(--text2);font-size:14px;margin-bottom:20px;">Все сообщения удалятся безвозвратно.</p>'
    +'<div style="display:flex;gap:8px;"><button class="modal-btn secondary" onclick="closeModal()" style="flex:1;">Отмена</button>'
    +'<button class="modal-btn danger" onclick="deleteChat(\''+cid+'\')" style="flex:1;">Удалить</button></div>');
}

async function deleteChat(cid){
  var res=await api('DELETE','/chats/'+cid);
  if(res.error){notify('❌',res.error);return;}
  closeModal();goBack();await loadAll();renderChatList();notify('✅','Чат удалён');
}

function showEditChat(){
  var c=allChats.find(function(x){return x.id===activeChat;})||{};
  showModal('<div class="modal-header"><div class="modal-title">✏️ Редактировать</div><button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-form">'
    +'<div><div class="modal-lbl">Название</div><input class="modal-input" id="ec-n" value="'+esc(c.name||'')+'"></div>'
    +'<div><div class="modal-lbl">Описание</div><input class="modal-input" id="ec-d" value="'+esc(c.description||'')+'"></div>'
    +'<div><div class="modal-lbl">Иконка</div><input class="modal-input" id="ec-i" value="'+esc(c.icon||'')+'" maxlength="2"></div>'
    +'<button class="modal-btn" onclick="saveChat()">Сохранить</button></div>');
}

async function saveChat(){
  var name=document.getElementById('ec-n').value.trim();
  var desc=document.getElementById('ec-d').value.trim();
  var icon=document.getElementById('ec-i').value.trim();
  if(!name)return;
  var res=await api('PUT','/chats/'+activeChat,{name:name,description:desc,icon:icon});
  if(res.error){notify('❌',res.error);return;}
  closeModal();await loadAll();renderChatList();openChat(activeChat);notify('✅','Обновлено');
}

function showAddMember(cid){
  var c=allChats.find(function(x){return x.id===cid;})||{members:[]};
  var nonM=Object.values(allUsers).filter(function(u){return u.id!==me.id&&c.members.indexOf(u.id)<0;});
  var html='<div class="modal-header"><div class="modal-title">➕ Добавить участника</div><button class="modal-close" onclick="closeModal()">✕</button></div>';
  if(!nonM.length){html+='<p style="text-align:center;color:var(--muted);padding:20px 0;">Все уже в чате</p>';}
  html+=nonM.map(function(u){return '<div class="ul-item" onclick="addMember(\''+cid+'\',\''+u.id+'\')"><div class="ul-av">'+avHtml(u,44,'50%')+'</div><div><div class="ul-name">'+esc(u.nick)+'</div><div class="ul-handle">@'+u.username+'</div></div></div>';}).join('');
  showModal(html);
}

async function addMember(cid,uid){
  var res=await api('POST','/chats/'+cid+'/members',{user_id:uid});
  if(res.error){notify('❌',res.error);return;}
  closeModal();await loadAll();renderChatList();notify('✅','Добавлен');
  if(activeChat===cid)await loadMsgs();
}

async function leaveChat(cid){
  var res=await api('POST','/chats/'+cid+'/leave');
  if(res.error){notify('❌',res.error);return;}
  goBack();await loadAll();renderChatList();notify('✅','Вы покинули чат');
}

async function showPeopleModal(){
  var res=await api('GET','/users');
  var users=res.error?Object.values(allUsers).filter(function(u){return u.id!==me.id;}):res;
  var html='<div class="modal-header"><div class="modal-title">👥 Пользователи</div><button class="modal-close" onclick="closeModal()">✕</button></div>';
  if(!users.length){html+='<p style="text-align:center;color:var(--muted);padding:20px 0;">Нет пользователей</p>';}
  html+=users.map(function(u){
    var on=isOnline(u);
    return '<div class="ul-item" onclick="closeModal();showUserProfile(\''+u.id+'\')">'
      +'<div class="ul-av" style="position:relative;">'+avHtml(u,44,'50%')+'<span class="dot '+(on?'on':'off')+'" style="position:absolute;bottom:1px;right:1px;border:2px solid #050d1f;"></span></div>'
      +'<div><div class="ul-name">'+esc(u.nick)+(u.role==='creator'?'<span class="vbadge" style="font-size:11px;">✓</span>':'')+'</div>'
      +'<div class="ul-handle">@'+u.username+' · '+(on?'В сети':'Оффлайн')+'</div></div></div>';
  }).join('');
  showModal(html);
}

// ═══════ MODAL ═══════
function showModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-ov').classList.remove('hidden');}
function closeModal(){document.getElementById('modal-ov').classList.add('hidden');}
function modalBg(e){if(e.target===document.getElementById('modal-ov'))closeModal();}

// ═══════ BOOT ═══════
async function boot(){
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').classList.add('hidden');
  var res=await api('GET','/me');
  if(!res.error){me=res;enterApp();}
}

window.onload=boot;
window.addEventListener('beforeunload',function(){api('POST','/logout');});
</script>
</body>
</html>
