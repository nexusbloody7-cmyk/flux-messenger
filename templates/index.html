<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Flux</title>
    <script src="https://cdn.socketio.io/4.7.2/socketio.min.js"></script>
    <style>
        :root { --blue: #007AFF; --dark: #010204; --glass: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.1); }
        body { background: var(--dark); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .tap { cursor: pointer; touch-action: manipulation; transition: 0.2s; -webkit-tap-highlight-color: transparent; border: none; outline: none; }
        .tap:active { opacity: 0.5; transform: scale(0.95); }

        #sidebar { width: 70px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 15px; background: rgba(0,0,0,0.2); }
        .nav-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--glass); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid var(--border); }

        #chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { padding: 12px 15px; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); font-size: 14px; }
        
        /* СИНЯЯ ГАЛОЧКА */
        .v-badge { 
            display: inline-flex; width: 12px; height: 12px; background: var(--blue); 
            border-radius: 50%; margin-left: 5px; vertical-align: middle;
            justify-content: center; align-items: center;
        }
        .v-badge::after { content: '✓'; color: white; font-size: 8px; font-weight: 900; }

        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .input-box { padding: 10px 15px calc(15px + env(safe-area-inset-bottom)); display: flex; gap: 10px; background: var(--dark); border-top: 1px solid var(--border); }
        
        /* Исправление ширины инпутов */
        input { background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; outline: none; font-size: 16px; box-sizing: border-box; }
        
        #plus-menu { 
            display: none; position: absolute; left: 75px; bottom: 80px; 
            background: #1c1c1e; border: 1px solid var(--border); border-radius: 15px; 
            flex-direction: column; padding: 5px; z-index: 100;
        }
        .menu-item { padding: 10px 15px; border-radius: 8px; white-space: nowrap; font-size: 14px; }

        /* ОГРАНИЧЕНИЕ ШИРИНЫ АВТОРИЗАЦИИ */
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 300px; text-align: center; }
        .auth-card input { width: 100%; margin-bottom: 10px; }
        .auth-card button { width: 100%; padding: 14px; background: var(--blue); border-radius: 12px; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth">
    <div class="auth-card">
        <h1 style="letter-spacing: -2px; font-size: 2.5rem; margin: 0;">FLUX</h1>
        <p style="opacity: 0.5; margin-bottom: 25px; font-size: 0.9rem;">Будущее общение здесь!</p>
        <input type="text" id="ln" placeholder="Никнейм">
        <input type="password" id="lp" placeholder="Пароль">
        <button class="tap" onclick="login()">Войти</button>
    </div>
</div>

<div id="sidebar">
    <div class="nav-btn tap" onclick="switchChat('community')">🏠</div>
    <div class="nav-btn tap" onclick="toggleMenu()">+</div>
    <div id="plus-menu">
        <div class="menu-item tap" onclick="createCh()">📢 Канал</div>
        <div class="menu-item tap" onclick="findUs()">👤 Личка</div>
    </div>
</div>

<div id="chat-area">
    <div class="header"><b id="c-title"># Community</b></div>
    <div id="msgs"></div>
    <div class="input-box">
        <input type="text" id="mt" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button class="tap" onclick="send()" style="background: var(--blue); width: 45px; height: 45px; border-radius: 12px; color: white;">→</button>
    </div>
</div>

<script>
    const socket = io();
    let me = null;
    let activeChat = 'community';

    async function login() {
        const n = document.getElementById('ln').value;
        const p = document.getElementById('lp').value;
        const r = await fetch('/api/auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nick: n, password: p })
        });
        const d = await r.json();
        if(d.status === 'ok') {
            me = d.user;
            document.getElementById('auth').style.display = 'none';
            socket.emit('join', { chat_id: 'community' });
        } else alert("Неверный пароль!");
    }

    function toggleMenu() {
        const m = document.getElementById('plus-menu');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    function createCh() {
        toggleMenu();
        const name = prompt("Название канала:");
        if(name) socket.emit('create_channel', { name: name, owner: me.nick });
    }

    function findUs() {
        toggleMenu();
        const who = prompt("Ник пользователя:");
        if(who) socket.emit('search_user', { nick: who, my_nick: me.nick });
    }

    socket.on('user_found', d => {
        activeChat = d.chat_id;
        document.getElementById('c-title').innerText = "👤 " + d.name;
        socket.emit('join', { chat_id: activeChat });
    });

    function send() {
        const t = document.getElementById('mt');
        if(!t.value) return;
        socket.emit('send_msg', { chat_id: activeChat, sender: me.nick, text: t.value });
        t.value = '';
    }

    socket.on('broadcast_msg', m => { if(m.chat_id === activeChat) renderMsg(m); });
    socket.on('history', data => { document.getElementById('msgs').innerHTML = ''; data.forEach(renderMsg); });

    function renderMsg(m) {
        const isS = m.sender === me.nick;
        const v = m.is_v ? '<div class="v-badge"></div>' : '';
        const html = `
            <div style="align-self: ${isS ? 'flex-end' : 'flex-start'}; max-width: 85%;">
                <div style="font-size: 10px; opacity: 0.5; margin-bottom: 2px; text-align: ${isS ? 'right' : 'left'}">
                    ${m.sender}${v} • ${m.time}
                </div>
                <div style="background: ${isS ? 'var(--blue)' : 'var(--glass)'}; padding: 10px 14px; border-radius: 15px; border-top-${isS?'right':'left'}-radius: 4px; font-size: 15px;">
                    ${m.text}
                </div>
            </div>`;
        const ms = document.getElementById('msgs');
        ms.innerHTML += html;
        ms.scrollTop = ms.scrollHeight;
    }

    window.onclick = e => { if (!e.target.closest('.nav-btn')) document.getElementById('plus-menu').style.display = 'none'; }
</script>
</body>
</html>
