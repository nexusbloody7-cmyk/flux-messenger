<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Messenger</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-image: radial-gradient(circle at top, #1e293b, transparent); }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px; width: 320px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 2.5rem; letter-spacing: -2px; margin: 0 0 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: #007aff; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .verified { color: #007aff; }
    </style>
</head>
<body>
    <div class="glass" id="box">
        <h1>FLUX</h1>
        <p style="opacity:0.5; font-size:0.8rem;">Будущее общение здесь!</p>
        <div id="inputs">
            <input type="email" id="e" placeholder="Email (для регистрации)">
            <input type="text" id="n" placeholder="Никнейм">
            <input type="password" id="p" placeholder="Пароль">
            <button class="btn" onclick="send('register')">Создать аккаунт</button>
            <button class="btn" style="background:transparent; border:1px solid #007aff;" onclick="send('login')">Войти</button>
        </div>
    </div>
    <script>
        async function send(action) {
            const nick = document.getElementById('n').value;
            const pass = document.getElementById('p').value;
            const email = document.getElementById('e').value;
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action, nick, password: pass, email })
            });
            const data = await res.json();
            if(data.status === 'ok') {
                if(action === 'login') {
                    document.getElementById('box').innerHTML = `<h1>Привет, ${data.user.nick}${data.user.is_admin ? '<span class="verified">✔</span>' : ''}</h1><p>Вы в сети Flux Community</p>`;
                } else alert('Успешно! Теперь нажми Войти');
            } else alert(data.message);
        }
    </script>
</body>
</html>
