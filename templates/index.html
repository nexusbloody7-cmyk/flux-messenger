<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Flux Pro Mobile</title>
    <style>
        :root {
            --bg: #030812;
            --panel: rgba(10, 25, 47, 0.8);
            --accent: #007AFF;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, system-ui, sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar Adaptive */
        #sidebar { 
            width: 320px; 
            background: var(--panel); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            backdrop-filter: blur(20px);
            transition: transform 0.3s ease;
            z-index: 100;
        }

        /* Main Area */
        #main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: radial-gradient(circle at top right, #0a192f, #030812);
            position: relative;
        }

        /* Mobile Logic */
        @media (max-width: 768px) {
            #sidebar {
                position: absolute;
                left: 0; top: 0; bottom: 0;
                transform: translateX(-100%); /* Скрыт за экраном */
            }
            #sidebar.open {
                transform: translateX(0); /* Выезжает */
                width: 85%;
            }
            .menu-btn { display: block !important; }
        }

        .menu-btn {
            display: none;
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-right: 10px;
        }

        .sb-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .chat-item.active { background: rgba(0, 122, 255, 0.15); }
        .chat-icon { width: 45px; height: 45px; border-radius: 14px; background: linear-gradient(45deg, #004e92, #000428); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .top-bar { padding: 10px 15px; background: var(--panel); backdrop-filter: blur(10px); display: flex; align-items: center; border-bottom: 1px solid var(--border); }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* Bubbles */
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; position: relative; font-size: 15px; line-height: 1.4; }
        .my { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(0,122,255,0.2); }
        .other { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        .sender-info { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; color: #8ebfff; }
        .badge { width: 14px; height: 14px; background: var(--accent); border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; font-size: 8px; }

        /* Input Area */
        .input-box { padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); background: var(--panel); display: flex; gap: 10px; border-top: 1px solid var(--border); }
        input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 12px; border-radius: 15px; color: white; font-size: 16px; outline: none; }
        .send-btn { width: 45px; height: 45px; border-radius: 15px; background: var(--accent); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Modals and Auth - Leave as is but make responsive */
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 320px; text-align: center; }
        #profile-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

<div id="auth">
    <div class="auth-card">
        <h1 style="font-size: 3.5rem; color: var(--accent); margin: 0 0 20px 0;">FLUX</h1>
        <div id="reg-form" style="display:none">
            <input type="text" id="r-nick" placeholder="Никнейм">
            <input type="text" id="r-ava" placeholder="Ссылка на фото">
        </div>
        <input type="email" id="l-email" placeholder="Email">
        <input type="password" id="l-pass" placeholder="Пароль">
        <button class="send-btn" style="width:100%; margin-top:15px;" onclick="doAuth()">Войти</button>
        <p onclick="document.getElementById('reg-form').style.display='block'" style="font-size:13px; opacity:0.5; margin-top:20px; cursor:pointer">Создать аккаунт</p>
    </div>
</div>

<div id="sidebar">
    <div class="sb-header">
        <b style="font-size:20px">Чаты</b>
        <img id="my-mini-ava" src="" style="width:40px; height:40px; border-radius:12px; cursor:pointer" onclick="openProfile()">
    </div>
    <div class="chat-list" id="chat-list"></div>
    <div style="padding:15px">
        <button class="send-btn" style="width:100%; border-radius:12px" onclick="createGroup()">+ Создать группу</button>
    </div>
</div>

<div id="main">
    <div class="top-bar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="chat-icon" id="curr-chat-icon" style="width:35px; height:35px; border-radius:10px; font-size:16px;">F</div>
        <div style="margin-left:10px">
            <div id="curr-chat-name" style="font-weight:bold; font-size:15px">Flux Community</div>
            <div id="status" style="font-size:10px; opacity:0.5">онлайн</div>
        </div>
    </div>
    <div id="msgs"></div>
    <div class="input-box">
        <input type="text" id="m-text" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<div id="profile-modal" onclick="if(event.target===this) this.style.display='none'">
    <div style="width:100%; max-width:320px; background:#0a192f; border-radius:25px; padding:25px; text-align:center; border:1px solid var(--border)">
        <img id="p-ava-img" src="" style="width:80px; height:80px; border-radius:20px; border:2px solid var(--accent)">
        <h2 id="p-nick" style="margin:10px 0 0 0"></h2>
        <p id="p-uname" style="color:var(--accent); margin-bottom:15px"></p>
        <textarea id="p-bio" placeholder="О себе..." style="width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:white; border-radius:12px; padding:10px; min-height:80px"></textarea>
        <button class="send-btn" style="width:100%; margin-top:15px" onclick="saveProfile()">Сохранить</button>
    </div>
</div>

<script>
    let me = null;
    let currentChat = 'community';

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    async function doAuth() {
        const isReg = document.getElementById('reg-form').style.display === 'block';
        const body = {
            action: isReg ? 'register' : 'login',
            email: document.getElementById('l-email').value,
            password: document.getElementById('l-pass').value,
            nick: document.getElementById('r-nick').value,
            avatar: document.getElementById('r-ava').value || 'https://img.icons8.com/glassmorphism/96/user.png'
        };
        const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        const d = await r.json();
        if(d.status === 'ok') {
            me = d.user;
            document.getElementById('auth').style.display = 'none';
            document.getElementById('my-mini-ava').src = me.avatar;
            init();
        } else { alert(d.msg); }
    }

    function openProfile() {
        document.getElementById('p-ava-img').src = me.avatar;
        document.getElementById('p-nick').innerText = me.nick;
        document.getElementById('p-uname').innerText = me.username;
        document.getElementById('p-bio').value = me.bio || '';
        document.getElementById('profile-modal').style.display = 'flex';
    }

    async function saveProfile() {
        const bio = document.getElementById('p-bio').value;
        await fetch('/api/profile', { method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ nick: me.nick, bio: bio, avatar: me.avatar }) });
        me.bio = bio;
        document.getElementById('profile-modal').style.display = 'none';
    }

    async function loadChats() {
        const r = await fetch('/api/chats');
        const chats = await r.json();
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        chats.forEach(c => {
            const el = document.createElement('div');
            el.className = `chat-item ${currentChat === c.id ? 'active' : ''}`;
            el.onclick = () => { 
                currentChat = c.id; 
                document.getElementById('curr-chat-name').innerText = c.name; 
                document.getElementById('curr-chat-icon').innerText = c.name[0];
                if(window.innerWidth <= 768) toggleSidebar(); 
                loadMsgs();
            };
            el.innerHTML = `<div class="chat-icon">${c.name[0]}</div><div><b>${c.name}</b></div>`;
            list.appendChild(el);
        });
    }

    async function loadMsgs() {
        const r = await fetch(`/api/messages?chat_id=${currentChat}`);
        const msgs = await r.json();
        const cont = document.getElementById('msgs');
        let html = '';
        msgs.forEach(m => {
            const isMe = m.sender === me.nick;
            html += `
                <div class="bubble ${isMe ? 'my' : 'other'}">
                    <div class="sender-info">
                        <img src="${m.avatar}" style="width:16px; height:16px; border-radius:50%">
                        ${m.sender} ${m.is_v ? '<span class="badge">✓</span>' : ''}
                    </div>
                    <div>${m.text}</div>
                    <div style="font-size:9px; opacity:0.5; text-align:right; margin-top:3px">${m.time}</div>
                </div>`;
        });
        cont.innerHTML = html;
        cont.scrollTop = cont.scrollHeight;
    }

    async function send() {
        const t = document.getElementById('m-text');
        if(!t.value.trim()) return;
        await fetch('/api/messages', { method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ chat_id: currentChat, sender: me.nick, text: t.value }) });
        t.value = '';
        loadMsgs();
    }

    function createGroup() {
        const name = prompt("Название группы:");
        if(name) fetch('/api/chats', { method:'POST', headers:{'Content-Type':'application/json'}, 
            body: JSON.stringify({ name, type:'group', owner: me.nick }) }).then(() => loadChats());
    }

    function init() { loadChats(); loadMsgs(); setInterval(loadMsgs, 3000); }
</script>
</body>
</html>
