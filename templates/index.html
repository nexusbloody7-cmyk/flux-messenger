<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Fixed</title>
    <style>
        body { background: #010409; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 30px; width: 280px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007aff; border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card" id="ui">
        <h1>FLUX</h1>
        <input type="text" id="n" placeholder="Никнейм">
        <input type="password" id="p" placeholder="Пароль">
        <button id="btn" onclick="login()">Войти во Flux</button>
    </div>

    <script>
        async function login() {
            const nick = document.getElementById('n').value;
            const pass = document.getElementById('p').value;
            const btn = document.getElementById('btn');
            
            btn.innerText = "Вход...";
            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'login', nick: nick, password: pass })
                });
                const data = await res.json();
                if(data.status === 'ok') {
                    document.getElementById('ui').innerHTML = `<h2>Привет, ${data.user.nick} ✔</h2><p>Система запущена!</p>`;
                } else {
                    alert('Ошибка: ' + data.message);
                    btn.innerText = "Войти во Flux";
                }
            } catch(e) {
                alert('Ошибка сервера. Проверь логи Render!');
                btn.innerText = "Войти во Flux";
            }
        }
    </script>
</body>
</html>
