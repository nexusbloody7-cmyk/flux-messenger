<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Flux</title>
    <style>
        :root { --blue: #007AFF; --dark: #010204; --glass: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.1); }
        body { background: var(--dark); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .tap { cursor: pointer; touch-action: manipulation; transition: 0.1s; -webkit-tap-highlight-color: transparent; border: none; outline: none; }
        .tap:active { opacity: 0.6; transform: scale(0.95); }
        #sidebar { width: 70px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 15px; }
        .nav-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--glass); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid var(--border); color: white; }
        #chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { padding: 15px; border-bottom: 1px solid var(--border); background: rgba(1,2,4,0.8); backdrop-filter: blur(10px); font-size: 15px; }
        .v-badge { display: inline-flex; width: 14px; height: 14px; background: var(--blue); border-radius: 50%; margin-left: 5px; vertical-align: middle; justify-content: center; align-items: center; }
        .v-badge::after { content: '✓'; color: white; font-size: 9px; font-weight: bold; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .input-box { padding: 10px 15px calc(15px + env(safe-area-inset-bottom)); display: flex; gap: 10px; background: var(--dark); border-top: 1px solid var(--border); }
        input { background: var(--glass); border: 1px solid var(--border); padding: 12px 15px; border-radius: 14px; color: white; outline: none; font-size: 16px; width: 100%; box-sizing: border-box; }
        #auth { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 300px; text-align: center; }
        .auth-btn { width: 100%; padding: 14px; background: var(--blue); border-radius: 14px; color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth">
    <div class="auth-card">
        <h1 style="font-size: 2.8rem; margin-bottom: 20px;">FLUX</h1>
        <input type="text" id="ln" placeholder="Никнейм">
        <input type="password" id="lp" placeholder="Пароль" style="margin-top:10px">
        <button class="tap auth-btn" onclick="login()">Войти</button>
    </div>
</div>

<div id="sidebar">
    <button class="nav-btn tap">🏠</button>
</div>

<div id="chat-area">
    <div class="header"><b># Flux Community</b></div>
    <div id="msgs"></div>
    <div class="input-box">
        <input type="text" id="mt" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button class="tap" onclick="send()" style="background: var(--blue); width: 48px; min-width: 48px; height: 48px; border-radius: 14px; color: white;">➤</button>
    </div>
</div>

<script>
    let me = null;
    let lastMsgCount = 0;

    async function login() {
        const n = document.getElementById('ln').value;
        const p = document.getElementById('lp').value;
        const r = await fetch('/api/auth', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nick: n, password: p })
        });
        const d = await r.json();
        if(d.status === 'ok') {
            me = d.user;
            document.getElementById('auth').style.display = 'none';
            startChat();
        } else { alert("Ошибка входа!"); }
    }

    async function loadMsgs() {
        const r = await fetch('/api/messages');
        const msgs = await r.json();
        if(msgs.length !== lastMsgCount) {
            const container = document.getElementById('msgs');
            container.innerHTML = '';
            msgs.forEach(renderMsg);
            container.scrollTop = container.scrollHeight;
            lastMsgCount = msgs.length;
        }
    }

    function renderMsg(m) {
        const isS = m.sender === me.nick;
        const v = m.is_v ? '<div class="v-badge"></div>' : '';
        document.getElementById('msgs').innerHTML += `
            <div style="align-self: ${isS ? 'flex-end' : 'flex-start'}; max-width: 85%;">
                <div style="font-size: 11px; opacity: 0.5; margin-bottom: 4px;">${m.sender}${v} • ${m.time}</div>
                <div style="background: ${isS ? 'var(--blue)' : 'var(--glass)'}; padding: 12px 16px; border-radius: 16px; font-size: 15px;">${m.text}</div>
            </div>`;
    }

    async function send() {
        const t = document.getElementById('mt');
        if(!t.value.trim()) return;
        await fetch('/api/messages', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ sender: me.nick, text: t.value })
        });
        t.value = '';
        loadMsgs();
    }

    function startChat() {
        loadMsgs();
        setInterval(loadMsgs, 3000); // Проверка новых сообщений каждые 3 сек
    }
</script>
</body>
</html>
