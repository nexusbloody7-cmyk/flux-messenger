<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Flux</title>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #020b18 0%, #001a33 100%);
            --glass-bg: rgba(20, 40, 70, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #007AFF;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg-grad); color: white; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Glassmorphism */
        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); }
        
        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: var(--bg-grad); }
        .auth-card { width: 100%; max-width: 320px; padding: 30px 20px; border-radius: 24px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; font-size: 16px; outline: none; }
        .auth-card input::placeholder { color: rgba(255,255,255,0.4); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .toggle-auth { background: transparent; border: 1px solid var(--accent); color: var(--accent); }

        /* Основной интерфейс */
        #app { display: none; flex-direction: column; height: 100%; }
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); z-index: 10; }
        .header-title { font-weight: bold; font-size: 18px; }
        
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-wrap { display: flex; gap: 10px; max-width: 90%; }
        .my-msg { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: rgba(255,255,255,0.1); }
        .msg-bubble { padding: 12px 16px; border-radius: 18px; position: relative; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .my-msg .msg-bubble { background: var(--accent); border-bottom-right-radius: 4px; }
        .other-msg .msg-bubble { background: var(--glass-bg); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        
        .msg-info { font-size: 11px; opacity: 0.5; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .my-msg .msg-info { justify-content: flex-end; }
        
        /* Синяя галочка */
        .badge { width: 14px; height: 14px; background: #00A3FF; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; }
        .badge::after { content: '✓'; color: white; font-size: 9px; font-weight: bold; }

        /* Реакции */
        .react-btn { position: absolute; bottom: -10px; right: 10px; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); border-radius: 12px; padding: 2px 8px; font-size: 12px; color: white; cursor: pointer; display: flex; gap: 4px; align-items: center; }
        .my-msg .react-btn { left: 10px; right: auto; }

        /* Ввод */
        .input-area { padding: 10px 15px calc(15px + env(safe-area-inset-bottom)); display: flex; gap: 10px; border-top: 1px solid var(--glass-border); }
        .input-area input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 12px 18px; border-radius: 20px; color: white; font-size: 16px; outline: none; }
        .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 18px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card glass">
        <h1 style="margin: 0 0 20px 0; font-size: 2.5rem; letter-spacing: -1px;">FLUX</h1>
        
        <div id="reg-fields" style="display: none;">
            <input type="text" id="r-nick" placeholder="Никнейм">
            <input type="url" id="r-ava" placeholder="Ссылка на аватарку (URL)">
        </div>
        
        <input type="email" id="email" placeholder="Email (например: user@flux.com)">
        <input type="password" id="pass" placeholder="Пароль">
        
        <button class="btn" id="main-btn" onclick="submitAuth(false)">Войти</button>
        <button class="btn toggle-auth" onclick="toggleMode()">Создать аккаунт</button>
    </div>
</div>

<div id="app">
    <div class="header glass">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="header-title"># Flux Community</div>
        </div>
        <img id="my-avatar" class="avatar" src="" onclick="alert('Меню профиля в разработке')">
    </div>
    
    <div id="msgs"></div>
    
    <div class="input-area glass">
        <button class="send-btn" style="background: var(--glass-bg); border: 1px solid var(--glass-border);" onclick="alert('Каналы и ЛС скоро будут доступны!')">➕</button>
        <input type="text" id="mt" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    let me = null;
    let isReg = false;
    let lastCount = 0;

    function toggleMode() {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('main-btn').innerText = isReg ? 'Зарегистрироваться' : 'Войти';
    }

    async function submitAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const payload = { action: isReg ? 'register' : 'login', email, password: pass };
        
        if (isReg) {
            payload.nick = document.getElementById('r-nick').value;
            payload.avatar = document.getElementById('r-ava').value || 'https://img.icons8.com/glassmorphism/96/user.png';
        }

        const res = await fetch('/api/auth', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        
        if(data.status === 'ok') {
            me = data.user;
            document.getElementById('my-avatar').src = me.avatar;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            startChat();
        } else {
            alert(data.msg);
        }
    }

    async function loadMsgs() {
        const res = await fetch('/api/messages?chat_id=community');
        const msgs = await res.json();
        if(msgs.length !== lastCount) {
            const container = document.getElementById('msgs');
            container.innerHTML = '';
            msgs.forEach(renderMsg);
            container.scrollTop = container.scrollHeight;
            lastCount = msgs.length;
        }
    }

    function renderMsg(m) {
        const isMe = m.sender === me.nick;
        const badge = m.is_v ? '<div class="badge"></div>' : '';
        const reactHTML = m.likes > 0 ? `<div class="react-btn" onclick="react(${m.id})">❤️ ${m.likes}</div>` : `<div class="react-btn" style="opacity:0.3" onclick="react(${m.id})">🤍</div>`;
        
        const html = `
            <div class="msg-wrap ${isMe ? 'my-msg' : 'other-msg'}">
                <img class="avatar" src="${m.avatar}">
                <div style="max-width: 75%;">
                    <div class="msg-info"><b>${m.sender}</b> ${badge} • ${m.time}</div>
                    <div class="msg-bubble">
                        ${m.text}
                        ${reactHTML}
                    </div>
                </div>
            </div>`;
        document.getElementById('msgs').innerHTML += html;
    }

    async function send() {
        const input = document.getElementById('mt');
        if(!input.value.trim()) return;
        await fetch('/api/messages', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ sender: me.nick, text: input.value, chat_id: 'community' })
        });
        input.value = '';
        loadMsgs();
    }

    async function react(msg_id) {
        await fetch('/api/react', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ msg_id })
        });
        loadMsgs();
    }

    function startChat() {
        loadMsgs();
        setInterval(loadMsgs, 2000); // Опрос сервера каждые 2 секунды
    }
</script>
</body>
</html>
