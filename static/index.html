<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#020818">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Flux Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --b5:#1a4fa0;--b4:#2468c8;--b3:#4a9cf8;--b2:#7bbcff;
  --tx:#e8f4ff;--t2:rgba(200,228,255,.65);--mu:rgba(200,228,255,.32);
  --rd:#ff4d6d;--gn:#4dffb0;--gl:rgba(41,121,212,.12);
  --gold:#ffd700;--gold2:#ffb300;
  --card:rgba(8,18,40,.82);--border:rgba(74,156,248,.14);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#020818;overscroll-behavior:none}
body{font-family:'DM Sans',sans-serif;color:var(--tx)}

/* ── BG ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-o{position:absolute;border-radius:50%;filter:blur(90px);opacity:.12}
.o1{width:500px;height:500px;background:radial-gradient(circle,#1e5fb8,transparent);top:-200px;left:-150px}
.o2{width:350px;height:350px;background:radial-gradient(circle,#0f2d60,transparent);bottom:-100px;right:-100px}
.o3{width:280px;height:280px;background:radial-gradient(circle,#2468c8,transparent);top:40%;left:50%;transform:translate(-50%,-50%)}

/* ── AUTH ── */
#auth{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;background:radial-gradient(ellipse at 30% 20%,rgba(36,104,200,.14),transparent 60%),#020818}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-ic{width:52px;height:52px;background:linear-gradient(135deg,var(--b5),var(--b4));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 24px rgba(36,104,200,.4)}
.logo h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.logo span{color:var(--b3)}
.auth-card{width:100%;max-width:420px;background:var(--card);backdrop-filter:blur(40px);border:1px solid var(--border);border-radius:24px;padding:28px 24px;position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(74,156,248,.45),transparent)}
.tabs{display:flex;gap:4px;margin-bottom:22px;background:rgba(0,0,0,.22);border-radius:14px;padding:4px}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--t2);font-size:15px;font-weight:500;border-radius:10px;cursor:pointer;transition:.2s}
.tab.on{background:rgba(36,104,200,.28);color:var(--tx);font-weight:600}
.form{display:none;flex-direction:column;gap:14px}
.form.show{display:flex}
.lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:5px}
.inp{width:100%;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;color:var(--tx);font-size:16px;outline:none;-webkit-appearance:none;font-family:inherit;transition:.2s}
.inp:focus{border-color:rgba(74,156,248,.4);background:rgba(74,156,248,.06)}
.btn{padding:14px;background:linear-gradient(135deg,var(--b5),var(--b4));border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;width:100%;transition:.15s;letter-spacing:.02em}
.btn:active{opacity:.88;transform:scale(.98)}
.btn:disabled{opacity:.55;cursor:default}
.btn.sec{background:rgba(255,255,255,.07);color:var(--t2);border:1px solid var(--border);font-family:inherit;font-size:14px;font-weight:600}
.btn.red{background:linear-gradient(135deg,#b91c1c,#ef4444)}
.btn.gold{background:linear-gradient(135deg,var(--gold2),var(--gold))}
.err{padding:11px 14px;background:rgba(255,77,109,.09);border:1px solid rgba(255,77,109,.28);border-radius:12px;color:var(--rd);font-size:13px;text-align:center}

/* ── APP ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10;padding-top:var(--st)}
#app.hide{display:none}
#vchats{display:flex;flex-direction:column;flex:1;min-height:0;position:relative}
#vchat{display:none;flex-direction:column;flex:1;min-height:0}
#vsettings{display:none;flex-direction:column;flex:1;min-height:0;overflow-y:auto}

/* ── TOP BAR ── */
.tbar{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-shrink:0;background:rgba(4,10,28,.75);backdrop-filter:blur(28px);border-bottom:1px solid var(--border);height:58px}
.tbar-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;flex:1}
.tbar-title span{color:var(--b3)}
.iBtn{width:38px;height:38px;border:none;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--t2);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;transition:.15s}
.iBtn:active{background:var(--gl)}
.myav{width:36px;height:36px;border-radius:50%;border:2px solid rgba(74,156,248,.3);overflow:hidden;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;position:relative}
.myav img{width:100%;height:100%;object-fit:cover}
.myav.on::after{content:'';position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(--gn);border:2px solid #050d1f}

/* ── SEARCH ── */
.sbar{padding:10px 14px;flex-shrink:0}
.si{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;padding:10px 14px}
.si input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:15px;font-family:inherit}
.si input::placeholder{color:var(--mu)}

/* ── PILLS ── */
.pills{display:flex;gap:8px;padding:0 14px 10px;overflow-x:auto;flex-shrink:0}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--mu);font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;flex-shrink:0;transition:.15s}
.pill.on{background:rgba(36,104,200,.2);border-color:rgba(74,156,248,.32);color:var(--b3);font-weight:600}

/* ── CHAT LIST ── */
.clist{flex:1;overflow-y:auto;padding:0 10px 8px;-webkit-overflow-scrolling:touch}
.ci{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:16px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;position:relative;transition:.15s}
.ci:active{background:var(--gl)}
.ci.sel{background:rgba(36,104,200,.16);border-color:rgba(74,156,248,.18)}
.ci.pinned-c{border-left:3px solid var(--b3)}
.ciav{width:50px;height:50px;border-radius:16px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;position:relative}
.ciav.dm{border-radius:50%}
.ciav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cin{flex:1;min-width:0}
.cin-nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.cin-sub{font-size:13px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.vbg{color:var(--b3);font-size:12px}
.vgold{color:var(--gold);font-size:12px}

.fab{position:absolute;right:16px;bottom:calc(64px + 16px + var(--sb));width:54px;height:54px;background:linear-gradient(135deg,var(--b5),var(--b4));border-radius:18px;border:none;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 4px 28px rgba(36,104,200,.5);z-index:5;transition:.15s}
.fab:active{transform:scale(.91)}

/* ── BOTTOM NAV ── */
.bnav{display:flex;background:rgba(4,10,28,.78);backdrop-filter:blur(32px);border-top:1px solid var(--border);padding-bottom:var(--sb);flex-shrink:0;height:calc(64px + var(--sb))}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--mu);cursor:pointer;padding:6px 4px;font-size:11px;font-weight:500;transition:.15s}
.ni.on{color:var(--b3)}
.ni-ic{font-size:22px;line-height:1}

/* ── CHAT VIEW ── */
.chdr{display:flex;align-items:center;gap:10px;padding:10px 14px;flex-shrink:0;background:rgba(4,10,28,.75);backdrop-filter:blur(28px);border-bottom:1px solid var(--border);height:58px}
.bkBtn{width:36px;height:36px;border:none;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--t2);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.chav{width:36px;height:36px;border-radius:12px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700}
.chav.dm{border-radius:50%}
.chav img{width:100%;height:100%;object-fit:cover}
.chi{flex:1;min-width:0}
.chn{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.chs{font-size:11px;color:var(--mu);margin-top:1px}

/* ── PINNED BANNER ── */
.pban{display:none;background:rgba(36,104,200,.09);border-bottom:1px solid var(--border);padding:8px 16px;font-size:12px;color:var(--b3);flex-shrink:0;cursor:pointer;align-items:center;gap:8px}
.pban.show{display:flex}

/* ── MESSAGES ── */
.msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch}
.dsep{display:flex;align-items:center;gap:10px;padding:10px 0;color:var(--mu);font-size:11px;font-weight:600}
.dsep::before,.dsep::after{content:'';flex:1;height:1px;background:rgba(74,156,248,.1)}
.smsg{text-align:center;padding:5px 14px;background:rgba(36,104,200,.07);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--mu);margin:3px auto;max-width:86%}

.mrow{display:flex;align-items:flex-end;gap:8px;animation:msgIn .18s ease;position:relative;padding:1px 0}
.mrow.own{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer}
.mav img{width:100%;height:100%;object-fit:cover}
.mbub{max-width:74%;padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;position:relative}
.mrow:not(.own) .mbub{background:rgba(12,28,60,.8);border:1px solid var(--border);border-bottom-left-radius:4px}
.mrow.own .mbub{background:linear-gradient(135deg,rgba(26,79,160,.78),rgba(36,104,200,.62));border:1px solid rgba(74,156,248,.2);border-bottom-right-radius:4px}
.msdr{font-size:11px;font-weight:700;color:var(--b3);margin-bottom:3px;display:flex;align-items:center;gap:3px}
.mtime{font-size:10px;color:var(--mu);margin-top:4px;text-align:right}
.mrow:not(.own) .mtime{text-align:left}

/* ── REPLY PREVIEW IN BUBBLE ── */
.reply-preview{padding:6px 10px;background:rgba(74,156,248,.1);border-left:3px solid var(--b3);border-radius:8px;margin-bottom:6px;font-size:12px;cursor:pointer}
.reply-preview .rp-name{color:var(--b3);font-weight:600;margin-bottom:2px}
.reply-preview .rp-text{color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── FORWARDED ── */
.fwd-from{font-size:11px;color:var(--b2);margin-bottom:4px;display:flex;align-items:center;gap:4px}

/* ── REACTIONS ── */
.rx-bar{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.rx{display:flex;align-items:center;gap:3px;padding:3px 8px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;font-size:13px;cursor:pointer;transition:.15s}
.rx.mine{background:rgba(36,104,200,.2);border-color:rgba(74,156,248,.35)}
.rx span{font-size:11px;color:var(--mu)}

/* ── MSG ACTIONS ── */
.mac-wrap{position:absolute;right:0;top:-38px;display:none;background:rgba(6,16,36,.94);border:1px solid var(--border);border-radius:12px;padding:4px;gap:3px;z-index:10;white-space:nowrap}
.mrow:hover .mac-wrap,.mrow:focus-within .mac-wrap{display:flex}
.mrow.own .mac-wrap{right:auto;left:0}
.mac{width:30px;height:30px;border:none;background:transparent;font-size:16px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s}
.mac:active{background:rgba(255,255,255,.1)}

/* ── REPLY BAR ── */
.reply-bar{display:none;padding:8px 14px;background:rgba(36,104,200,.08);border-top:1px solid var(--border);align-items:center;gap:10px;flex-shrink:0}
.reply-bar.show{display:flex}
.rb-info{flex:1;min-width:0}
.rb-name{font-size:12px;color:var(--b3);font-weight:600;margin-bottom:2px}
.rb-text{font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-close{width:28px;height:28px;border:none;background:rgba(255,255,255,.07);border-radius:50%;color:var(--mu);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── INPUT AREA ── */
.iarea{padding:10px 12px;padding-bottom:calc(10px + var(--sb));background:rgba(4,10,28,.65);backdrop-filter:blur(24px);border-top:1px solid var(--border);flex-shrink:0}
.estrip{display:flex;gap:2px;padding-bottom:8px;overflow-x:auto}
.estrip::-webkit-scrollbar{display:none}
.eBtn{background:none;border:none;font-size:22px;padding:4px 6px;cursor:pointer;flex-shrink:0}
.irow{display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.14);border-radius:18px;padding:10px 14px;transition:.2s}
.irow:focus-within{border-color:rgba(74,156,248,.38)}
.minp{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-family:inherit;font-size:15px;line-height:1.4;resize:none;max-height:100px}
.minp::placeholder{color:var(--mu)}
.sBtn{width:38px;height:38px;border:none;flex-shrink:0;background:linear-gradient(135deg,var(--b5),var(--b4));border-radius:12px;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.sBtn:active{transform:scale(.9)}
.ro-ban{padding:14px;padding-bottom:calc(14px + var(--sb));text-align:center;background:rgba(36,104,200,.06);border-top:1px solid var(--border);color:var(--mu);font-size:13px}

/* ── SETTINGS ── */
.sett-wrap{flex:1;overflow-y:auto;padding:16px}
.sett-sec{margin-bottom:24px}
.sett-sec-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:12px;padding-left:4px}
.sett-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;cursor:pointer;margin-bottom:8px;transition:.15s}
.sett-item:active{background:var(--gl)}
.si-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.si-info{flex:1}
.si-title{font-weight:600;font-size:15px}
.si-sub{font-size:12px;color:var(--mu);margin-top:2px}
.si-arr{color:var(--mu);font-size:18px}
.tog{width:44px;height:24px;background:rgba(255,255,255,.1);border-radius:12px;position:relative;cursor:pointer;flex-shrink:0;transition:.2s}
.tog.on{background:var(--b4)}
.tog::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(20px)}

/* ── PREMIUM BADGE ── */
.premium-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;background:linear-gradient(135deg,rgba(255,180,0,.15),rgba(255,215,0,.1));border:1px solid rgba(255,215,0,.3);border-radius:20px;font-size:12px;font-weight:700;color:var(--gold);margin-top:8px}

/* ── MODAL ── */
.mov{position:fixed;inset:0;z-index:200;background:rgba(2,8,24,.78);backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center}
.mov.hide{display:none}
.modal{width:100%;max-width:520px;background:rgba(6,16,36,.95);backdrop-filter:blur(40px);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:16px 20px calc(20px + var(--sb));max-height:90vh;overflow-y:auto}
.mhdl{width:36px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;margin:0 auto 18px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mtit{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.mcls{width:32px;height:32px;border:none;background:rgba(255,255,255,.07);border-radius:10px;color:var(--t2);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mform{display:flex;flex-direction:column;gap:14px}
.minput{width:100%;padding:14px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:14px;color:var(--tx);font-size:16px;outline:none;-webkit-appearance:none;font-family:inherit;transition:.2s}
.minput:focus{border-color:rgba(74,156,248,.38)}
.mlbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:5px}

/* ── PROFILE SHEET ── */
.ps-av{width:88px;height:88px;border-radius:50%;margin:0 auto 14px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;border:3px solid rgba(74,156,248,.28)}
.ps-av img{width:100%;height:100%;object-fit:cover}
.ps-nm{text-align:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px}
.ps-hl{text-align:center;color:var(--mu);font-size:13px;margin-top:3px}
.ps-bio{text-align:center;color:var(--t2);font-size:13px;margin-top:8px;padding:0 16px;line-height:1.5}
.ps-rl{display:inline-flex;margin:8px auto 0;padding:4px 14px;background:rgba(36,104,200,.14);border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:700;color:var(--b3)}
.fxid-box{margin-top:12px;padding:10px 14px;background:rgba(36,104,200,.07);border:1px solid var(--border);border-radius:12px;text-align:center}
.fxid-l{font-size:10px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.fxid-v{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--b3)}
.coins-box{margin-top:8px;padding:10px 14px;background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.18);border-radius:12px;text-align:center}
.coins-l{font-size:10px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.coins-v{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--gold)}
.ps-acts{display:flex;gap:8px;margin-top:14px}
.ps-ab{flex:1;padding:13px;border-radius:14px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:.15s}
.ps-ab.pr{background:linear-gradient(135deg,var(--b5),var(--b4));color:#fff}
.ps-ab.sc{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--t2)}
.olrow{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mu);justify-content:center;margin-top:10px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.on{background:var(--gn);box-shadow:0 0 6px var(--gn)}
.dot.off{background:var(--mu)}

/* ── SERVICE ITEM ── */
.svc-item{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;margin-bottom:10px}
.svc-icon{font-size:28px;flex-shrink:0}
.svc-info{flex:1}
.svc-name{font-weight:600;font-size:15px}
.svc-desc{font-size:12px;color:var(--mu);margin-top:2px}
.svc-btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.svc-btn.connect{background:linear-gradient(135deg,var(--b5),var(--b4));color:#fff}
.svc-btn.wip{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--mu);cursor:default}

/* ── PEOPLE LIST ── */
.ulit{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:14px;cursor:pointer;transition:.15s}
.ulit:active{background:var(--gl)}
.ulav{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;overflow:hidden}
.ulav img{width:100%;height:100%;object-fit:cover}
.ulnm{font-weight:600;font-size:14px;display:flex;align-items:center;gap:4px}
.ulhl{font-size:12px;color:var(--mu);margin-top:1px}

/* ── ADMIN STAT ── */
.adm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.adm-stat{padding:16px;background:rgba(36,104,200,.07);border:1px solid var(--border);border-radius:14px;text-align:center}
.adm-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--b3)}
.adm-lbl{font-size:11px;color:var(--mu);margin-top:4px}
.adm-cmd{padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.adm-cmd-n{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--b3)}
.adm-cmd-d{font-size:12px;color:var(--mu);margin-top:3px}

/* ── FORWARD MODAL ── */
.fw-chat{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:12px;cursor:pointer;transition:.15s}
.fw-chat:active{background:var(--gl)}
.fw-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.fw-check.on{background:var(--b4);border-color:var(--b4)}

/* ── NOTIFY ── */
.ntf{position:fixed;top:calc(16px + var(--st));left:50%;transform:translateX(-50%) translateY(-130%);z-index:500;background:rgba(6,16,36,.94);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:16px;padding:13px 20px;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:transform .32s cubic-bezier(.34,1.56,.64,1);max-width:90vw}
.ntf.show{transform:translateX(-50%) translateY(0)}

/* ── UTILS ── */
.g0{background:linear-gradient(135deg,#1e5fb8,#4a9cf8)}
.g1{background:linear-gradient(135deg,#0f3460,#2468c8)}
.g2{background:linear-gradient(135deg,#1a237e,#3949ab)}
.g3{background:linear-gradient(135deg,#004d40,#00897b)}
.g4{background:linear-gradient(135deg,#bf360c,#e64a19)}
.g5{background:linear-gradient(135deg,#4a148c,#7b1fa2)}
.g6{background:linear-gradient(135deg,#1b5e20,#388e3c)}
.g7{background:linear-gradient(135deg,#e65100,#f57c00)}
</style>
</head>
<body>
<div class="bg"><div class="bg-o o1"></div><div class="bg-o o2"></div><div class="bg-o o3"></div></div>

<!-- ── AUTH ── -->
<div id="auth">
  <div class="logo"><div class="logo-ic">⚡</div><h1>Flux <span>Messenger</span></h1></div>
  <div class="auth-card">
    <div class="tabs">
      <button class="tab on" id="tl">Войти</button>
      <button class="tab" id="tr">Регистрация</button>
    </div>
    <div class="form show" id="fl">
      <div><div class="lbl">Email</div><input class="inp" id="le" type="email" placeholder="you@example.com" autocomplete="email"></div>
      <div><div class="lbl">Пароль</div><input class="inp" id="lp" type="password" placeholder="••••••••"></div>
      <div id="lerr" class="err" style="display:none"></div>
      <button class="btn" id="lbtn">Войти ⚡</button>
    </div>
    <div class="form" id="fr">
      <div><div class="lbl">Email</div><input class="inp" id="re" type="email" placeholder="you@example.com"></div>
      <div><div class="lbl">Имя / Ник</div><input class="inp" id="rn" type="text" placeholder="Ваше имя"></div>
      <div><div class="lbl">Username (@)</div><input class="inp" id="ru" type="text" placeholder="lowercase_only"></div>
      <div><div class="lbl">Пароль</div><input class="inp" id="rp" type="password" placeholder="Минимум 6 символов"></div>
      <div id="rerr" class="err" style="display:none"></div>
      <button class="btn" id="rbtn">⚡ Зарегистрировать Flux ID</button>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app" class="hide">

  <!-- CHATS VIEW -->
  <div id="vchats">
    <div class="tbar">
      <div class="tbar-title">Flux <span>Messenger</span></div>
      <button class="iBtn" id="dmBtn" title="Новое ЛС">✉️</button>
      <div class="myav on" id="myav"></div>
    </div>
    <div class="sbar"><div class="si"><span style="color:var(--mu)">🔍</span><input type="search" placeholder="Поиск чатов…" id="sinp"></div></div>
    <div class="pills">
      <button class="pill on" data-f="all">Все</button>
      <button class="pill" data-f="dm">👤 ЛС</button>
      <button class="pill" data-f="group">👥 Группы</button>
      <button class="pill" data-f="channel">📢 Каналы</button>
    </div>
    <div class="clist" id="clist"></div>
    <button class="fab" id="fabBtn">➕</button>
    <div class="bnav">
      <button class="ni on" id="nav-chats"><span class="ni-ic">💬</span>Чаты</button>
      <button class="ni" id="nav-people"><span class="ni-ic">👥</span>Люди</button>
      <button class="ni" id="nav-settings"><span class="ni-ic">⚙️</span>Настройки</button>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="vchat">
    <div class="chdr">
      <button class="bkBtn" id="backBtn">‹</button>
      <div class="chav" id="chav"></div>
      <div class="chi"><div class="chn" id="chn"></div><div class="chs" id="chs"></div></div>
      <div style="display:flex;gap:6px">
        <button class="iBtn" id="infoBtn">ℹ️</button>
        <button class="iBtn" id="admBtn" style="display:none">⚙️</button>
      </div>
    </div>
    <div class="pban" id="pban">📌 <span id="pban-txt">Закреплено</span></div>
    <div class="msgs" id="msgs"></div>
    <div class="reply-bar" id="rbar">
      <div style="font-size:18px;color:var(--b3)">↩️</div>
      <div class="rb-info"><div class="rb-name" id="rb-name"></div><div class="rb-text" id="rb-text"></div></div>
      <button class="rb-close" id="rbar-close">✕</button>
    </div>
    <div id="wwrap">
      <div class="iarea">
        <div class="estrip">
          <button class="eBtn" data-e="😀">😀</button><button class="eBtn" data-e="❤️">❤️</button>
          <button class="eBtn" data-e="👍">👍</button><button class="eBtn" data-e="😂">😂</button>
          <button class="eBtn" data-e="🔥">🔥</button><button class="eBtn" data-e="✨">✨</button>
          <button class="eBtn" data-e="⚡">⚡</button><button class="eBtn" data-e="🎉">🎉</button>
          <button class="eBtn" data-e="😍">😍</button><button class="eBtn" data-e="💯">💯</button>
          <button class="eBtn" data-e="🙏">🙏</button><button class="eBtn" data-e="😭">😭</button>
        </div>
        <div class="irow">
          <textarea class="minp" id="minp" placeholder="Сообщение…" rows="1"></textarea>
          <button class="sBtn" id="sendBtn">➤</button>
        </div>
      </div>
    </div>
    <div id="rowrap" style="display:none"><div class="ro-ban">📢 Только администраторы могут писать</div></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="vsettings">
    <div class="tbar"><div class="tbar-title">⚙️ <span>Настройки</span></div></div>
    <div class="sett-wrap" id="sett-wrap"></div>
    <div class="bnav">
      <button class="ni" id="snav-chats"><span class="ni-ic">💬</span>Чаты</button>
      <button class="ni" id="snav-people"><span class="ni-ic">👥</span>Люди</button>
      <button class="ni on"><span class="ni-ic">⚙️</span>Настройки</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mov hide" id="mov"><div class="modal"><div class="mhdl"></div><div id="mbody"></div></div></div>
<!-- NOTIFY -->
<div class="ntf" id="ntf"><span id="nic"></span><span id="ntx"></span></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────
var me=null, chats=[], users={}, activeChat=null, filt='all';
var rfTimer=null, hbTimer=null, sending=false, cmsgs=[], lastTs=0;
var replyTo=null; // {id, nick, text}
var fwdMsgId=null; // for forward
var selectedFwd=new Set();

// ── API ────────────────────────────────────────────────────────────
async function api(method,path,body){
  try{
    var o={method:method,credentials:'include',headers:{'Content-Type':'application/json'}};
    if(body) o.body=JSON.stringify(body);
    var r=await fetch('/api'+path,o);
    var d=await r.json();
    if(!r.ok) return{error:d.error||'Ошибка'};
    return d;
  }catch(e){return{error:'Нет соединения'};}
}

// ── UTILS ──────────────────────────────────────────────────────────
function esc(s){return s?(s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function gr(s){var h=0;for(var i=0;i<(s||'').length;i++)h=(h*31+s.charCodeAt(i))&0xff;return'g'+(h%8)}
function ft(ts){if(!ts)return'';var d=new Date(ts),n=new Date();if(d.toDateString()===n.toDateString())return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString('ru',{day:'numeric',month:'short'})}
function fm(t){if(!t)return'';var s=esc(t);s=s.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:var(--b3)">$1</a>');s=s.replace(/@(\w+)/g,'<strong style="color:var(--b3)">@$1</strong>');s=s.replace(/\n/g,'<br>');return s}
function isOnline(u){if(!u)return false;if(u.privacy&&u.privacy.hide_online&&u.id!==me.id)return false;return!!(u.online&&Date.now()-u.last_seen<15000)}

// ── AVATAR ────────────────────────────────────────────────────────
function avH(u,sz,r){
  sz=sz||36; r=r||'50%';
  if(!u) return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(sz*.38|0)+'px" class="g0">?</div>';
  if(u.privacy&&u.privacy.hide_avatar&&u.id!==me.id)
    return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(sz*.38|0)+'px" class="'+gr(u.id)+'">?</div>';
  if(u.avatar) return '<img src="'+u.avatar+'" style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';object-fit:cover">';
  return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(sz*.38|0)+'px" class="'+gr(u.id)+'">'+(u.nick||'?')[0].toUpperCase()+'</div>';
}

// ── BADGE ─────────────────────────────────────────────────────────
function verBadge(u){
  if(!u) return '';
  if(u.role==='creator'&&u.username==='bloody') return '<span class="vbg" title="Создатель">✓</span>';
  if(u.premium) return '<span class="vgold" title="Flux Premium">✓</span>';
  if(u.role==='creator') return '<span class="vbg" title="Создатель">✓</span>';
  return '';
}
function chatVerBadge(c){
  if(!c) return '';
  if(c.verified) return '<span class="vbg">✓</span>';
  return '';
}

// ── NOTIFY ────────────────────────────────────────────────────────
var _ntTimer=null;
function notify(ic,tx){
  document.getElementById('nic').textContent=ic;
  document.getElementById('ntx').textContent=tx;
  var el=document.getElementById('ntf');el.classList.add('show');
  clearTimeout(_ntTimer);_ntTimer=setTimeout(function(){el.classList.remove('show');},3000);
}

// ── CHAT NAMES ────────────────────────────────────────────────────
function cName(c){if(c.type==='dm'){var o=users[c.members.filter(function(m){return m!==me.id})[0]];return o?o.nick:'Пользователь';}return c.name||''}
function cAv(c,sz,r){
  sz=sz||50; r=r||'16px';
  if(c.type==='dm'){var oId=c.members.filter(function(m){return m!==me.id})[0];return avH(users[oId],sz,'50%');}
  return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-size:'+(sz*.44|0)+'px" class="'+gr(c.id)+'">'+(c.icon||(c.name||'?')[0])+'</div>';
}
function isCAdmin(cid){
  var c=chats.find(function(x){return x.id===cid});
  if(!c)return false;
  return me.role==='creator'||me.role==='admin'||(c.admins&&c.admins.includes(me.id))||(c.creator_id===me.id);
}

// ── AUTH ──────────────────────────────────────────────────────────
document.getElementById('tl').addEventListener('click',function(){
  this.classList.add('on');document.getElementById('tr').classList.remove('on');
  document.getElementById('fl').classList.add('show');document.getElementById('fr').classList.remove('show');
});
document.getElementById('tr').addEventListener('click',function(){
  this.classList.add('on');document.getElementById('tl').classList.remove('on');
  document.getElementById('fr').classList.add('show');document.getElementById('fl').classList.remove('show');
});
document.getElementById('lbtn').addEventListener('click',async function(){
  var email=document.getElementById('le').value.trim().toLowerCase();
  var pass=document.getElementById('lp').value;
  var err=document.getElementById('lerr');err.style.display='none';
  if(!email||!pass){err.textContent='Заполните все поля';err.style.display='block';return;}
  this.disabled=true;this.textContent='Входим…';
  var res=await api('POST','/login',{email:email,password:pass});
  this.disabled=false;this.textContent='Войти ⚡';
  if(res.error){err.textContent=res.error;err.style.display='block';return;}
  me=res.user;enterApp();
});
document.getElementById('rbtn').addEventListener('click',async function(){
  var email=document.getElementById('re').value.trim().toLowerCase();
  var nick=document.getElementById('rn').value.trim();
  var username=document.getElementById('ru').value.trim().toLowerCase();
  var pass=document.getElementById('rp').value;
  var err=document.getElementById('rerr');err.style.display='none';
  this.disabled=true;this.textContent='Создаём…';
  var res=await api('POST','/register',{email:email,nick:nick,username:username,password:pass});
  this.disabled=false;this.textContent='⚡ Зарегистрировать Flux ID';
  if(res.error){err.textContent=res.error;err.style.display='block';return;}
  me=res.user;enterApp();
});

// ── APP ENTRY ─────────────────────────────────────────────────────
async function enterApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').classList.remove('hide');
  renderMyAv();await loadAll();renderCList();startTimers();showView('chats');
  notify('⚡','Добро пожаловать, '+me.nick+'!');
}

async function doLogout(){
  await api('POST','/logout');
  me=null;activeChat=null;chats=[];users={};
  clearInterval(rfTimer);clearInterval(hbTimer);
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').classList.add('hide');
  closeM();
}

async function loadAll(){
  var r1=await api('GET','/chats');
  var r2=await api('GET','/users');
  if(!r1.error)chats=r1;
  if(!r2.error){r2.forEach(function(u){users[u.id]=u;});}
  users[me.id]=me;
}

function startTimers(){
  clearInterval(rfTimer);clearInterval(hbTimer);
  hbTimer=setInterval(function(){api('POST','/users/heartbeat');},8000);
  rfTimer=setInterval(async function(){
    await loadAll();renderCList(true);
    if(activeChat)await pollM();
  },2500);
}

// ── MY AVATAR ────────────────────────────────────────────────────
function renderMyAv(){
  var el=document.getElementById('myav');
  el.innerHTML=avH(me,36,'50%');
  if(isOnline(me))el.classList.add('on');else el.classList.remove('on');
}

// ── VIEWS ─────────────────────────────────────────────────────────
function showView(v){
  document.getElementById('vchats').style.display=v==='chats'?'flex':'none';
  document.getElementById('vchat').style.display=v==='chat'?'flex':'none';
  document.getElementById('vsettings').style.display=v==='settings'?'flex':'none';
  if(v==='settings')renderSettings();
}

// ── CHAT LIST ─────────────────────────────────────────────────────
function renderCList(){
  renderMyAv();
  var q=(document.getElementById('sinp').value||'').trim().toLowerCase();
  var cs=chats.filter(function(c){return c.members&&c.members.includes(me.id)});
  if(filt!=='all')cs=cs.filter(function(c){return c.type===filt});
  if(q)cs=cs.filter(function(c){return cName(c).toLowerCase().includes(q)});
  cs.sort(function(a,b){return(b.member_pinned?1:0)-(a.member_pinned?1:0)});
  var el=document.getElementById('clist');
  if(!cs.length){el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--mu);font-size:14px">Нет чатов<br><span style="font-size:36px">💬</span></div>';return;}
  el.innerHTML=cs.map(function(c){
    var nm=cName(c);
    var av=cAv(c,50,c.type==='dm'?'50%':'16px');
    var pin=c.member_pinned?'📌 ':'';
    var vb=c.type==='dm'?verBadge(users[c.members.find(function(m){return m!==me.id})]):chatVerBadge(c);
    return '<div class="ci'+(activeChat===c.id?' sel':'')+(c.member_pinned?' pinned-c':'')+'" data-id="'+c.id+'">'
      +'<div class="ciav'+(c.type==='dm'?' dm':'')+'">'+av+'</div>'
      +'<div class="cin"><div class="cin-nm">'+(pin?'<span>'+pin+'</span>':'')+esc(nm)+vb+'</div>'
      +'<div class="cin-sub">'+(c.username?'@'+c.username+' · ':'')+c.members.length+' уч.</div></div></div>';
  }).join('');
  el.querySelectorAll('.ci').forEach(function(el){
    el.addEventListener('click',function(){openChat(this.dataset.id);});
    // Long press → pin menu
    var t;
    el.addEventListener('touchstart',function(){t=setTimeout(function(){showChatCtx(el.dataset.id);},600);});
    el.addEventListener('touchend',function(){clearTimeout(t);});
    el.addEventListener('mousedown',function(){t=setTimeout(function(){showChatCtx(el.dataset.id);},700);});
    el.addEventListener('mouseup',function(){clearTimeout(t);});
  });
}

function showChatCtx(cid){
  var c=chats.find(function(x){return x.id===cid});if(!c)return;
  var ip=c.member_pinned;
  showM('<div class="mhdr"><div class="mtit">'+esc(cName(c))+'</div><button class="mcls" id="ctxc">✕</button></div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +'<button class="btn sec" id="ctx-pin">'+(ip?'📌 Открепить':'📌 Закрепить')+'</button>'
    +(isCAdmin(cid)||me.role==='creator'?'<button class="btn red" id="ctx-del">🗑️ Удалить чат</button>':'')
    +'</div>');
  document.getElementById('ctxc').addEventListener('click',closeM);
  document.getElementById('ctx-pin').addEventListener('click',async function(){
    await api('POST','/chats/'+cid+'/pin-chat',{pinned:!ip});
    closeM();await loadAll();renderCList();notify('✅',ip?'Откреплено':'Закреплено');
  });
  var db=document.getElementById('ctx-del');
  if(db)db.addEventListener('click',function(){closeM();confirmDel(cid);});
}

document.querySelectorAll('.pill').forEach(function(p){
  p.addEventListener('click',function(){
    document.querySelectorAll('.pill').forEach(function(x){x.classList.remove('on');});
    p.classList.add('on');filt=p.dataset.f;renderCList();
  });
});
document.getElementById('sinp').addEventListener('input',function(){renderCList();});

// ── OPEN CHAT ─────────────────────────────────────────────────────
async function openChat(cid){
  var c=chats.find(function(x){return x.id===cid});if(!c)return;
  activeChat=cid;cmsgs=[];lastTs=0;replyTo=null;
  showView('chat');
  var av=document.getElementById('chav');
  if(c.type==='dm'){
    var oId=c.members.find(function(m){return m!==me.id});
    var o=users[oId];
    av.className='chav dm';av.innerHTML=avH(o,36,'50%');
    document.getElementById('chn').innerHTML=esc(o?o.nick:'?')+verBadge(o);
    var on=isOnline(o);
    document.getElementById('chs').innerHTML='<span class="dot '+(on?'on':'off')+'" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle"></span>'+(on?'В сети':'Не в сети');
  } else {
    av.className='chav';av.innerHTML=cAv(c,36,'12px');
    document.getElementById('chn').innerHTML=(c.type==='channel'?'📢 ':'')+esc(c.name)+chatVerBadge(c);
    document.getElementById('chs').textContent=(c.username?'@'+c.username+' · ':'')+c.members.length+' участников';
  }
  var canA=isCAdmin(cid);
  document.getElementById('admBtn').style.display=canA?'flex':'none';
  var canW=c.type!=='channel'||canA;
  document.getElementById('wwrap').style.display=canW?'block':'none';
  document.getElementById('rowrap').style.display=canW?'none':'block';
  renderCList(true);
  await loadM();
}

document.getElementById('backBtn').addEventListener('click',function(){
  activeChat=null;cmsgs=[];lastTs=0;clearReply();showView('chats');renderCList();
});

// ── MESSAGES ──────────────────────────────────────────────────────
async function loadM(){
  if(!activeChat)return;
  var res=await api('GET','/chats/'+activeChat+'/messages?since=0');
  if(res.error)return;
  cmsgs=res;if(res.length)lastTs=res[res.length-1].timestamp;
  renderM();updatePBanner();
}

async function pollM(){
  if(!activeChat)return;
  var res=await api('GET','/chats/'+activeChat+'/messages?since=0');
  if(res.error)return;
  if(res.length!==cmsgs.length){cmsgs=res;if(res.length)lastTs=res[res.length-1].timestamp;renderM();updatePBanner();}
}

function updatePBanner(){
  var pinned=cmsgs.find(function(m){return m.pinned&&!m.system});
  var ban=document.getElementById('pban');
  if(pinned){
    document.getElementById('pban-txt').textContent=pinned.text||'Сообщение';
    ban.classList.add('show');
    ban.onclick=function(){var el=document.querySelector('[data-mid="'+pinned.id+'"]');if(el)el.scrollIntoView({behavior:'smooth'});};
  }else{ban.classList.remove('show');}
}

var EMOJIS=['❤️','😂','👍','🔥','😮','😢','👏','🎉'];

function renderM(){
  var area=document.getElementById('msgs');
  var atB=area.scrollHeight-area.scrollTop-area.clientHeight<100;
  var h='';var ld='';
  cmsgs.forEach(function(m){
    var d=new Date(m.timestamp);
    var ds=d.toLocaleDateString('ru',{day:'numeric',month:'long'});
    if(ds!==ld){h+='<div class="dsep">'+ds+'</div>';ld=ds;}
    if(m.system){h+='<div class="smsg">'+esc(m.text)+'</div>';return;}
    var own=m.sender_id===me.id;
    var sdr=users[m.sender_id]||{id:m.sender_id,nick:m.sender_nick||'?',avatar:null};
    var c=chats.find(function(x){return x.id===activeChat});
    var showSdr=!own&&c&&c.type!=='dm';

    // Reply preview
    var repH='';
    if(m.reply_to_msg){
      repH='<div class="reply-preview" data-scroll="'+m.reply_to+'"><div class="rp-name">'+esc(m.reply_to_msg.sender_nick||'?')+'</div><div class="rp-text">'+esc((m.reply_to_msg.text||'').substring(0,80))+'</div></div>';
    }

    // Forwarded
    var fwdH='';
    if(m.forwarded_from){
      fwdH='<div class="fwd-from">↪️ Пересланное от '+esc(m.forwarded_from)+'</div>';
    }

    // Reactions
    var rxH='';
    if(m.reactions&&m.reactions.length){
      rxH='<div class="rx-bar">'+m.reactions.map(function(r){
        return '<div class="rx'+(m.my_reaction===r.emoji?' mine':'')+'" data-mid="'+m.id+'" data-em="'+r.emoji+'">'+r.emoji+'<span>'+r.cnt+'</span></div>';
      }).join('')+'</div>';
    }

    // Actions
    var actH='<div class="mac-wrap">'
      +'<button class="mac react-btn" data-mid="'+m.id+'">😊</button>'
      +'<button class="mac reply-btn" data-mid="'+m.id+'" data-nick="'+esc(m.sender_nick||'?')+'" data-text="'+esc((m.text||'').substring(0,80))+'">↩️</button>'
      +'<button class="mac fwd-btn" data-mid="'+m.id+'">↪️</button>'
      +(own||isCAdmin(activeChat)?'<button class="mac del-btn" data-mid="'+m.id+'">🗑️</button>':'')
      +(isCAdmin(activeChat)?'<button class="mac pin-btn" data-mid="'+m.id+'" data-p="'+(m.pinned?'1':'0')+'">📌</button>':'')
      +'</div>';

    h+='<div class="mrow'+(own?' own':'')+'" data-mid="'+m.id+'">'
      +actH
      +(!own?'<div class="mav" data-uid="'+m.sender_id+'">'+avH(sdr,28,'50%')+'</div>':'')
      +'<div class="mbub">'
      +(showSdr?'<div class="msdr">'+esc(sdr.nick)+verBadge(sdr)+'</div>':'')
      +(m.pinned?'<div style="font-size:10px;color:var(--b3);margin-bottom:4px">📌 Закреплено</div>':'')
      +repH+fwdH
      +(m.text?'<div>'+fm(m.text)+'</div>':'')
      +rxH
      +'<div class="mtime">'+ft(m.timestamp)+'</div>'
      +'</div>'
      +(own?'<div class="mav">'+avH(me,28,'50%')+'</div>':'')
      +'</div>';
  });
  area.innerHTML=h||'<div style="text-align:center;padding:60px 20px;color:var(--mu);font-size:14px">Нет сообщений<br><span style="font-size:36px">👋</span></div>';

  // Bind events
  area.querySelectorAll('.mav[data-uid]').forEach(function(el){
    el.style.cursor='pointer';
    el.addEventListener('click',function(){showUP(this.dataset.uid);});
  });
  area.querySelectorAll('.react-btn').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();showEmojiPicker(this.dataset.mid,this);});
  });
  area.querySelectorAll('.reply-btn').forEach(function(el){
    el.addEventListener('click',function(){
      setReply(this.dataset.mid,this.dataset.nick,this.dataset.text);
    });
  });
  area.querySelectorAll('.fwd-btn').forEach(function(el){
    el.addEventListener('click',function(){showForwardModal(this.dataset.mid);});
  });
  area.querySelectorAll('.del-btn').forEach(function(el){
    el.addEventListener('click',async function(){
      if(!confirm('Удалить?'))return;
      var res=await api('POST','/messages/'+this.dataset.mid+'/delete');
      if(res.error){notify('❌',res.error);return;}
      await loadM();
    });
  });
  area.querySelectorAll('.pin-btn').forEach(function(el){
    el.addEventListener('click',async function(){
      var p=this.dataset.p==='1';

  area.querySelectorAll('.rx').forEach(function(el){
    el.addEventListener('click',async function(){

  area.querySelectorAll('.reply-preview').forEach(function(el){
    el.addEventListener('click',function(){
      var t=document.querySelector('[data-mid="'+this.dataset.scroll+'"]');
      if(t)t.scrollIntoView({behavior:'smooth'});

  });

}

// ── FORWARD MODAL ─────────────────────────────────────────────────
function showForwardModal(mid){
  fwdMsgId=mid;selectedFwd.clear();
  var myChats=chats.filter(function(c){return c.members&&c.members.includes(me.id)});
  var h='<div class="mhdr"><div class="mtit">↪️ Переслать</div><button class="mcls" id="fwdc">✕</button></div>';
  h+='<div style="margin-bottom:14px;color:var(--t2);font-size:13px">Выбери чаты:</div>';
  h+=myChats.map(function(c){
    return '<div class="fw-chat" data-cid="'+c.id+'">'
      +'<div class="fw-check" data-cid="'+c.id+'"></div>'
      +'<div class="ciav '+(c.type==='dm'?'dm':'')+'" style="width:36px;height:36px;border-radius:'+(c.type==='dm'?'50%':'10px')+'">'+cAv(c,36,c.type==='dm'?'50%':'10px')+'</div>'
      +'<div style="font-size:14px;font-weight:600">'+esc(cName(c))+'</div>'
      +'</div>';
  }).join('');
  h+='<button class="btn" id="fwd-ok" style="margin-top:14px">↪️ Переслать</button>';
  showM(h);
  document.getElementById('fwdc').addEventListener('click',closeM);
  document.querySelectorAll('.fw-chat').forEach(function(el){
    el.addEventListener('click',function(){
      var cid=this.dataset.cid;
      var chk=this.querySelector('.fw-check');
      if(selectedFwd.has(cid)){selectedFwd.delete(cid);chk.classList.remove('on');chk.textContent='';}
      else{selectedFwd.add(cid);chk.classList.add('on');chk.textContent='✓';}
    });
  });
  document.getElementById('fwd-ok').addEventListener('click',async function(){
    if(!selectedFwd.size){notify('❌','Выбери хотя бы один чат');return;}
    var res=await api('POST','/messages/'+fwdMsgId+'/forward',{chat_ids:Array.from(selectedFwd)});
    if(res.error){notify('❌',res.error);return;}
    closeM();notify('✅','Переслано в '+res.forwarded_to.length+' чат(ов)');
  });
}

// ── EMOJI PICKER ──────────────────────────────────────────────────
function showEmojiPicker(mid,btn){
  document.querySelectorAll('.emoji-picker').forEach(function(el){el.remove();});
  var picker=document.createElement('div');
  picker.style.cssText='position:fixed;background:rgba(6,16,36,.96);border:1px solid var(--border);border-radius:12px;padding:6px;display:flex;flex-wrap:wrap;gap:4px;z-index:50;max-width:200px;';
  var rect=btn.getBoundingClientRect();
  picker.style.bottom=(window.innerHeight-rect.top+8)+'px';
  picker.style.left=Math.min(rect.left,window.innerWidth-220)+'px';
  EMOJIS.forEach(function(em){
    var b=document.createElement('button');
    b.style.cssText='background:none;border:none;font-size:22px;padding:5px;cursor:pointer;border-radius:8px;';
    b.textContent=em;
    b.addEventListener('click',async function(){
      picker.remove();
      await api('POST','/messages/'+mid+'/react',{emoji:em});
      await pollM();
    });
    picker.appendChild(b);
  });
  document.body.appendChild(picker);
  setTimeout(function(){document.addEventListener('click',function rmPicker(){picker.remove();document.removeEventListener('click',rmPicker);});},100);
}

document.getElementById('sendBtn').addEventListener('click',sendMsg);
document.getElementById('minp').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
document.getElementById('minp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
document.querySelectorAll('.eBtn').forEach(function(b){b.addEventListener('click',function(){var i=document.getElementById('minp');i.value+=this.dataset.e;i.focus();});});

async function sendMsg(){
  var inp=document.getElementById('minp');
  var text=inp.value.trim();
  if(!text||!activeChat||sending)return;
  sending=true;
  var body={text:text};
  if(replyTo)body.reply_to=replyTo.id;
  var res=await api('POST','/chats/'+activeChat+'/messages',body);
  sending=false;inp.value='';inp.style.height='auto';clearReply();
  if(res.error){notify('❌',res.error);return;}
  if(res.command){
    notify('✅','Команда выполнена');
    await loadAll();await loadM();renderCList(true);
    if(res.deleted_chat){activeChat=null;showView('chats');renderCList();}
    return;
  }
  cmsgs.push(res);lastTs=res.timestamp;renderM();
}

  var h='<div class="mhdr"><div class="mtit">➕ Добавить участника</div><button class="mcls" id="amc">✕</button></div>';
  if(!nonM.length)h+='<p style="text-align:center;color:var(--mu);padding:20px 0">Все уже в чате</p>';
  h+=nonM.map(function(u){return '<div class="ulit" data-uid="'+u.id+'"><div class="ulav">'+avH(u,44,'50%')+'</div><div><div class="ulnm">'+esc(u.nick)+verBadge(u)+'</div><div class="ulhl">@'+u.username+'</div></div></div>';}).join('');
  showM(h);
  document.getElementById('amc').addEventListener('click',closeM);
  document.querySelectorAll('.ulit[data-uid]').forEach(function(el){
    el.addEventListener('click',async function(){
      var res=await api('POST','/chats/'+cid+'/members',{user_id:this.dataset.uid});
      if(res.error){notify('❌',res.error);return;}
      closeM();await loadAll();renderCList();if(activeChat===cid)await loadM();notify('✅','Добавлен');
    });
  });
}

function confirmDel(cid){
  showM('<div class="mhdr"><div class="mtit" style="color:var(--rd)">⛔ Удалить чат?</div><button class="mcls" id="dcc">✕</button></div>'
    +'<p style="color:var(--t2);font-size:14px;margin-bottom:20px">Все сообщения удалятся навсегда.</p>'
    +'<div style="display:flex;gap:8px"><button class="btn sec" id="dca" style="flex:1">Отмена</button><button class="btn red" id="dco" style="flex:1">Удалить</button></div>');
  document.getElementById('dcc').addEventListener('click',closeM);
  document.getElementById('dca').addEventListener('click',closeM);
  document.getElementById('dco').addEventListener('click',async function(){
    var res=await api('DELETE','/chats/'+cid);
    if(res.error){notify('❌',res.error);return;}
    closeM();activeChat=null;showView('chats');await loadAll();renderCList();notify('✅','Удалён');
  });
}

// ── PEOPLE ────────────────────────────────────────────────────────
async function showPeople(){
  var res=await api('GET','/users');
  var us=res.error?Object.values(users).filter(function(u){return u.id!==me.id}):res;
  var h='<div class="mhdr"><div class="mtit">👥 Пользователи</div><button class="mcls" id="ppc">✕</button></div>';
  if(!us.length)h+='<p style="text-align:center;color:var(--mu);padding:20px 0">Нет пользователей</p>';
  h+=us.map(function(u){
    var on=isOnline(u);
    return '<div class="ulit" data-uid="'+u.id+'">'
      +'<div class="ulav" style="position:relative">'+avH(u,44,'50%')+'<span class="dot '+(on?'on':'off')+'" style="position:absolute;bottom:1px;right:1px;border:2px solid #050d1f"></span></div>'
      +'<div><div class="ulnm">'+esc(u.nick)+verBadge(u)+'</div><div class="ulhl">@'+u.username+' · '+(on?'В сети':'Оффлайн')+'</div></div>'
      +'</div>';
  }).join('');
  showM(h);
  document.getElementById('ppc').addEventListener('click',closeM);
  document.querySelectorAll('.ulit[data-uid]').forEach(function(el){
    el.addEventListener('click',function(){closeM();showUP(this.dataset.uid);});
  });
}

// ── MODAL ─────────────────────────────────────────────────────────
function showM(h){document.getElementById('mbody').innerHTML=h;document.getElementById('mov').classList.remove('hide');}
function closeM(){document.getElementById('mov').classList.add('hide');}
document.getElementById('mov').addEventListener('click',function(e){if(e.target===this)closeM();});

// ── BOOT ──────────────────────────────────────────────────────────
async function boot(){
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').classList.add('hide');
  var res=await api('GET','/me');
  if(!res.error){me=res;enterApp();}
}

// String.prototype.lstrip polyfill for old browsers
if(!String.prototype.lstrip){String.prototype.lstrip=function(c){c=c||' ';return this.replace(new RegExp('^['+c+']+'),'');};}

window.addEventListener('load',boot);
window.addEventListener('beforeunload',function(){api('POST','/logout');});
</script>
</body>
</html>
