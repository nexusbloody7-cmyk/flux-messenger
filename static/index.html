<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020818">
<title>Flux Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy-900:#020818;--navy-800:#050d1f;
  --blue-500:#1e5fb8;--blue-400:#2979d4;--blue-300:#4a9cf8;
  --glass-hover:rgba(41,121,212,.13);
  --text-primary:#e8f4ff;--text-secondary:rgba(200,228,255,.65);--text-muted:rgba(200,228,255,.35);
  --red:#ff4d6d;--green:#4dffb0;--verified:#4a9cf8;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:64px;--hdr-h:58px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--navy-900);overscroll-behavior:none;}
body{font-family:'DM Sans',sans-serif;color:var(--text-primary);touch-action:manipulation;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.5;pointer-events:none;z-index:0;}
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.13;}
.o1{width:400px;height:400px;background:radial-gradient(circle,#1e5fb8,transparent);top:-150px;left:-100px;}
.o2{width:300px;height:300px;background:radial-gradient(circle,#0f3460,transparent);bottom:-80px;right:-80px;}
.o3{width:250px;height:250px;background:radial-gradient(circle,#2979d4,transparent);top:50%;left:50%;transform:translate(-50%,-50%);}
::-webkit-scrollbar{width:0;height:0;}

/* AUTH */
#auth-screen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 20px calc(20px + var(--safe-bottom));background:radial-gradient(ellipse at 30% 20%,rgba(41,121,212,.15),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(15,52,96,.3),transparent 60%),var(--navy-900);overflow-y:auto;}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.auth-logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 28px rgba(41,121,212,.5);}
.auth-logo h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.5px;}
.auth-logo span{color:var(--blue-300);}
.auth-card{width:100%;max-width:400px;background:rgba(8,20,40,.75);backdrop-filter:blur(40px) saturate(1.5);-webkit-backdrop-filter:blur(40px) saturate(1.5);border:1px solid rgba(74,156,248,.2);border-radius:24px;padding:28px 24px;box-shadow:0 0 60px rgba(41,121,212,.12),0 0 0 1px rgba(255,255,255,.04) inset;position:relative;overflow:hidden;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(74,156,248,.5),transparent);}
.auth-tabs{display:flex;gap:4px;margin-bottom:24px;background:rgba(0,0,0,.25);border-radius:14px;padding:4px;}
.auth-tab{flex:1;padding:10px;border:none;background:transparent;color:var(--text-secondary);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border-radius:10px;cursor:pointer;transition:all .2s;}
.auth-tab.active{background:rgba(41,121,212,.28);color:var(--text-primary);}
.auth-form{display:flex;flex-direction:column;gap:14px;}
.inp-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.auth-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.15);border-radius:14px;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:all .2s;-webkit-appearance:none;}
.auth-input:focus{border-color:rgba(74,156,248,.45);background:rgba(74,156,248,.07);}
.auth-btn{margin-top:6px;padding:16px;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 24px rgba(41,121,212,.4);}
.auth-btn:active{opacity:.9;transform:scale(.98);}
.auth-btn:disabled{opacity:.6;}
.auth-error{padding:11px 14px;background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:12px;color:var(--red);font-size:13px;text-align:center;line-height:1.4;}

/* APP */
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10;padding-top:var(--safe-top);}
#app.hidden{display:none;}
#view-chats{display:flex;flex-direction:column;flex:1;min-height:0;}
#view-chat{display:none;flex-direction:column;flex:1;min-height:0;}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-shrink:0;background:rgba(5,13,31,.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(74,156,248,.09);height:var(--hdr-h);}
.top-bar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;flex:1;}
.top-bar-title span{color:var(--blue-300);}
.my-av{width:36px;height:36px;border-radius:50%;border:2px solid rgba(74,156,248,.35);overflow:hidden;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;position:relative;}
.my-av img{width:100%;height:100%;object-fit:cover;}
.my-av.online::after{content:'';position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--navy-800);}
.tbar-btn{width:38px;height:38px;border:none;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.12);border-radius:12px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;}
.tbar-btn:active{background:var(--glass-hover);}

/* SEARCH */
.search-bar{padding:10px 14px;flex-shrink:0;}
.search-inner{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.12);border-radius:14px;padding:10px 14px;}
.search-inner input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-size:15px;font-family:'DM Sans',sans-serif;}
.search-inner input::placeholder{color:var(--text-muted);}

/* PILLS */
.filter-pills{display:flex;gap:8px;padding:0 14px 10px;overflow-x:auto;flex-shrink:0;}
.filter-pills::-webkit-scrollbar{display:none;}
.pill{padding:7px 16px;border-radius:20px;border:1px solid rgba(74,156,248,.15);background:rgba(255,255,255,.04);color:var(--text-muted);font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;flex-shrink:0;}
.pill.active{background:rgba(41,121,212,.22);border-color:rgba(74,156,248,.35);color:var(--blue-300);font-weight:600;}
.pill:active{opacity:.75;}

/* CHAT LIST */
.chat-list{flex:1;overflow-y:auto;padding:0 10px 8px;-webkit-overflow-scrolling:touch;}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:16px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;}
.chat-item:active{background:var(--glass-hover);}
.chat-item.active-chat{background:rgba(41,121,212,.18);border-color:rgba(74,156,248,.2);}
.ci-av{width:50px;height:50px;border-radius:16px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;position:relative;}
.ci-av.round{border-radius:50%;}
.ci-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
.ci-prev{font-size:13px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.ci-time{font-size:11px;color:var(--text-muted);}
.verified-badge{color:var(--verified);font-size:13px;flex-shrink:0;}

/* FAB */
.fab{position:absolute;right:16px;bottom:calc(var(--nav-h) + 16px + var(--safe-bottom));width:54px;height:54px;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));border-radius:18px;border:none;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 4px 24px rgba(41,121,212,.5);z-index:5;}
.fab:active{transform:scale(.93);}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:rgba(5,13,31,.75);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-top:1px solid rgba(74,156,248,.1);padding-bottom:var(--safe-bottom);flex-shrink:0;height:calc(var(--nav-h) + var(--safe-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;padding:6px 4px;font-size:11px;font-weight:500;}
.nav-item.active{color:var(--blue-300);}
.nav-item .ni{font-size:22px;line-height:1;}
.nav-item:active{opacity:.7;}

/* CHAT VIEW */
.chat-header{display:flex;align-items:center;gap:10px;padding:10px 14px;flex-shrink:0;background:rgba(5,13,31,.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(74,156,248,.09);height:var(--hdr-h);}
.back-btn{width:36px;height:36px;border:none;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.12);border-radius:12px;color:var(--text-secondary);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.back-btn:active{background:var(--glass-hover);}
.ch-av{width:36px;height:36px;border-radius:12px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;}
.ch-av.round{border-radius:50%;}
.ch-av img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
.ch-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
.ch-actions{display:flex;gap:6px;}

/* MESSAGES */
.messages-area{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch;}
.date-sep{display:flex;align-items:center;gap:10px;padding:10px 0;color:var(--text-muted);font-size:11px;font-weight:600;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:rgba(74,156,248,.1);}
.sys-msg{text-align:center;padding:5px 14px;background:rgba(41,121,212,.07);border:1px solid rgba(74,156,248,.1);border-radius:20px;font-size:11px;color:var(--text-muted);margin:3px auto;max-width:85%;}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeUp .18s ease;}
.msg-row.own{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.msg-av img{width:100%;height:100%;object-fit:cover;}
.msg-bubble{max-width:72%;padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg-row:not(.own) .msg-bubble{background:rgba(13,31,63,.75);backdrop-filter:blur(10px);border:1px solid rgba(74,156,248,.12);border-bottom-left-radius:4px;}
.msg-row.own .msg-bubble{background:linear-gradient(135deg,rgba(30,95,184,.75),rgba(41,121,212,.6));border:1px solid rgba(74,156,248,.22);border-bottom-right-radius:4px;box-shadow:0 2px 14px rgba(41,121,212,.18);}
.msg-sender{font-size:11px;font-weight:700;color:var(--blue-300);margin-bottom:3px;display:flex;align-items:center;gap:3px;}
.msg-time{font-size:10px;color:var(--text-muted);margin-top:4px;text-align:right;}
.msg-row:not(.own) .msg-time{text-align:left;}

/* INPUT */
.input-area{padding:10px 12px;padding-bottom:calc(10px + var(--safe-bottom));background:rgba(5,13,31,.6);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(74,156,248,.09);flex-shrink:0;}
.emoji-strip{display:flex;gap:2px;padding-bottom:8px;overflow-x:auto;}
.emoji-strip::-webkit-scrollbar{display:none;}
.em-btn{background:none;border:none;font-size:22px;padding:4px 6px;border-radius:8px;cursor:pointer;flex-shrink:0;}
.em-btn:active{transform:scale(1.2);}
.input-row{display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.15);border-radius:18px;padding:10px 14px;}
.input-row:focus-within{border-color:rgba(74,156,248,.4);background:rgba(74,156,248,.06);}
.msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.4;resize:none;max-height:100px;}
.msg-input::placeholder{color:var(--text-muted);}
.send-btn{width:38px;height:38px;border:none;flex-shrink:0;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));border-radius:12px;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 14px rgba(41,121,212,.35);cursor:pointer;}
.send-btn:active{transform:scale(.92);}
.send-btn:disabled{opacity:.5;}
.readonly-banner{padding:14px;text-align:center;background:rgba(41,121,212,.07);border-top:1px solid rgba(74,156,248,.1);color:var(--text-muted);font-size:13px;padding-bottom:calc(14px + var(--safe-bottom));}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(2,8,24,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal{width:100%;max-width:500px;background:rgba(8,20,40,.92);backdrop-filter:blur(40px) saturate(1.5);-webkit-backdrop-filter:blur(40px) saturate(1.5);border:1px solid rgba(74,156,248,.2);border-radius:24px 24px 0 0;padding:16px 20px calc(20px + var(--safe-bottom));box-shadow:0 -20px 60px rgba(0,0,0,.4);max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 18px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.modal-close{width:32px;height:32px;border:none;background:rgba(255,255,255,.08);border-radius:10px;color:var(--text-secondary);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.modal-close:active{background:rgba(255,77,109,.15);}
.modal-form{display:flex;flex-direction:column;gap:14px;}
.modal-input{width:100%;padding:14px;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.15);border-radius:14px;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
.modal-input:focus{border-color:rgba(74,156,248,.4);}
.modal-btn{padding:14px;background:linear-gradient(135deg,var(--blue-500),var(--blue-400));border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(41,121,212,.35);}
.modal-btn:active{opacity:.9;}
.modal-btn:disabled{opacity:.6;}
.modal-btn.secondary{background:rgba(255,255,255,.07);color:var(--text-secondary);box-shadow:none;border:1px solid rgba(74,156,248,.15);}
.modal-btn.danger{background:linear-gradient(135deg,#c0392b,#e74c3c);}
.modal-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}

/* PROFILE SHEET */
.ps-av{width:88px;height:88px;border-radius:50%;margin:0 auto 14px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;border:3px solid rgba(74,156,248,.3);box-shadow:0 0 30px rgba(41,121,212,.25);}
.ps-av img{width:100%;height:100%;object-fit:cover;}
.ps-name{text-align:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px;}
.ps-handle{text-align:center;color:var(--text-muted);font-size:13px;margin-top:2px;}
.ps-role{display:inline-flex;margin:8px auto 0;padding:4px 14px;background:rgba(41,121,212,.15);border:1px solid rgba(74,156,248,.2);border-radius:20px;font-size:11px;font-weight:700;color:var(--blue-300);letter-spacing:.05em;}
.ps-stats{display:flex;gap:1px;background:rgba(74,156,248,.08);border:1px solid rgba(74,156,248,.1);border-radius:16px;overflow:hidden;margin-top:14px;}
.ps-stat{flex:1;padding:14px 8px;text-align:center;background:rgba(255,255,255,.02);}
.ps-stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.ps-stat-lbl{font-size:10px;color:var(--text-muted);margin-top:2px;}
.ps-actions{display:flex;gap:8px;margin-top:14px;}
.ps-act-btn{flex:1;padding:13px;border-radius:14px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;}
.ps-act-btn:active{opacity:.8;}
.ps-act-btn.primary{background:linear-gradient(135deg,var(--blue-500),var(--blue-400));color:#fff;box-shadow:0 2px 14px rgba(41,121,212,.35);}
.ps-act-btn.secondary{background:rgba(255,255,255,.07);border:1px solid rgba(74,156,248,.15);color:var(--text-secondary);}
.online-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}
.dot.off{background:var(--text-muted);}

/* USER LIST */
.ul-item{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:14px;cursor:pointer;}
.ul-item:active{background:var(--glass-hover);}
.ul-av{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;overflow:hidden;position:relative;}
.ul-av img{width:100%;height:100%;object-fit:cover;}
.ul-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:4px;}
.ul-handle{font-size:12px;color:var(--text-muted);margin-top:1px;}

/* ADMIN GRID */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.admin-card{padding:16px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(74,156,248,.1);border-radius:14px;text-align:center;cursor:pointer;}
.admin-card:active{background:rgba(41,121,212,.12);}
.ac-icon{font-size:26px;margin-bottom:6px;}
.ac-label{font-size:12px;font-weight:600;color:var(--text-secondary);}

/* SPINNER */
.spinner{width:20px;height:20px;border:2px solid rgba(74,156,248,.3);border-top-color:var(--blue-300);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* NOTIFICATION */
.notif{position:fixed;top:calc(16px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-120%);z-index:500;background:rgba(8,20,40,.92);backdrop-filter:blur(20px);border:1px solid rgba(74,156,248,.2);border-radius:16px;padding:13px 18px;font-size:13px;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.35);display:flex;align-items:center;gap:8px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;}
.notif.show{transform:translateX(-50%) translateY(0);}

/* GRADIENTS */
.g0{background:linear-gradient(135deg,#1e5fb8,#4a9cf8);}
.g1{background:linear-gradient(135deg,#0f3460,#2979d4);}
.g2{background:linear-gradient(135deg,#1a237e,#3949ab);}
.g3{background:linear-gradient(135deg,#004d40,#00897b);}
.g4{background:linear-gradient(135deg,#bf360c,#e64a19);}
.g5{background:linear-gradient(135deg,#4a148c,#7b1fa2);}
.g6{background:linear-gradient(135deg,#1b5e20,#388e3c);}
.g7{background:linear-gradient(135deg,#e65100,#f57c00);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">
    <div class="auth-logo-icon">⚡</div>
    <h1>Flux <span>Messenger</span></h1>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('login')">Войти</button>
      <button class="auth-tab" onclick="authTab('register')">Регистрация</button>
    </div>
    <div id="f-login" class="auth-form">
      <div><div class="inp-lbl">Email</div><input class="auth-input" id="l-email" type="email" placeholder="you@example.com" autocomplete="email"></div>
      <div><div class="inp-lbl">Пароль</div><input class="auth-input" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <div id="l-err" class="auth-error" style="display:none;"></div>
      <button class="auth-btn" id="login-btn" onclick="doLogin()">Войти ⚡</button>
    </div>
    <div id="f-reg" class="auth-form" style="display:none;">
      <div><div class="inp-lbl">Email</div><input class="auth-input" id="r-email" type="email" placeholder="you@example.com" autocomplete="email"></div>
      <div><div class="inp-lbl">Ник</div><input class="auth-input" id="r-nick" type="text" placeholder="Ваше имя"></div>
      <div><div class="inp-lbl">Username (@)</div><input class="auth-input" id="r-user" type="text" placeholder="username"></div>
      <div><div class="inp-lbl">Пароль</div><input class="auth-input" id="r-pass" type="password" placeholder="Минимум 6 символов" autocomplete="new-password"></div>
      <div id="r-err" class="auth-error" style="display:none;"></div>
      <button class="auth-btn" id="reg-btn" onclick="doRegister()">Создать аккаунт ✨</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <!-- ЧАТЫ LIST -->
  <div id="view-chats">
    <div class="top-bar">
      <div class="top-bar-title">Flux <span>Messenger</span></div>
      <button class="tbar-btn" onclick="showNewDM()">✉️</button>
      <div class="my-av online" id="my-av" onclick="openMyProfile()"></div>
    </div>
    <div class="search-bar">
      <div class="search-inner">
        <span>🔍</span>
        <input type="search" placeholder="Поиск чатов..." id="search-inp" oninput="renderChatList()">
      </div>
    </div>
    <div class="filter-pills">
      <button class="pill active" onclick="filterPill(this,'all')">Все</button>
      <button class="pill" onclick="filterPill(this,'dm')">👤 ЛС</button>
      <button class="pill" onclick="filterPill(this,'group')">👥 Группы</button>
      <button class="pill" onclick="filterPill(this,'channel')">📢 Каналы</button>
    </div>
    <div class="chat-list" id="chat-list"></div>
    <button class="fab" onclick="showFabMenu()">➕</button>
    <div class="bottom-nav">
      <button class="nav-item active"><span class="ni">💬</span>Чаты</button>
      <button class="nav-item" onclick="showPeopleModal()"><span class="ni">👥</span>Люди</button>
      <button class="nav-item" onclick="openMyProfile()"><span class="ni">👤</span>Профиль</button>
    </div>
  </div>

  <!-- ОТКРЫТЫЙ ЧАТ -->
  <div id="view-chat">
    <div class="chat-header">
      <button class="back-btn" onclick="goBack()">‹</button>
      <div class="ch-av" id="chav"></div>
      <div class="ch-info">
        <div class="ch-name" id="chname"></div>
        <div class="ch-sub" id="chsub"></div>
      </div>
      <div class="ch-actions">
        <button class="tbar-btn" onclick="showChatInfo()">ℹ️</button>
        <button class="tbar-btn" id="chat-adm-btn" onclick="showChatAdminPanel()" style="display:none;">⚙️</button>
      </div>
    </div>
    <div class="messages-area" id="msgs-area"></div>
    <div id="write-wrap">
      <div class="input-area">
        <div class="emoji-strip">
          <button class="em-btn" onclick="addEmoji('😀')">😀</button>
          <button class="em-btn" onclick="addEmoji('❤️')">❤️</button>
          <button class="em-btn" onclick="addEmoji('👍')">👍</button>
          <button class="em-btn" onclick="addEmoji('😂')">😂</button>
          <button class="em-btn" onclick="addEmoji('🔥')">🔥</button>
          <button class="em-btn" onclick="addEmoji('✨')">✨</button>
          <button class="em-btn" onclick="addEmoji('⚡')">⚡</button>
          <button class="em-btn" onclick="addEmoji('🎉')">🎉</button>
          <button class="em-btn" onclick="addEmoji('😍')">😍</button>
          <button class="em-btn" onclick="addEmoji('💯')">💯</button>
        </div>
        <div class="input-row">
          <textarea class="msg-input" id="msg-inp" placeholder="Сообщение..." rows="1"
            onkeydown="onKey(event)" oninput="resize(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
    <div id="ro-wrap" style="display:none;">
      <div class="readonly-banner">📢 Только администраторы могут писать в канале</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-ov" onclick="modalBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- NOTIF -->
<div class="notif" id="notif"><span id="notif-ic"></span><span id="notif-tx"></span></div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let me = null;
let allChats = [];
let allUsers = {};
let activeChat = null;
let activeChatMessages = [];
let lastMsgTimestamp = 0;
let chatFilter = 'all';
let refreshTimer = null;
let heartbeatTimer = null;
let sending = false;

// ═══════════════════════════════════════════════════════
// API HELPER
// ═══════════════════════════════════════════════════════
async function api(method, path, body) {
  try {
    const opts = {
      method,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api' + path, opts);
    const data = await res.json();
    if (!res.ok) return { error: data.error || 'Ошибка сервера', status: res.status };
    return data;
  } catch (e) {
    return { error: 'Нет соединения' };
  }
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
const esc = s => s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const grad = s => { let h=0; for(let c of s) h=(h*31+c.charCodeAt(0))&0xff; return 'g'+(h%8); };

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts), n = new Date();
  if (d.toDateString() === n.toDateString())
    return d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
  return d.toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
}

function fmtMsg(text) {
  if (!text) return '';
  let t = esc(text);
  t = t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--blue-300);">$1</a>');
  t = t.replace(/@(\w+)/g, '<strong style="color:var(--blue-300);">@$1</strong>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function avatarHtml(user, size=36, radius='50%') {
  if (!user) return `<div style="width:${size}px;height:${size}px;border-radius:${radius};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${Math.floor(size*.4)}px;" class="g0">?</div>`;
  if (user.avatar) return `<img src="${user.avatar}" style="width:${size}px;height:${size}px;border-radius:${radius};object-fit:cover;">`;
  return `<div style="width:${size}px;height:${size}px;border-radius:${radius};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${Math.floor(size*.4)}px;" class="${grad(user.id)}">${(user.nick||'?')[0].toUpperCase()}</div>`;
}

function getChatDisplayName(c) {
  if (c.type === 'dm') {
    const othId = c.members.find(m => m !== me.id);
    const oth = allUsers[othId];
    return oth ? oth.nick : 'Пользователь';
  }
  return c.name || '';
}

function getChatAvatar(c, size=50, radius='16px') {
  if (c.type === 'dm') {
    const othId = c.members.find(m => m !== me.id);
    return avatarHtml(allUsers[othId], size, '50%');
  }
  if (c.avatar) return `<img src="${c.avatar}" style="width:${size}px;height:${size}px;border-radius:${radius};object-fit:cover;">`;
  return `<div style="width:${size}px;height:${size}px;border-radius:${radius};display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size*.44)}px;" class="${grad(c.id)}">${c.icon || (c.name||'?')[0]}</div>`;
}

let notifTimer = null;
function notify(icon, text) {
  const el = document.getElementById('notif');
  document.getElementById('notif-ic').textContent = icon;
  document.getElementById('notif-tx').textContent = text;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
function authTab(t) {
  document.querySelectorAll('.auth-tab').forEach((b,i) =>
    b.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
  document.getElementById('f-login').style.display = t==='login' ? 'flex' : 'none';
  document.getElementById('f-reg').style.display   = t==='register' ? 'flex' : 'none';
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim().toLowerCase();
  const pass  = document.getElementById('l-pass').value;
  const err   = document.getElementById('l-err');
  err.style.display = 'none';
  if (!email || !pass) { err.textContent='Заполните все поля'; err.style.display='block'; return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Входим...';

  const res = await api('POST', '/login', { email, password: pass });
  btn.disabled = false; btn.textContent = 'Войти ⚡';

  if (res.error) { err.textContent = res.error; err.style.display = 'block'; return; }
  me = res.user;
  enterApp();
}

async function doRegister() {
  const email    = document.getElementById('r-email').value.trim().toLowerCase();
  const nick     = document.getElementById('r-nick').value.trim();
  const username = document.getElementById('r-user').value.trim().toLowerCase();
  const pass     = document.getElementById('r-pass').value;
  const err      = document.getElementById('r-err');
  err.style.display = 'none';

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Создаём...';

  const res = await api('POST', '/register', { email, nick, username, password: pass });
  btn.disabled = false; btn.textContent = 'Создать аккаунт ✨';

  if (res.error) { err.textContent = res.error; err.style.display = 'block'; return; }
  me = res.user;
  enterApp();
}

async function doLogout() {
  await api('POST', '/logout');
  me = null; activeChat = null;
  clearInterval(refreshTimer); clearInterval(heartbeatTimer);
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').classList.add('hidden');
  closeModal();
}

// ═══════════════════════════════════════════════════════
// ENTER APP
// ═══════════════════════════════════════════════════════
async function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  renderMyAv();
  await loadChatsAndUsers();
  renderChatList();
  startTimers();
  notify('⚡', 'Добро пожаловать, ' + me.nick + '!');
}

async function loadChatsAndUsers() {
  const [chatsRes, usersRes] = await Promise.all([
    api('GET', '/chats'),
    api('GET', '/users'),
  ]);
  if (!chatsRes.error) allChats = chatsRes;
  if (!usersRes.error) {
    allUsers = {};
    usersRes.forEach(u => { allUsers[u.id] = u; });
    // Add self
    allUsers[me.id] = me;
  }
}

function startTimers() {
  clearInterval(refreshTimer); clearInterval(heartbeatTimer);

  heartbeatTimer = setInterval(() => api('POST', '/users/heartbeat'), 8000);

  refreshTimer = setInterval(async () => {
    await loadChatsAndUsers();
    renderChatList(true);
    if (activeChat) await pollMessages();
  }, 2000);
}

function renderMyAv() {
  const el = document.getElementById('my-av');
  el.innerHTML = avatarHtml(me, 36, '50%');
}

// ═══════════════════════════════════════════════════════
// CHAT LIST
// ═══════════════════════════════════════════════════════
function renderChatList(silent=false) {
  renderMyAv();
  const q = (document.getElementById('search-inp')?.value || '').trim().toLowerCase();

  let chats = [...allChats];
  if (chatFilter !== 'all') chats = chats.filter(c => c.type === chatFilter);
  if (q) chats = chats.filter(c => getChatDisplayName(c).toLowerCase().includes(q));

  // Sort: pinned first, then by last message time (use id as proxy)
  chats.sort((a,b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return 0;
  });

  const list = document.getElementById('chat-list');
  if (!chats.length) {
    list.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;">Нет чатов<br><span style="font-size:32px;">💬</span></div>`;
    return;
  }

  list.innerHTML = chats.map(c => {
    const name = getChatDisplayName(c);
    const avHtml = getChatAvatar(c, 50, c.type==='dm'?'50%':'16px');
    const prefix = c.pinned ? '⚡ ' : c.type==='channel' ? '📢 ' : '';
    const isOtherCreator = c.type==='dm' && isCreatorId(c.members.find(m=>m!==me.id));

    return `<div class="chat-item ${activeChat===c.id?'active-chat':''}" onclick="openChat('${c.id}')">
      <div class="ci-av">${avHtml}</div>
      <div class="ci-info">
        <div class="ci-name">${prefix?`<span>${prefix}</span>`:''}<span>${esc(name)}</span>${isOtherCreator?'<span class="verified-badge" style="font-size:12px;">✓</span>':''}</div>
        <div class="ci-prev">${esc(c.type==='dm'?'Нажмите для открытия':''+c.members.length+' участников')}</div>
      </div>
    </div>`;
  }).join('');
}

function filterPill(btn, f) {
  chatFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderChatList();
}

function isCreatorId(id) {
  const u = allUsers[id];
  return u && u.role === 'creator';
}
function isAdminId(id) {
  const u = allUsers[id];
  return u && (u.role === 'admin' || u.role === 'creator');
}
function isChatAdmin(chatId) {
  const c = allChats.find(x => x.id === chatId);
  if (!c) return false;
  return me.role === 'creator' || me.role === 'admin' || (c.admins && c.admins.includes(me.id));
}

// ═══════════════════════════════════════════════════════
// OPEN CHAT
// ═══════════════════════════════════════════════════════
async function openChat(chatId) {
  const c = allChats.find(x => x.id === chatId);
  if (!c) return;

  activeChat = chatId;
  activeChatMessages = [];
  lastMsgTimestamp = 0;

  document.getElementById('view-chats').style.display = 'none';
  const vc = document.getElementById('view-chat');
  vc.style.display = 'flex'; vc.style.flexDirection = 'column';

  // Header
  const chav = document.getElementById('chav');
  if (c.type === 'dm') {
    const othId = c.members.find(m => m !== me.id);
    const oth = allUsers[othId];
    chav.className = 'ch-av round';
    chav.innerHTML = avatarHtml(oth, 36, '50%');
    document.getElementById('chname').innerHTML = esc(oth?.nick||'?') + (isCreatorId(othId)?'<span class="verified-badge" style="font-size:12px;margin-left:3px;">✓</span>':'');
    const isOn = oth?.online;
    document.getElementById('chsub').innerHTML = `<span class="dot ${isOn?'on':'off'}" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle;"></span>${isOn?'В сети':'Не в сети'}`;
  } else {
    chav.className = 'ch-av';
    chav.innerHTML = getChatAvatar(c, 36, '12px');
    document.getElementById('chname').textContent = (c.type==='channel'?'📢 ':'')+c.name;
    document.getElementById('chsub').textContent = `${c.members.length} участников`;
  }

  const canAdmin = isChatAdmin(chatId);
  document.getElementById('chat-adm-btn').style.display = canAdmin ? 'flex' : 'none';
  const canWrite = c.type !== 'channel' || canAdmin;
  document.getElementById('write-wrap').style.display = canWrite ? 'block' : 'none';
  document.getElementById('ro-wrap').style.display     = canWrite ? 'none'  : 'block';

  renderChatList(true);
  await loadMessages();
}

function goBack() {
  activeChat = null;
  activeChatMessages = [];
  lastMsgTimestamp = 0;
  document.getElementById('view-chat').style.display = 'none';
  document.getElementById('view-chats').style.display = 'flex';
  renderChatList();
}

// ═══════════════════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════════════════
async function loadMessages() {
  if (!activeChat) return;
  const res = await api('GET', `/chats/${activeChat}/messages?since=0`);
  if (res.error) return;
  activeChatMessages = res;
  if (res.length) lastMsgTimestamp = res[res.length-1].timestamp;
  renderMessages();
}

async function pollMessages() {
  if (!activeChat) return;
  // Всегда тянем ВСЕ сообщения заново — так все видят всё
  const res = await api('GET', `/chats/${activeChat}/messages?since=0`);
  if (res.error) return;
  // Обновляем только если количество изменилось
  if (res.length !== activeChatMessages.length) {
    activeChatMessages = res;
    if (res.length) lastMsgTimestamp = res[res.length-1].timestamp;
    renderMessages();
  }
}

function renderMessages() {
  const area = document.getElementById('msgs-area');
  const atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;

  let html = '';
  let lastDate = '';
  activeChatMessages.forEach(m => {
    const d = new Date(m.timestamp);
    const ds = d.toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
    if (ds !== lastDate) { html += `<div class="date-sep">${ds}</div>`; lastDate = ds; }

    if (m.system) { html += `<div class="sys-msg">${esc(m.text)}</div>`; return; }

    const own = m.sender_id === me.id;
    const sender = allUsers[m.sender_id] || { id: m.sender_id, nick: m.sender_nick||'?', avatar: null };
    const c = allChats.find(x => x.id === activeChat);
    const showSender = !own && c?.type !== 'dm';

    html += `<div class="msg-row ${own?'own':''}">
      ${!own ? `<div class="msg-av" onclick="showUserProfile('${m.sender_id}')">${avatarHtml(sender, 28, '50%')}</div>` : ''}
      <div class="msg-bubble">
        ${showSender ? `<div class="msg-sender">${esc(sender.nick)}${isCreatorId(m.sender_id)?'<span class="verified-badge" style="font-size:10px;">✓</span>':''}</div>` : ''}
        <div>${fmtMsg(m.text)}</div>
        <div class="msg-time">${fmtTime(m.timestamp)}</div>
      </div>
      ${own ? `<div class="msg-av">${avatarHtml(me, 28, '50%')}</div>` : ''}
    </div>`;
  });

  area.innerHTML = html || `<div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;line-height:1.8;">Нет сообщений<br><span style="font-size:32px;">👋</span></div>`;
  if (atBottom || activeChatMessages.length === 0) area.scrollTop = area.scrollHeight;
}

async function sendMsg() {
  const inp = document.getElementById('msg-inp');
  const text = inp.value.trim();
  if (!text || !activeChat || sending) return;

  sending = true;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  const res = await api('POST', `/chats/${activeChat}/messages`, { text });

  sending = false;
  btn.disabled = false;
  inp.value = ''; inp.style.height = 'auto';

  if (res.error) { notify('❌', res.error); return; }

  // If it was a command, refresh
  if (res.command) {
    notify('✅', 'Команда выполнена');
    await loadMessages();
    await loadChatsAndUsers();
    renderChatList(true);
    return;
  }

  // Regular message — append locally and update lastTs
  activeChatMessages.push(res);
  lastMsgTimestamp = res.timestamp;
  renderMessages();
}

function onKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function resize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function addEmoji(e) { const i=document.getElementById('msg-inp'); i.value+=e; i.focus(); }

// ═══════════════════════════════════════════════════════
// CREATE CHATS
// ═══════════════════════════════════════════════════════
function showNewDM() {
  const others = Object.values(allUsers).filter(u => u.id !== me.id);
  let html = `<div class="modal-header"><div class="modal-title">💬 Новое ЛС</div><button class="modal-close" onclick="closeModal()">✕</button></div>`;
  if (!others.length) { html += `<p style="text-align:center;color:var(--text-muted);padding:20px 0;">Нет пользователей</p>`; showModal(html); return; }
  html += others.map(u => `<div class="ul-item" onclick="startDM('${u.id}')">
    <div class="ul-av">${avatarHtml(u, 44, '50%')}</div>
    <div><div class="ul-name">${esc(u.nick)}${u.role==='creator'?'<span class="verified-badge" style="font-size:11px;">✓</span>':''}</div><div class="ul-handle">@${u.username}</div></div>
  </div>`).join('');
  showModal(html);
}

async function startDM(userId) {
  closeModal();
  const res = await api('POST', '/chats/dm', { user_id: userId });
  if (res.error) { notify('❌', res.error); return; }
  await loadChatsAndUsers();
  renderChatList();

function openMyProfile() { showUserProfile(me.id); }

async function showUserProfile(userId) {
  // Refresh user data
  const res = await api('GET', `/users/${userId}`);
  const u = res.error ? (allUsers[userId] || me) : res;
  if (!res.error) allUsers[userId] = u;

  const roleLabels = { creator:'👑 Создатель', admin:'🛡️ Администратор', user:'👤 Пользователь' };
  const isOn = u.online;

  let actBtns = '';
  if (u.id === me.id) {
    actBtns = `<button class="ps-act-btn secondary" onclick="closeModal();showEditProfile()">✏️ Редактировать</button>
               <button class="ps-act-btn secondary" onclick="doLogout()">🚪 Выйти</button>`;
  } else {
    actBtns = `<button class="ps-act-btn primary" onclick="closeModal();startDM('${u.id}')">✉️ Написать</button>`;
  }

  let adminSec = '';
  if ((me.role==='admin'||me.role==='creator') && u.id!==me.id && u.role!=='creator') {
    adminSec = `<div style="border-top:1px solid rgba(74,156,248,.1);margin-top:14px;padding-top:14px;">
      <div class="modal-lbl" style="margin-bottom:8px;">Управление</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <button class="modal-btn secondary" onclick="adminUserAction('${u.id}','${u.banned?'unban':'ban'}')">${u.banned?'✅ Разбанить':'🔨 Заблокировать'}</button>
        <button class="modal-btn secondary" onclick="adminUserAction('${u.id}','${u.muted?'unmute':'mute'}')">${u.muted?'🔊 Размьютить':'🔇 Замьютить'}</button>
        ${me.role==='creator'?`<button class="modal-btn secondary" onclick="closeModal();showGiveRole('${u.id}')">👑 Назначить роль</button>`:''}
      </div>
    </div>`;
  }

  const fluxIdBlock = u.flux_id ? `
    <div style="margin-top:10px;padding:10px 14px;background:rgba(41,121,212,.08);border:1px solid rgba(74,156,248,.15);border-radius:12px;text-align:center;">
      <div style="font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;">Flux ID</div>
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--blue-300);">⚡ ${u.flux_id}</div>
    </div>` : '';

  const linkedServices = (u.linked_services||[]).length > 0 ? `
    <div style="margin-top:10px;">
      <div style="font-size:11px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">Привязанные сервисы</div>
      ${(u.linked_services||[]).map(s => `
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(74,156,248,.1);border-radius:10px;margin-bottom:6px;">
          <span style="font-size:18px;">${serviceIcon(s.service)}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;font-weight:600;">${esc(s.service)}</div>
            <div style="font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(s.value)}</div>
          </div>
        </div>`).join('')}
    </div>` : '';

  const linkBtn = u.id === me.id ? `
    <button class="modal-btn secondary" style="margin-top:8px;" onclick="closeModal();showLinkService()">🔗 Привязать сервис</button>` : '';

  showModal(`<div style="padding:0 4px;">
    <div class="ps-av">${avatarHtml(u, 88, '50%')}</div>
    <div class="ps-name">${esc(u.nick)}${u.role==='creator'?'<span class="verified-badge">✓</span>':''}</div>
    <div class="ps-handle">@${u.username}</div>
    <div style="text-align:center;"><span class="ps-role">${roleLabels[u.role]||'Пользователь'}</span></div>
    ${fluxIdBlock}
    <div class="online-row" style="justify-content:center;margin-top:10px;">
      <span class="dot ${isOn?'on':'off'}"></span>
      <span>${isOn ? 'В сети' : 'Был(а) '+fmtTime(u.last_seen)}</span>
    </div>
    ${linkedServices}
    <div class="ps-actions">${actBtns}</div>
    ${linkBtn}
    ${adminSec}
  </div>`);
}

function serviceIcon(s) {
  const icons = { telegram:'✈️', instagram:'📸', youtube:'▶️', tiktok:'🎵', twitter:'🐦', discord:'💬', github:'💻', vk:'💙', twitch:'🎮', spotify:'🎧' };
  return icons[s.toLowerCase()] || '🔗';
}

  <div class="modal-form">

      <select class="modal-input" id="ls-service" style="background:rgba(255,255,255,.06);color:var(--text-primary);">

  me = { ...me, linked_services: res.user.linked_services };

function showEditProfile() {
  showModal(`<div class="modal-header"><div class="modal-title">✏️ Редактировать профиль</div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="modal-form">
    <div style="text-align:center;">
      <div id="ep-av" style="width:80px;height:80px;border-radius:50%;margin:0 auto 10px;overflow:hidden;border:3px solid rgba(74,156,248,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;" onclick="document.getElementById('av-file').click()">
        ${avatarHtml(me, 80, '50%')}
      </div>
      <input type="file" id="av-file" accept="image/*" style="display:none" onchange="previewAv(event)">
      <div style="font-size:12px;color:var(--text-muted);">Нажми для смены фото</div>
    </div>
    <div><div class="modal-lbl">Ник</div><input class="modal-input" id="ep-nick" value="${esc(me.nick)}"></div>
    <div><div class="modal-lbl">Username</div><input class="modal-input" id="ep-user" value="${esc(me.username)}"></div>
    <button class="modal-btn" onclick="saveProfile()">Сохранить ✅</button>
  </div>`);
}

function previewAv(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    const el = document.getElementById('ep-av');
    el.innerHTML = `<img src="${ev.target.result}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">`;
    el.dataset.av = ev.target.result;
  };
  r.readAsDataURL(file);
}

async function saveProfile() {
  const nick     = document.getElementById('ep-nick').value.trim();
  const username = document.getElementById('ep-user').value.trim().toLowerCase();
  const avEl     = document.getElementById('ep-av');
  const avatar   = avEl.dataset.av || me.avatar;

  if (!nick || !username) { notify('❌', 'Заполни поля'); return; }

  const res = await api('PUT', '/users/me/profile', { nick, username, avatar });
  if (res.error) { notify('❌', res.error); return; }

  me = { ...me, ...res };
  allUsers[me.id] = me;
  closeModal();
  renderMyAv();
  renderChatList();
  notify('✅', 'Профиль обновлён!');
}

async function saveChat() {
  const name = document.getElementById('ec-n').value.trim();
  const desc = document.getElementById('ec-d').value.trim();
  const icon = document.getElementById('ec-i').value.trim();

  const res = await api('PUT', `/chats/${activeChat}`, { name, description:desc, icon });
  if (res.error) { notify('❌', res.error); return; }
  closeModal();
  await loadChatsAndUsers();
  renderChatList();
  openChat(activeChat);
  notify('✅', 'Обновлено');

function showAddMember(chatId) {
  const c = allChats.find(x => x.id === chatId);
  const nonM = Object.values(allUsers).filter(u => u.id !== me.id && !c.members.includes(u.id));
  let html = `<div class="modal-header"><div class="modal-title">➕ Добавить участника</div><button class="modal-close" onclick="closeModal()">✕</button></div>`;
  if (!nonM.length) { html += `<p style="text-align:center;color:var(--text-muted);padding:20px 0;">Все уже в чате</p>`; showModal(html); return; }
  html += nonM.map(u => `<div class="ul-item" onclick="addMember('${chatId}','${u.id}')">
    <div class="ul-av">${avatarHtml(u, 44, '50%')}</div>
    <div><div class="ul-name">${esc(u.nick)}</div><div class="ul-handle">@${u.username}</div></div>
  </div>`).join('');
  showModal(html);
}

async function addMember(chatId, userId) {
  const res = await api('POST', `/chats/${chatId}/members`, { user_id: userId });
  if (res.error) { notify('❌', res.error); return; }
  closeModal();
  await loadChatsAndUsers();
  renderChatList();
  notify('✅', 'Участник добавлен');
  if (activeChat === chatId) await loadMessages();
}

async function leaveChat(chatId) {
  const res = await api('POST', `/chats/${chatId}/leave`);
  if (res.error) { notify('❌', res.error); return; }
  goBack();
  await loadChatsAndUsers();
  renderChatList();
  notify('✅', 'Вы покинули чат');
}

async function showPeopleModal() {
  const res = await api('GET', '/users');
  const users = res.error ? Object.values(allUsers).filter(u=>u.id!==me.id) : res;
  let html = `<div class="modal-header"><div class="modal-title">👥 Пользователи</div><button class="modal-close" onclick="closeModal()">✕</button></div>`;
  if (!users.length) { html += `<p style="text-align:center;color:var(--text-muted);padding:20px 0;">Нет пользователей</p>`; showModal(html); return; }
  html += users.map(u => {
    const isOn = u.online;
    return `<div class="ul-item" onclick="closeModal();showUserProfile('${u.id}')">
      <div class="ul-av" style="position:relative;">${avatarHtml(u, 44, '50%')}<span class="dot ${isOn?'on':'off'}" style="position:absolute;bottom:1px;right:1px;border:2px solid var(--navy-800);"></span></div>
      <div><div class="ul-name">${esc(u.nick)}${u.role==='creator'?'<span class="verified-badge" style="font-size:11px;">✓</span>':''}</div><div class="ul-handle">@${u.username} · ${isOn?'В сети':'Оффлайн'}</div></div>
    </div>`;
  }).join('');
  showModal(html);
}
