<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#020818">
<title>Flux Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--b5:#1e5fb8;--b4:#2979d4;--b3:#4a9cf8;--tx:#e8f4ff;--t2:rgba(200,228,255,.65);--mu:rgba(200,228,255,.35);--rd:#ff4d6d;--gn:#4dffb0;--gl:rgba(41,121,212,.13);--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#020818;overscroll-behavior:none;}
body{font-family:'DM Sans',sans-serif;color:var(--tx);}
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.13;}
.o1{width:400px;height:400px;background:radial-gradient(circle,#1e5fb8,transparent);top:-150px;left:-100px;}
.o2{width:300px;height:300px;background:radial-gradient(circle,#0f3460,transparent);bottom:-80px;right:-80px;}
.o3{width:250px;height:250px;background:radial-gradient(circle,#2979d4,transparent);top:50%;left:50%;transform:translate(-50%,-50%);}

/* AUTH */
#auth{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 20%,rgba(41,121,212,.15),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(15,52,96,.3),transparent 60%),#020818;overflow-y:auto;}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.logo-ic{width:48px;height:48px;background:linear-gradient(135deg,var(--b5),var(--b4));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;}
.logo h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
.logo span{color:var(--b3);}
.card{width:100%;max-width:400px;background:rgba(8,20,40,.8);backdrop-filter:blur(40px);border:1px solid rgba(74,156,248,.2);border-radius:24px;padding:28px 24px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(74,156,248,.5),transparent);}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:rgba(0,0,0,.25);border-radius:14px;padding:4px;}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--t2);font-size:15px;font-weight:500;border-radius:10px;cursor:pointer;}
.tab.on{background:rgba(41,121,212,.28);color:var(--tx);}
.form{display:none;flex-direction:column;gap:14px;}
.form.show{display:flex;}
.lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:6px;}
.inp{width:100%;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.15);border-radius:14px;color:var(--tx);font-size:16px;outline:none;-webkit-appearance:none;font-family:'DM Sans',sans-serif;}
.inp:focus{border-color:rgba(74,156,248,.45);background:rgba(74,156,248,.07);}
.btn{padding:14px;background:linear-gradient(135deg,var(--b5),var(--b4));border:none;border-radius:14px;color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;}
.btn:active{opacity:.9;} .btn:disabled{opacity:.6;}
.btn.sec{background:rgba(255,255,255,.07);color:var(--t2);border:1px solid rgba(74,156,248,.15);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;}
.btn.red{background:linear-gradient(135deg,#c0392b,#e74c3c);}
.btn.grn{background:linear-gradient(135deg,#1b5e20,#388e3c);}
.err{padding:11px 14px;background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:12px;color:var(--rd);font-size:13px;text-align:center;}

/* APP */
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10;padding-top:var(--st);}
#app.hide{display:none;}
#vchats{display:flex;flex-direction:column;flex:1;min-height:0;}
#vchat{display:none;flex-direction:column;flex:1;min-height:0;}
#vsettings{display:none;flex-direction:column;flex:1;min-height:0;overflow-y:auto;}

.tbar{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-shrink:0;background:rgba(5,13,31,.7);backdrop-filter:blur(24px);border-bottom:1px solid rgba(74,156,248,.09);height:58px;}
.tbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;flex:1;}
.tbar-title span{color:var(--b3);}
.iBtn{width:38px;height:38px;border:none;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.12);border-radius:12px;color:var(--t2);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;}
.iBtn:active{background:var(--gl);}
.myav{width:36px;height:36px;border-radius:50%;border:2px solid rgba(74,156,248,.35);overflow:hidden;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;position:relative;}
.myav img{width:100%;height:100%;object-fit:cover;}
.myav.on::after{content:'';position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(--gn);border:2px solid #050d1f;}

.sbar{padding:10px 14px;flex-shrink:0;}
.si{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.12);border-radius:14px;padding:10px 14px;}
.si input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:15px;font-family:'DM Sans',sans-serif;}
.si input::placeholder{color:var(--mu);}

.pills{display:flex;gap:8px;padding:0 14px 10px;overflow-x:auto;flex-shrink:0;}
.pills::-webkit-scrollbar{display:none;}
.pill{padding:7px 16px;border-radius:20px;border:1px solid rgba(74,156,248,.15);background:rgba(255,255,255,.04);color:var(--mu);font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;flex-shrink:0;}
.pill.on{background:rgba(41,121,212,.22);border-color:rgba(74,156,248,.35);color:var(--b3);font-weight:600;}

.clist{flex:1;overflow-y:auto;padding:0 10px 8px;-webkit-overflow-scrolling:touch;}
.ci{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:16px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;position:relative;}
.ci:active{background:var(--gl);}
.ci.sel{background:rgba(41,121,212,.18);border-color:rgba(74,156,248,.2);}
.ci.pinned-chat{border-left:3px solid var(--b3);}
.ciav{width:50px;height:50px;border-radius:16px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;position:relative;}
.ciav.r{border-radius:50%;}
.ciav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.cin{flex:1;min-width:0;}
.cin-nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
.cin-pr{font-size:13px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.vbg{color:var(--b3);font-size:13px;flex-shrink:0;}

.fab{position:absolute;right:16px;bottom:calc(64px + 16px + var(--sb));width:54px;height:54px;background:linear-gradient(135deg,var(--b5),var(--b4));border-radius:18px;border:none;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 4px 24px rgba(41,121,212,.5);z-index:5;}
.fab:active{transform:scale(.93);}

.bnav{display:flex;background:rgba(5,13,31,.75);backdrop-filter:blur(32px);border-top:1px solid rgba(74,156,248,.1);padding-bottom:var(--sb);flex-shrink:0;height:calc(64px + var(--sb));}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--mu);cursor:pointer;padding:6px 4px;font-size:11px;font-weight:500;}
.ni.on{color:var(--b3);}
.ni-ic{font-size:22px;line-height:1;}

/* CHAT */
.chdr{display:flex;align-items:center;gap:10px;padding:10px 14px;flex-shrink:0;background:rgba(5,13,31,.7);backdrop-filter:blur(24px);border-bottom:1px solid rgba(74,156,248,.09);height:58px;}
.bkBtn{width:36px;height:36px;border:none;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.12);border-radius:12px;color:var(--t2);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.chav{width:36px;height:36px;border-radius:12px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;}
.chav.r{border-radius:50%;}
.chav img{width:100%;height:100%;object-fit:cover;}
.chi{flex:1;min-width:0;}
.chn{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
.chs{font-size:11px;color:var(--mu);margin-top:1px;}

/* PINNED MSG BANNER */
.pinned-banner{display:none;background:rgba(41,121,212,.1);border-bottom:1px solid rgba(74,156,248,.15);padding:8px 16px;font-size:12px;color:var(--b3);flex-shrink:0;cursor:pointer;}
.pinned-banner.show{display:flex;align-items:center;gap:8px;}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch;}
.dsep{display:flex;align-items:center;gap:10px;padding:10px 0;color:var(--mu);font-size:11px;font-weight:600;}
.dsep::before,.dsep::after{content:'';flex:1;height:1px;background:rgba(74,156,248,.1);}
.smsg{text-align:center;padding:5px 14px;background:rgba(41,121,212,.07);border:1px solid rgba(74,156,248,.1);border-radius:20px;font-size:11px;color:var(--mu);margin:3px auto;max-width:85%;}
.mrow{display:flex;align-items:flex-end;gap:8px;animation:fu .18s ease;position:relative;}
.mrow.own{flex-direction:row-reverse;}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.mav img{width:100%;height:100%;object-fit:cover;}
.mbub{max-width:72%;padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;position:relative;}
.mrow:not(.own) .mbub{background:rgba(13,31,63,.75);border:1px solid rgba(74,156,248,.12);border-bottom-left-radius:4px;}
.mrow.own .mbub{background:linear-gradient(135deg,rgba(30,95,184,.75),rgba(41,121,212,.6));border:1px solid rgba(74,156,248,.22);border-bottom-right-radius:4px;}
.msdr{font-size:11px;font-weight:700;color:var(--b3);margin-bottom:3px;}
.mtime{font-size:10px;color:var(--mu);margin-top:4px;text-align:right;}
.mrow:not(.own) .mtime{text-align:left;}
.mimg{max-width:100%;border-radius:10px;margin-bottom:4px;cursor:pointer;display:block;}
.mvid{max-width:100%;border-radius:10px;margin-bottom:4px;display:block;}
.reactions-bar{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.reaction{display:flex;align-items:center;gap:3px;padding:3px 8px;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.15);border-radius:12px;font-size:13px;cursor:pointer;}
.reaction.mine{background:rgba(41,121,212,.2);border-color:rgba(74,156,248,.35);}
.reaction span{font-size:11px;color:var(--mu);}
.msg-actions{position:absolute;right:0;top:-32px;display:none;background:rgba(8,20,40,.9);border:1px solid rgba(74,156,248,.2);border-radius:12px;padding:4px;gap:4px;z-index:10;}
.mrow:hover .msg-actions,.mrow:active .msg-actions{display:flex;}
.mrow.own .msg-actions{right:auto;left:0;}
.mac{width:28px;height:28px;border:none;background:transparent;font-size:16px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.mac:active{background:rgba(255,255,255,.1);}

/* INPUT */
.iarea{padding:10px 12px;padding-bottom:calc(10px + var(--sb));background:rgba(5,13,31,.6);backdrop-filter:blur(24px);border-top:1px solid rgba(74,156,248,.09);flex-shrink:0;}
.estrip{display:flex;gap:2px;padding-bottom:8px;overflow-x:auto;}
.estrip::-webkit-scrollbar{display:none;}
.eBtn{background:none;border:none;font-size:22px;padding:4px 6px;cursor:pointer;flex-shrink:0;}
.irow{display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.15);border-radius:18px;padding:10px 14px;}
.irow:focus-within{border-color:rgba(74,156,248,.4);}
.minp{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.4;resize:none;max-height:100px;}
.minp::placeholder{color:var(--mu);}
.sBtn{width:38px;height:38px;border:none;flex-shrink:0;background:linear-gradient(135deg,var(--b5),var(--b4));border-radius:12px;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.sBtn:active{transform:scale(.92);}
.mediaBtn{width:38px;height:38px;border:none;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.12);border-radius:12px;color:var(--t2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.robanner{padding:14px;padding-bottom:calc(14px + var(--sb));text-align:center;background:rgba(41,121,212,.07);border-top:1px solid rgba(74,156,248,.1);color:var(--mu);font-size:13px;}

/* SETTINGS */
.settings-content{padding:16px;}
.settings-section{margin-bottom:24px;}
.settings-section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:12px;padding-left:4px;}
.settings-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(74,156,248,.1);border-radius:14px;cursor:pointer;margin-bottom:8px;}
.settings-item:active{background:var(--gl);}
.settings-item-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0;}
.settings-item-info{flex:1;}
.settings-item-title{font-weight:600;font-size:15px;}
.settings-item-sub{font-size:12px;color:var(--mu);margin-top:2px;}
.settings-item-arrow{color:var(--mu);font-size:18px;}
.toggle{width:44px;height:24px;background:rgba(255,255,255,.1);border-radius:12px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.toggle.on{background:var(--b4);}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s;}
.toggle.on::after{transform:translateX(20px);}

/* ADMIN PANEL */
.admin-panel{padding:16px;}
.admin-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.admin-stat{padding:16px;background:rgba(41,121,212,.08);border:1px solid rgba(74,156,248,.15);border-radius:14px;text-align:center;}
.admin-stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--b3);}
.admin-stat-lbl{font-size:11px;color:var(--mu);margin-top:4px;}
.admin-cmd{padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(74,156,248,.1);border-radius:12px;margin-bottom:8px;cursor:pointer;}
.admin-cmd:active{background:var(--gl);}
.admin-cmd-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--b3);}
.admin-cmd-desc{font-size:12px;color:var(--mu);margin-top:3px;}

/* MODAL */
.mov{position:fixed;inset:0;z-index:200;background:rgba(2,8,24,.75);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;}
.mov.hide{display:none;}
.modal{width:100%;max-width:500px;background:rgba(8,20,40,.92);backdrop-filter:blur(40px);border:1px solid rgba(74,156,248,.2);border-radius:24px 24px 0 0;padding:16px 20px calc(20px + var(--sb));max-height:90vh;overflow-y:auto;}
.mhdl{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 18px;}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.mtitle{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.mclose{width:32px;height:32px;border:none;background:rgba(255,255,255,.08);border-radius:10px;color:var(--t2);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.mform{display:flex;flex-direction:column;gap:14px;}
.minput{width:100%;padding:14px;background:rgba(255,255,255,.06);border:1px solid rgba(74,156,248,.15);border-radius:14px;color:var(--tx);font-size:16px;outline:none;-webkit-appearance:none;font-family:'DM Sans',sans-serif;}
.minput:focus{border-color:rgba(74,156,248,.4);}
.mlbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:6px;}

/* PROFILE SHEET */
.psav{width:88px;height:88px;border-radius:50%;margin:0 auto 14px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;border:3px solid rgba(74,156,248,.3);}
.psav img{width:100%;height:100%;object-fit:cover;}
.psnm{text-align:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px;}
.pshl{text-align:center;color:var(--mu);font-size:13px;margin-top:2px;}
.psrl{display:inline-flex;margin:8px auto 0;padding:4px 14px;background:rgba(41,121,212,.15);border:1px solid rgba(74,156,248,.2);border-radius:20px;font-size:11px;font-weight:700;color:var(--b3);}
.fxid{margin-top:10px;padding:10px 14px;background:rgba(41,121,212,.08);border:1px solid rgba(74,156,248,.15);border-radius:12px;text-align:center;}
.fxid-l{font-size:10px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.fxid-v{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--b3);}
.psa{display:flex;gap:8px;margin-top:14px;}
.psab{flex:1;padding:13px;border-radius:14px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;}
.psab.pr{background:linear-gradient(135deg,var(--b5),var(--b4));color:#fff;}
.psab.sc{background:rgba(255,255,255,.07);border:1px solid rgba(74,156,248,.15);color:var(--t2);}
.olrow{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mu);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.on{background:var(--gn);box-shadow:0 0 6px var(--gn);}
.dot.off{background:var(--mu);}
.ulit{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:14px;cursor:pointer;}
.ulit:active{background:var(--gl);}
.ulav{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;overflow:hidden;}
.ulav img{width:100%;height:100%;object-fit:cover;}
.ulnm{font-weight:600;font-size:14px;display:flex;align-items:center;gap:4px;}
.ulhl{font-size:12px;color:var(--mu);margin-top:1px;}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.acard{padding:16px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(74,156,248,.1);border-radius:14px;text-align:center;cursor:pointer;}
.acard:active{background:rgba(41,121,212,.12);}

/* EMOJI PICKER */
.emoji-picker{display:none;flex-wrap:wrap;gap:4px;padding:8px;background:rgba(8,20,40,.95);border:1px solid rgba(74,156,248,.2);border-radius:12px;position:absolute;bottom:100%;left:0;z-index:50;max-width:200px;}
.emoji-picker.show{display:flex;}
.ep-em{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;}
.ep-em:active{background:var(--gl);}

.ntf{position:fixed;top:calc(16px + var(--st));left:50%;transform:translateX(-50%) translateY(-120%);z-index:500;background:rgba(8,20,40,.92);backdrop-filter:blur(20px);border:1px solid rgba(74,156,248,.2);border-radius:16px;padding:13px 18px;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-width:90vw;}
.ntf.show{transform:translateX(-50%) translateY(0);}

/* FULLSCREEN IMAGE */
.imgview{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;}
.imgview.show{display:flex;}
.imgview img{max-width:95vw;max-height:90vh;border-radius:12px;}
.imgview-close{position:absolute;top:20px;right:20px;width:40px;height:40px;border:none;background:rgba(255,255,255,.1);border-radius:50%;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.g0{background:linear-gradient(135deg,#1e5fb8,#4a9cf8);}
.g1{background:linear-gradient(135deg,#0f3460,#2979d4);}
.g2{background:linear-gradient(135deg,#1a237e,#3949ab);}
.g3{background:linear-gradient(135deg,#004d40,#00897b);}
.g4{background:linear-gradient(135deg,#bf360c,#e64a19);}
.g5{background:linear-gradient(135deg,#4a148c,#7b1fa2);}
.g6{background:linear-gradient(135deg,#1b5e20,#388e3c);}
.g7{background:linear-gradient(135deg,#e65100,#f57c00);}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<!-- FULLSCREEN IMAGE -->
<div class="imgview" id="imgview">
  <button class="imgview-close" id="imgview-close">✕</button>
  <img id="imgview-img" src="">
</div>

<!-- AUTH -->
<div id="auth">
  <div class="logo"><div class="logo-ic">⚡</div><h1>Flux <span>Messenger</span></h1></div>
  <div class="card">
    <div class="tabs">
      <button class="tab on" id="tl">Войти</button>
      <button class="tab" id="tr">Регистрация</button>
    </div>
    <div class="form show" id="fl">
      <div><div class="lbl">Email</div><input class="inp" id="le" type="email" placeholder="you@example.com"></div>
      <div><div class="lbl">Пароль</div><input class="inp" id="lp" type="password" placeholder="••••••••"></div>
      <div id="lerr" class="err" style="display:none"></div>
      <button class="btn" id="lbtn">Войти ⚡</button>
    </div>
    <div class="form" id="fr">
      <div><div class="lbl">Email</div><input class="inp" id="re" type="email" placeholder="you@example.com"></div>
      <div><div class="lbl">Ник</div><input class="inp" id="rn" type="text" placeholder="Ваше имя"></div>
      <div><div class="lbl">Username (@)</div><input class="inp" id="ru" type="text" placeholder="username"></div>
      <div><div class="lbl">Пароль</div><input class="inp" id="rp" type="password" placeholder="Минимум 6 символов"></div>
      <div id="rerr" class="err" style="display:none"></div>
      <button class="btn" id="rbtn">⚡ Зарегистрировать Flux ID</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <!-- CHATS -->
  <div id="vchats">
    <div class="tbar">
      <div class="tbar-title">Flux <span>Messenger</span></div>
      <button class="iBtn" id="dmBtn">✉️</button>
      <div class="myav on" id="myav"></div>
    </div>
    <div class="sbar"><div class="si"><span style="color:var(--mu)">🔍</span><input type="search" placeholder="Поиск..." id="sinp"></div></div>
    <div class="pills">
      <button class="pill on" data-f="all">Все</button>
      <button class="pill" data-f="dm">👤 ЛС</button>
      <button class="pill" data-f="group">👥 Группы</button>
      <button class="pill" data-f="channel">📢 Каналы</button>
    </div>
    <div class="clist" id="clist"></div>
    <button class="fab" id="fabBtn">➕</button>
    <div class="bnav">
      <button class="ni on" id="nav-chats"><span class="ni-ic">💬</span>Чаты</button>
      <button class="ni" id="nav-people"><span class="ni-ic">👥</span>Люди</button>
      <button class="ni" id="nav-settings"><span class="ni-ic">⚙️</span>Настройки</button>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="vchat">
    <div class="chdr">
      <button class="bkBtn" id="backBtn">‹</button>
      <div class="chav" id="chav"></div>
      <div class="chi"><div class="chn" id="chn"></div><div class="chs" id="chs"></div></div>
      <div style="display:flex;gap:6px;">
        <button class="iBtn" id="infoBtn">ℹ️</button>
        <button class="iBtn" id="admBtn" style="display:none">⚙️</button>
      </div>
    </div>
    <div class="pinned-banner" id="pinned-banner">📌 <span id="pinned-text">Закреплённое сообщение</span></div>
    <div class="msgs" id="msgs"></div>
    <div id="wwrap">
      <div class="iarea">
        <div class="estrip">
          <button class="eBtn" data-e="😀">😀</button><button class="eBtn" data-e="❤️">❤️</button>
          <button class="eBtn" data-e="👍">👍</button><button class="eBtn" data-e="😂">😂</button>
          <button class="eBtn" data-e="🔥">🔥</button><button class="eBtn" data-e="✨">✨</button>
          <button class="eBtn" data-e="⚡">⚡</button><button class="eBtn" data-e="🎉">🎉</button>
          <button class="eBtn" data-e="😍">😍</button><button class="eBtn" data-e="💯">💯</button>
        </div>
        <div class="irow">
          <button class="mediaBtn" id="mediaBtn">📎</button>
          <input type="file" id="mediaFile" accept="image/*,video/*" style="display:none">
          <textarea class="minp" id="minp" placeholder="Сообщение..." rows="1"></textarea>
          <button class="sBtn" id="sendBtn">➤</button>
        </div>
      </div>
    </div>
    <div id="rowrap" style="display:none"><div class="robanner">📢 Только администраторы могут писать в канале</div></div>
  </div>

  <!-- SETTINGS -->
  <div id="vsettings">
    <div class="tbar">
      <div class="tbar-title">⚙️ <span>Настройки</span></div>
    </div>
    <div class="settings-content" id="settings-content"></div>
    <div class="bnav">
      <button class="ni" id="snav-chats"><span class="ni-ic">💬</span>Чаты</button>
      <button class="ni" id="snav-people"><span class="ni-ic">👥</span>Люди</button>
      <button class="ni on"><span class="ni-ic">⚙️</span>Настройки</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mov hide" id="mov"><div class="modal"><div class="mhdl"></div><div id="mbody"></div></div></div>
<div class="ntf" id="ntf"><span id="nic"></span><span id="ntx"></span></div>

<script>
var me=null,chats=[],users={},activeChat=null,filt='all',rfTimer=null,hbTimer=null,sending=false,cmsgs=[],lastTs=0;
var privacy={};

async function api(m,p,b){
  try{
    var o={method:m,credentials:'include',headers:{'Content-Type':'application/json'}};
    if(b)o.body=JSON.stringify(b);
    var r=await fetch('/api'+p,o);
    var d=await r.json();
    if(!r.ok)return{error:d.error||'Ошибка'};
    return d;
  }catch(e){return{error:'Нет соединения'};}
}

function esc(s){return s?(s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function gr(s){var h=0;for(var i=0;i<(s||'').length;i++)h=(h*31+s.charCodeAt(i))&0xff;return 'g'+(h%8);}
function ft(ts){
  if(!ts)return'';
  var d=new Date(ts),n=new Date();
  if(d.toDateString()===n.toDateString())return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}
function fm(t){
  if(!t)return'';
  var s=esc(t);
  s=s.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:var(--b3)">$1</a>');
  s=s.replace(/@(\w+)/g,'<strong style="color:var(--b3)">@$1</strong>');
  s=s.replace(/\n/g,'<br>');
  return s;
}
function avH(u,sz,r){
  sz=sz||36;r=r||'50%';
  if(!u)return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(sz*.4|0)+'px" class="g0">?</div>';
  // Check privacy - hide avatar
  if(u.privacy&&u.privacy.hide_avatar&&u.id!==me.id){
    return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(sz*.4|0)+'px" class="'+gr(u.id)+'">?</div>';
  }
  if(u.avatar)return '<img src="'+u.avatar+'" style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';object-fit:cover">';
  return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(sz*.4|0)+'px" class="'+gr(u.id)+'">'+(u.nick||'?')[0].toUpperCase()+'</div>';
}
function cName(c){
  if(c.type==='dm'){var o=users[c.members.filter(function(m){return m!==me.id;})[0]];return o?o.nick:'Пользователь';}
  return c.name||'';
}
function cAv(c,sz,r){
  if(c.type==='dm'){var oId=c.members.filter(function(m){return m!==me.id;})[0];return avH(users[oId],sz,'50%');}
  return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-size:'+(sz*.44|0)+'px" class="'+gr(c.id)+'">'+(c.icon||(c.name||'?')[0])+'</div>';
}
function isCr(id){var u=users[id];return u&&u.role==='creator';}
function isCAdmin(cid){
  var c=chats.filter(function(x){return x.id===cid;})[0];
  if(!c)return false;
  return me.role==='creator'||me.role==='admin'||(c.admins&&c.admins.indexOf(me.id)>-1);
}
function isOn(u){
  if(!u)return false;
  if(u.privacy&&u.privacy.hide_online&&u.id!==me.id)return false;
  return !!(u.online&&(Date.now()-u.last_seen<15000));
}
function rl(r){var m={creator:'👑 Создатель',admin:'🛡️ Администратор',tester:'🧪 Тестировщик',user:'👤 Пользователь'};return m[r]||'Пользователь';}

var ntTimer=null;
function notify(ic,tx){
  document.getElementById('nic').textContent=ic;
  document.getElementById('ntx').textContent=tx;
  var el=document.getElementById('ntf');el.classList.add('show');
  clearTimeout(ntTimer);ntTimer=setTimeout(function(){el.classList.remove('show');},3000);
}

// IMAGE VIEWER
document.getElementById('imgview-close').addEventListener('click',function(){document.getElementById('imgview').classList.remove('show');});
function showImg(src){document.getElementById('imgview-img').src=src;document.getElementById('imgview').classList.add('show');}

// AUTH
document.getElementById('tl').addEventListener('click',function(){
  document.getElementById('tl').classList.add('on');document.getElementById('tr').classList.remove('on');
  document.getElementById('fl').classList.add('show');document.getElementById('fr').classList.remove('show');
});
document.getElementById('tr').addEventListener('click',function(){
  document.getElementById('tr').classList.add('on');document.getElementById('tl').classList.remove('on');
  document.getElementById('fr').classList.add('show');document.getElementById('fl').classList.remove('show');
});
document.getElementById('lbtn').addEventListener('click',async function(){
  var email=document.getElementById('le').value.trim().toLowerCase();
  var pass=document.getElementById('lp').value;
  var err=document.getElementById('lerr');err.style.display='none';
  if(!email||!pass){err.textContent='Заполните все поля';err.style.display='block';return;}
  this.disabled=true;this.textContent='Входим...';
  var res=await api('POST','/login',{email:email,password:pass});
  this.disabled=false;this.textContent='Войти ⚡';
  if(res.error){err.textContent=res.error;err.style.display='block';return;}
  me=res.user;enterApp();
});
document.getElementById('rbtn').addEventListener('click',async function(){
  var email=document.getElementById('re').value.trim().toLowerCase();
  var nick=document.getElementById('rn').value.trim();
  var username=document.getElementById('ru').value.trim().toLowerCase();
  var pass=document.getElementById('rp').value;
  var err=document.getElementById('rerr');err.style.display='none';
  this.disabled=true;this.textContent='Создаём...';
  var res=await api('POST','/register',{email:email,nick:nick,username:username,password:pass});
  this.disabled=false;this.textContent='⚡ Зарегистрировать Flux ID';
  if(res.error){err.textContent=res.error;err.style.display='block';return;}
  me=res.user;enterApp();
});

async function doLogout(){
  await api('POST','/logout');
  me=null;activeChat=null;chats=[];users={};
  clearInterval(rfTimer);clearInterval(hbTimer);
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').classList.add('hide');
  closeM();
}

// APP
async function enterApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').classList.remove('hide');
  privacy=me.privacy||{};
  renderMyAv();await loadAll();renderCList();startTimers();
  showView('chats');
  notify('⚡','Добро пожаловать, '+me.nick+'!');
}

async function loadAll(){
  var r1=await api('GET','/chats');
  var r2=await api('GET','/users');
  if(!r1.error)chats=r1;
  if(!r2.error){users={};r2.forEach(function(u){users[u.id]=u;});}
  users[me.id]=me;
}

function startTimers(){
  clearInterval(rfTimer);clearInterval(hbTimer);
  hbTimer=setInterval(function(){api('POST','/users/heartbeat');},8000);
  rfTimer=setInterval(async function(){
    await loadAll();renderCList(true);
    if(activeChat)await pollM();
  },2500);
}

function renderMyAv(){var el=document.getElementById('myav');el.innerHTML=avH(me,36,'50%');}

function showView(v){
  document.getElementById('vchats').style.display=v==='chats'?'flex':'none';
  document.getElementById('vchat').style.display=v==='chat'?'flex':'none';
  document.getElementById('vsettings').style.display=v==='settings'?'flex':'none';
  if(v==='settings')renderSettings();
}

// CHAT LIST
function renderCList(){
  renderMyAv();
  var q=(document.getElementById('sinp').value||'').trim().toLowerCase();
  var cs=chats.filter(function(c){return c.members&&c.members.indexOf(me.id)>-1;});
  if(filt!=='all')cs=cs.filter(function(c){return c.type===filt;});
  if(q)cs=cs.filter(function(c){return cName(c).toLowerCase().indexOf(q)>-1;});
  cs.sort(function(a,b){
    var ap=a.member_pinned?1:0,bp=b.member_pinned?1:0;
    return bp-ap;
  });
  var el=document.getElementById('clist');
  if(!cs.length){el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--mu);font-size:14px">Нет чатов<br><span style="font-size:32px">💬</span></div>';return;}
  el.innerHTML=cs.map(function(c){
    var nm=cName(c);
    var av=cAv(c,50,c.type==='dm'?'50%':'16px');
    var pf=c.member_pinned?'📌 ':c.pinned?'⚡ ':c.type==='channel'?'📢 ':'';
    var oC=c.type==='dm'&&isCr(c.members.filter(function(m){return m!==me.id;})[0]);
    var verified=c.verified?'<span style="color:#4a9cf8;font-size:12px">✓</span>':'';
    return '<div class="ci'+(activeChat===c.id?' sel':'')+(c.member_pinned?' pinned-chat':'')+'" data-id="'+c.id+'">'
      +'<div class="ciav'+(c.type==='dm'?' r':'')+'">'+av+'</div>'
      +'<div class="cin"><div class="cin-nm">'+(pf?'<span>'+pf+'</span>':'')+esc(nm)+(oC?'<span class="vbg" style="font-size:12px">✓</span>':'')+verified+'</div>'
      +'<div class="cin-pr">'+(c.username?'@'+c.username+' · ':'')+c.members.length+' уч.</div></div></div>';
  }).join('');
  el.querySelectorAll('.ci').forEach(function(el){
    el.addEventListener('click',function(){openChat(this.dataset.id);});
    el.addEventListener('long-press',function(){showChatContextMenu(this.dataset.id);});
  });
  // Long press simulation
  el.querySelectorAll('.ci').forEach(function(item){
    var timer;
    item.addEventListener('touchstart',function(){timer=setTimeout(function(){showChatContextMenu(item.dataset.id);},600);});
    item.addEventListener('touchend',function(){clearTimeout(timer);});
  });
}

function showChatContextMenu(cid){
  var c=chats.filter(function(x){return x.id===cid;})[0];
  if(!c)return;
  var isPinned=c.member_pinned;
  showM('<div class="mhdr"><div class="mtitle">'+esc(cName(c))+'</div><button class="mclose" id="ccmc">✕</button></div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +'<button class="btn sec" id="ccm-pin">'+(isPinned?'📌 Открепить':'📌 Закрепить чат')+'</button>'
    +(isCAdmin(cid)||me.role==='creator'?'<button class="btn red" id="ccm-del">🗑️ Удалить чат</button>':'')
    +'</div>');
  document.getElementById('ccmc').addEventListener('click',closeM);
  document.getElementById('ccm-pin').addEventListener('click',async function(){
    await api('POST','/chats/'+cid+'/pin-chat',{pinned:!isPinned});
    closeM();await loadAll();renderCList();notify('✅',isPinned?'Откреплено':'Закреплено');
  });
  var delBtn=document.getElementById('ccm-del');
  if(delBtn)delBtn.addEventListener('click',function(){closeM();confirmDelete(cid);});
}

document.querySelectorAll('.pill').forEach(function(p){
  p.addEventListener('click',function(){
    document.querySelectorAll('.pill').forEach(function(x){x.classList.remove('on');});
    p.classList.add('on');filt=p.dataset.f;renderCList();
  });
});
document.getElementById('sinp').addEventListener('input',function(){renderCList();});

// OPEN CHAT
async function openChat(cid){
  var c=chats.filter(function(x){return x.id===cid;})[0];
  if(!c)return;
  activeChat=cid;cmsgs=[];lastTs=0;
  showView('chat');
  var av=document.getElementById('chav');
  if(c.type==='dm'){
    var oId=c.members.filter(function(m){return m!==me.id;})[0];
    var o=users[oId];
    av.className='chav r';av.innerHTML=avH(o,36,'50%');
    document.getElementById('chn').innerHTML=esc(o?o.nick:'?')+(isCr(oId)?'<span class="vbg" style="font-size:12px;margin-left:3px">✓</span>':'');
    var on=isOn(o);
    document.getElementById('chs').innerHTML='<span class="dot '+(on?'on':'off')+'" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle"></span>'+(on?'В сети':'Не в сети');
  } else {
    av.className='chav';av.innerHTML=cAv(c,36,'12px');
    document.getElementById('chn').innerHTML=(c.type==='channel'?'📢 ':'')+esc(c.name)+(c.verified?'<span style="color:var(--b3);margin-left:4px">✓</span>':'');
    document.getElementById('chs').textContent=(c.username?'@'+c.username+' · ':'')+c.members.length+' участников';
  }
  var canA=isCAdmin(cid);
  document.getElementById('admBtn').style.display=canA?'flex':'none';
  var canW=c.type!=='channel'||canA;
  document.getElementById('wwrap').style.display=canW?'block':'none';
  document.getElementById('rowrap').style.display=canW?'none':'block';
  renderCList(true);
  await loadM();
}

document.getElementById('backBtn').addEventListener('click',function(){
  activeChat=null;cmsgs=[];lastTs=0;showView('chats');renderCList();
});

// MESSAGES
async function loadM(){
  if(!activeChat)return;
  var res=await api('GET','/chats/'+activeChat+'/messages?since=0');
  if(res.error)return;
  cmsgs=res;if(res.length)lastTs=res[res.length-1].timestamp;
  renderM();updatePinnedBanner();
}

async function pollM(){
  if(!activeChat)return;
  var res=await api('GET','/chats/'+activeChat+'/messages?since=0');
  if(res.error)return;
  if(res.length!==cmsgs.length){cmsgs=res;if(res.length)lastTs=res[res.length-1].timestamp;renderM();updatePinnedBanner();}
}

function updatePinnedBanner(){
  var pinned=cmsgs.filter(function(m){return m.pinned&&!m.system;})[0];
  var banner=document.getElementById('pinned-banner');
  if(pinned){
    document.getElementById('pinned-text').textContent=pinned.text||'Медиафайл';
    banner.classList.add('show');
    banner.onclick=function(){
      var el=document.querySelector('[data-mid="'+pinned.id+'"]');
      if(el)el.scrollIntoView({behavior:'smooth'});
    };
  } else {
    banner.classList.remove('show');
  }
}

var EMOJIS=['❤️','😂','👍','🔥','😮','😢'];
function renderM(){
  var area=document.getElementById('msgs');
  var atB=area.scrollHeight-area.scrollTop-area.clientHeight<80;
  var h='';var ld='';
  cmsgs.forEach(function(m){
    var d=new Date(m.timestamp);
    var ds=d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
    if(ds!==ld){h+='<div class="dsep">'+ds+'</div>';ld=ds;}
    if(m.system){h+='<div class="smsg">'+esc(m.text)+'</div>';return;}
    var own=m.sender_id===me.id;
    var sdr=users[m.sender_id]||{id:m.sender_id,nick:m.sender_nick||'?',avatar:null};
    var c=chats.filter(function(x){return x.id===activeChat;})[0];
    var ss=!own&&c&&c.type!=='dm';
    var mediaH='';
    if(m.media_url){
      if(m.media_type==='video'){
        mediaH='<video class="mvid" src="'+m.media_url+'" controls></video>';
      } else {
        mediaH='<img class="mimg" src="'+m.media_url+'" data-src="'+m.media_url+'">';
      }
    }
    var rxH='';
    if(m.reactions&&m.reactions.length){
      rxH='<div class="reactions-bar">'+m.reactions.map(function(r){
        return '<div class="reaction'+(m.my_reaction===r.emoji?' mine':'')+'" data-mid="'+m.id+'" data-em="'+r.emoji+'">'+r.emoji+'<span>'+r.cnt+'</span></div>';
      }).join('')+'</div>';
    }
    var actH='<div class="msg-actions">'
      +'<button class="mac react-btn" data-mid="'+m.id+'" title="Реакция">😊</button>'

var emojiPickerTarget=null;
function showEmojiPicker(mid,btn){
  var existing=document.querySelector('.emoji-picker');
  if(existing)existing.remove();
  var picker=document.createElement('div');
  picker.className='emoji-picker show';
  picker.style.position='fixed';
  var rect=btn.getBoundingClientRect();
  picker.style.bottom=(window.innerHeight-rect.top+8)+'px';
  picker.style.left=rect.left+'px';
  EMOJIS.forEach(function(em){
    var b=document.createElement('button');
    b.className='ep-em';b.textContent=em;
    b.addEventListener('click',async function(){
      picker.remove();
      var res=await api('POST','/messages/'+mid+'/react',{emoji:em});
      if(res.error)return;
      await pollM();
    });
    picker.appendChild(b);
  });
  document.body.appendChild(picker);
  setTimeout(function(){document.addEventListener('click',function rmPicker(){picker.remove();document.removeEventListener('click',rmPicker);});},100);
}

// MEDIA UPLOAD
document.getElementById('mediaBtn').addEventListener('click',function(){document.getElementById('mediaFile').click();});
document.getElementById('mediaFile').addEventListener('change',async function(){
  var file=this.files[0];if(!file)return;
  if(file.size>10*1024*1024){notify('❌','Файл слишком большой (макс 10МБ)');return;}
  var mediaType=file.type.startsWith('video')?'video':'image';
  notify('⏳','Загружаем...');
  var reader=new FileReader();
  reader.onload=async function(e){
    var dataUrl=e.target.result;
    var res=await api('POST','/chats/'+activeChat+'/messages',{media_url:dataUrl,media_type:mediaType,text:''});
    if(res.error){notify('❌',res.error);return;}
    cmsgs.push(res);lastTs=res.timestamp;renderM();notify('✅','Отправлено!');
  };
  reader.readAsDataURL(file);
  this.value='';
});

async function sendMsg(){
  var inp=document.getElementById('minp');
  var text=inp.value.trim();
  if(!text||!activeChat||sending)return;
  sending=true;
  var res=await api('POST','/chats/'+activeChat+'/messages',{text:text});
  sending=false;inp.value='';inp.style.height='auto';
  if(res.error){notify('❌',res.error);return;}
  if(res.command){
    notify('✅','Команда выполнена');
    await loadAll();await loadM();renderCList(true);
    if(res.deleted_chat){activeChat=null;showView('chats');renderCList();}
    return;
  }
  cmsgs.push(res);lastTs=res.timestamp;renderM();
}

    var res=await api('POST','/admin/users/'+u.id+'/action',{action:u.muted?'unmute':'mute'});
    if(res.error){notify('❌',res.error);return;}
    await loadAll();notify('✅','Готово');closeM();showUP(u.id);
  });
  if(document.getElementById('roleBtn'))document.getElementById('roleBtn').addEventListener('click',function(){closeM();showGiveRole(u.id);});
  if(document.getElementById('vfBtn'))document.getElementById('vfBtn').addEventListener('click',async function(){
    var res=await api('POST','/admin/users/'+u.id+'/action',{action:'give_role',role:'creator'});
    if(res.error){notify('❌',res.error);return;}
    await loadAll();notify('✅','Галочка выдана!');closeM();showUP(u.id);
  });
}

function showGiveRole(uid){
  var u=users[uid]||{};
  showM('<div class="mhdr"><div class="mtitle">👑 Назначить роль</div><button class="mclose" id="grc">✕</button></div>'
    +'<div style="color:var(--mu);font-size:13px;margin-bottom:14px">Для: <strong style="color:var(--tx)">'+esc(u.nick||uid)+'</strong></div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +'<button class="btn sec" id="ru1">👤 Пользователь</button>'
    +'<button class="btn sec" id="ru4">🧪 Тестировщик</button>'
    +'<button class="btn" id="ru2">🛡️ Администратор</button>'
    +(me.username==='bloody'?'<button class="btn red" id="ru3">👑 Создатель</button>':'')
    +'</div>');
  document.getElementById('grc').addEventListener('click',closeM);
  var setRole=async function(r){
    var res=await api('POST','/admin/users/'+uid+'/action',{action:'give_role',role:r});
    if(res.error){notify('❌',res.error);return;}
    await loadAll();closeM();notify('✅','Роль назначена');
  };
  document.getElementById('ru1').addEventListener('click',function(){setRole('user');});
  document.getElementById('ru4').addEventListener('click',function(){setRole('tester');});
  document.getElementById('ru2').addEventListener('click',function(){setRole('admin');});
  if(document.getElementById('ru3'))document.getElementById('ru3').addEventListener('click',function(){setRole('creator');});
}

function showEditP(){
  showM('<div class="mhdr"><div class="mtitle">✏️ Редактировать профиль</div><button class="mclose" id="epc">✕</button></div>'
    +'<div class="mform">'
    +'<div style="text-align:center"><div id="epav" style="width:80px;height:80px;border-radius:50%;margin:0 auto 10px;overflow:hidden;border:3px solid rgba(74,156,248,.3);cursor:pointer;display:flex;align-items:center;justify-content:center">'+avH(me,80,'50%')+'</div>'
    +'<input type="file" id="avf" accept="image/*" style="display:none">'
    +'<div style="font-size:12px;color:var(--mu)">Нажми для смены фото</div></div>'
    +'<div><div class="mlbl">Ник</div><input class="minput" id="epn" value="'+esc(me.nick)+'"></div>'
    +'<div><div class="mlbl">Username</div><input class="minput" id="epu" value="'+esc(me.username)+'"></div>'
    +'<button class="btn" id="epok">Сохранить ✅</button></div>');
  document.getElementById('epc').addEventListener('click',closeM);
  document.getElementById('epav').addEventListener('click',function(){document.getElementById('avf').click();});
  document.getElementById('avf').addEventListener('change',function(){
    var f=this.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(e){var el=document.getElementById('epav');el.innerHTML='<img src="'+e.target.result+'" style="width:80px;height:80px;border-radius:50%;object-fit:cover">';el.dataset.av=e.target.result;};
    r.readAsDataURL(f);
  });
  document.getElementById('epok').addEventListener('click',async function(){
    var nick=document.getElementById('epn').value.trim();
    var uname=document.getElementById('epu').value.trim().toLowerCase();
    var avEl=document.getElementById('epav');
    var avatar=avEl.dataset.av||me.avatar;
    if(!nick||!uname){notify('❌','Заполни поля');return;}
    var res=await api('PUT','/users/me/profile',{nick:nick,username:uname,avatar:avatar,privacy:privacy});
    if(res.error){notify('❌',res.error);return;}
    me=Object.assign(me,res);users[me.id]=me;closeM();renderMyAv();renderCList();
    if(document.getElementById('vsettings').style.display!=='none')renderSettings();
    notify('✅','Обновлено!');
  });
}

// CHAT INFO/ADMIN
document.getElementById('infoBtn').addEventListener('click',showCInfo);
document.getElementById('admBtn').addEventListener('click',showAdmPanel);

function showCInfo(){
  if(!activeChat)return;
  var c=chats.filter(function(x){return x.id===activeChat;})[0];
  if(!c)return;
  if(c.type==='dm'){showUP(c.members.filter(function(m){return m!==me.id;})[0]);return;}
  var canA=isCAdmin(activeChat);
  var isBloody=me.username==='bloody';
  showM('<div style="padding:0 4px">'
    +'<div class="psav">'+cAv(c,88,'50%')+'</div>'
    +'<div class="psnm">'+esc(c.name)+(c.verified?'<span style="color:var(--b3)">✓</span>':'')+'</div>'
    +(c.username?'<div class="pshl">@'+c.username+'</div>':'')
    +'<div style="text-align:center;color:var(--mu);font-size:13px;margin-top:6px">'+(c.type==='channel'?'Канал':'Группа')+' · '+c.members.length+' участников</div>'
    +'<div class="psa" style="margin-top:14px">'
    +(canA?'<button class="psab sc" id="addmbtn">➕</button>':'')
    +'<button class="psab sc" id="pinchtbtn">📌</button>'
    +(c.creator_id!==me.id?'<button class="psab sc" id="leavebtn">🚪</button>':'')
    +(isBloody&&c.type==='channel'?'<button class="psab pr" id="verifybtn">'+(c.verified?'❌ Снять':'✓ Верифицировать')+'</button>':'')
    +'</div></div>');
  if(document.getElementById('addmbtn'))document.getElementById('addmbtn').addEventListener('click',function(){closeM();showAddM(activeChat);});
  document.getElementById('pinchtbtn').addEventListener('click',async function(){
    var isPinned=chats.filter(function(x){return x.id===activeChat;})[0].member_pinned;
    await api('POST','/chats/'+activeChat+'/pin-chat',{pinned:!isPinned});
    closeM();await loadAll();renderCList();notify('✅',isPinned?'Откреплено':'Закреплено');
  });
  if(document.getElementById('leavebtn'))document.getElementById('leavebtn').addEventListener('click',async function(){
    var res=await api('POST','/chats/'+activeChat+'/leave');
    if(res.error){notify('❌',res.error);return;}
    closeM();activeChat=null;showView('chats');await loadAll();renderCList();notify('✅','Покинули чат');
  });
  if(document.getElementById('verifybtn'))document.getElementById('verifybtn').addEventListener('click',async function(){
    var res=await api('POST','/chats/'+activeChat+'/verify',{verified:!c.verified});
    if(res.error){notify('❌',res.error);return;}
    closeM();await loadAll();renderCList();openChat(activeChat);notify('✅',c.verified?'Верификация снята':'Канал верифицирован!');
  });
}

function showAdmPanel(){
  if(!activeChat)return;
  showM('<div class="mhdr"><div class="mtitle">⚙️ Управление</div><button class="mclose" id="apc">✕</button></div>'
    +'<div class="agrid">'
    +'<div class="acard" id="addmb"><div style="font-size:26px;margin-bottom:6px">➕</div><div style="font-size:12px;font-weight:600;color:var(--t2)">Добавить</div></div>'
    +'<div class="acard" id="clrb"><div style="font-size:26px;margin-bottom:6px">🗑️</div><div style="font-size:12px;font-weight:600;color:var(--t2)">Очистить</div></div>'
    +'<div class="acard" id="editb"><div style="font-size:26px;margin-bottom:6px">✏️</div><div style="font-size:12px;font-weight:600;color:var(--t2)">Редактировать</div></div>'
    +((me.role==='creator'||me.role==='admin')?'<div class="acard" id="delb"><div style="font-size:26px;margin-bottom:6px">⛔</div><div style="font-size:12px;font-weight:600;color:var(--t2)">Удалить</div></div>':'')
    +'</div>'
    +'<div style="margin-top:16px;padding:14px;background:rgba(0,0,0,.15);border:1px solid rgba(74,156,248,.08);border-radius:14px">'
    +'<div class="mlbl" style="margin-bottom:8px">Команды</div>'
    +'<div style="font-size:12px;color:var(--t2);line-height:2.5">'
    +'<span style="color:var(--b3)">/ban @user</span> · <span style="color:var(--b3)">/unban</span><br>'
    +'<span style="color:var(--b3)">/mute @user</span> · <span style="color:var(--b3)">/unmute</span><br>'
    +'<span style="color:var(--b3)">/kick @user</span> · <span style="color:var(--b3)">/pin</span><br>'
    +'<span style="color:var(--b3)">/rename [название]</span><br>'
    +(me.username==='bloody'?'<span style="color:var(--b3)">/verify [username]</span><br><span style="color:var(--b3)">/broadcast [текст]</span><br><span style="color:var(--b3)">/stats</span><br><span style="color:var(--b3)">/announce [текст]</span>':'')
    +'</div></div>');
  document.getElementById('apc').addEventListener('click',closeM);
  document.getElementById('addmb').addEventListener('click',function(){closeM();showAddM(activeChat);});
  document.getElementById('clrb').addEventListener('click',async function(){
    var res=await api('POST','/chats/'+activeChat+'/clear');
    if(res.error){notify('❌',res.error);return;}
    closeM();cmsgs=[];lastTs=0;renderM();notify('✅','Очищено');
  });
  document.getElementById('editb').addEventListener('click',function(){closeM();showEditChat();});
  if(document.getElementById('delb'))document.getElementById('delb').addEventListener('click',function(){
    closeM();confirmDelete(activeChat);
  });
}

function confirmDelete(cid){
  showM('<div class="mhdr"><div class="mtitle" style="color:var(--rd)">⛔ Удалить чат?</div><button class="mclose" id="dcc">✕</button></div>'
    +'<p style="color:var(--t2);font-size:14px;margin-bottom:20px">Все сообщения удалятся безвозвратно.</p>'
    +'<div style="display:flex;gap:8px"><button class="btn sec" id="dca" style="flex:1">Отмена</button><button class="btn red" id="dco" style="flex:1">Удалить</button></div>');
  document.getElementById('dcc').addEventListener('click',closeM);
  document.getElementById('dca').addEventListener('click',closeM);
  document.getElementById('dco').addEventListener('click',async function(){
    var res=await api('DELETE','/chats/'+cid);
    if(res.error){notify('❌',res.error);return;}
    closeM();activeChat=null;showView('chats');await loadAll();renderCList();notify('✅','Удалён');
  });
}

function showEditChat(){
  var c=chats.filter(function(x){return x.id===activeChat;})[0]||{};
  showM('<div class="mhdr"><div class="mtitle">✏️ Редактировать</div><button class="mclose" id="ecc">✕</button></div>'
    +'<div class="mform">'
    +'<div><div class="mlbl">Название</div><input class="minput" id="ecn" value="'+esc(c.name||'')+'"></div>'
    +'<div><div class="mlbl">Описание</div><input class="minput" id="ecd" value="'+esc(c.description||'')+'"></div>'
    +'<div><div class="mlbl">Иконка</div><input class="minput" id="eci" value="'+esc(c.icon||'')+'" maxlength="2"></div>'
    +'<button class="btn" id="ecok">Сохранить</button></div>');
  document.getElementById('ecc').addEventListener('click',closeM);
  document.getElementById('ecok').addEventListener('click',async function(){
    var name=document.getElementById('ecn').value.trim();if(!name)return;
    var res=await api('PUT','/chats/'+activeChat,{name:name,description:document.getElementById('ecd').value.trim(),icon:document.getElementById('eci').value.trim()});
    if(res.error){notify('❌',res.error);return;}
    closeM();await loadAll();renderCList();openChat(activeChat);notify('✅','Обновлено');
  });
}

function showAddM(cid){
  var c=chats.filter(function(x){return x.id===cid;})[0]||{members:[]};
  var nonM=Object.values(users).filter(function(u){return u.id!==me.id&&c.members.indexOf(u.id)<0;});
  var h='<div class="mhdr"><div class="mtitle">➕ Добавить участника</div><button class="mclose" id="amc">✕</button></div>';
  if(!nonM.length)h+='<p style="text-align:center;color:var(--mu);padding:20px 0">Все уже в чате</p>';
  h+=nonM.map(function(u){return '<div class="ulit" data-uid="'+u.id+'"><div class="ulav">'+avH(u,44,'50%')+'</div><div><div class="ulnm">'+esc(u.nick)+'</div><div class="ulhl">@'+u.username+'</div></div></div>';}).join('');
  showM(h);
  document.getElementById('amc').addEventListener('click',closeM);
  document.querySelectorAll('.ulit[data-uid]').forEach(function(el){
    el.addEventListener('click',async function(){
      var res=await api('POST','/chats/'+cid+'/members',{user_id:this.dataset.uid});
      if(res.error){notify('❌',res.error);return;}
      closeM();await loadAll();renderCList();notify('✅','Добавлен');
      if(activeChat===cid)await loadM();
    });
  });
}

async function showPeople(){
  var res=await api('GET','/users');
  var us=res.error?Object.values(users).filter(function(u){return u.id!==me.id;}):res;
  var h='<div class="mhdr"><div class="mtitle">👥 Пользователи</div><button class="mclose" id="ppc">✕</button></div>';
  if(!us.length)h+='<p style="text-align:center;color:var(--mu);padding:20px 0">Нет пользователей</p>';
  h+=us.map(function(u){
    var on=isOn(u);
    return '<div class="ulit" data-uid="'+u.id+'"><div class="ulav" style="position:relative">'+avH(u,44,'50%')+'<span class="dot '+(on?'on':'off')+'" style="position:absolute;bottom:1px;right:1px;border:2px solid #050d1f"></span></div>'
      +'<div><div class="ulnm">'+esc(u.nick)+(u.role==='creator'?'<span class="vbg" style="font-size:11px">✓</span>':'')+'</div><div class="ulhl">@'+u.username+' · '+(on?'В сети':'Оффлайн')+'</div></div></div>';
  }).join('');
  showM(h);
  document.getElementById('ppc').addEventListener('click',closeM);
  document.querySelectorAll('.ulit[data-uid]').forEach(function(el){
    el.addEventListener('click',function(){closeM();showUP(this.dataset.uid);});
  });
}

function showM(h){document.getElementById('mbody').innerHTML=h;document.getElementById('mov').classList.remove('hide');}
function closeM(){document.getElementById('mov').classList.add('hide');}
document.getElementById('mov').addEventListener('click',function(e){if(e.target===this)closeM();});

async function boot(){
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').classList.add('hide');
  var res=await api('GET','/me');
  if(!res.error){me=res;privacy=me.privacy||{};enterApp();}
}

window.addEventListener('load',boot);
window.addEventListener('beforeunload',function(){api('POST','/logout');});
</script>
</body>
</html>
