<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#020818">
<title>Flux Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --b5:#1a4fa0;--b4:#2468c8;--b3:#4a9cf8;
  --tx:#e8f4ff;--t2:rgba(200,228,255,.65);--mu:rgba(200,228,255,.3);
  --rd:#ff4d6d;--gn:#4dffb0;--gl:rgba(36,104,200,.11);
  --gold:#ffd700;--gold2:#ffb300;
  --card:rgba(8,18,42,.85);--bdr:rgba(74,156,248,.13);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#020818;overscroll-behavior:none}
body{font-family:"DM Sans",sans-serif;color:var(--tx)}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.bgo{position:absolute;border-radius:50%;filter:blur(90px);opacity:.11}
.o1{width:500px;height:500px;background:radial-gradient(circle,#1e5fb8,transparent);top:-200px;left:-150px}
.o2{width:360px;height:360px;background:radial-gradient(circle,#0f2d60,transparent);bottom:-100px;right:-100px}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:999;background:#020818;display:flex;flex-direction:column;align-items:center;justify-content:center}
#splash.gone{display:none}
.sp-wrap{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center}
.sp-fire{font-size:100px;line-height:1;animation:spIn .6s ease forwards,spPulse 2s ease-in-out infinite .6s;opacity:0}
@keyframes spIn{from{opacity:0;transform:scale(.2) translateY(40px)}to{opacity:1;transform:none}}
@keyframes spPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.sp-f{position:absolute;font-family:"Syne",sans-serif;font-size:38px;font-weight:800;color:#fff;text-shadow:0 0 20px rgba(255,100,0,.9);animation:spIn .5s .3s ease forwards;opacity:0}
.sp-title{font-family:"Syne",sans-serif;font-size:28px;font-weight:800;margin-top:16px;animation:spUp .5s .8s ease forwards;opacity:0}
.sp-title span{color:var(--b3)}
.sp-sub{font-size:14px;color:var(--mu);margin-top:8px;animation:spUp .5s 1s ease forwards;opacity:0}
.sp-bar{width:160px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:24px;overflow:hidden;animation:spUp .5s 1s ease forwards;opacity:0}
.sp-prog{height:100%;background:linear-gradient(90deg,var(--b4),var(--b3));animation:spProg 1.6s 1s ease forwards;width:0}
@keyframes spUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes spProg{from{width:0}to{width:100%}}

/* AUTH */
#auth{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;background:radial-gradient(ellipse at 30% 20%,rgba(36,104,200,.12),transparent 60%),#020818}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-ic{width:52px;height:52px;background:linear-gradient(135deg,#e65100,#ff6d00);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 28px rgba(230,81,0,.4)}
.logo h1{font-family:"Syne",sans-serif;font-size:26px;font-weight:800}
.logo span{color:var(--b3)}
.acard{width:100%;max-width:420px;background:var(--card);backdrop-filter:blur(40px);border:1px solid var(--bdr);border-radius:24px;padding:28px 24px;position:relative;overflow:hidden}
.acard::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(74,156,248,.4),transparent)}
.tabs{display:flex;gap:4px;margin-bottom:22px;background:rgba(0,0,0,.22);border-radius:14px;padding:4px}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--t2);font-size:15px;font-weight:500;border-radius:10px;cursor:pointer}
.tab.on{background:rgba(36,104,200,.28);color:var(--tx);font-weight:600}
.aform{display:none;flex-direction:column;gap:14px}.aform.show{display:flex}
.lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:5px}
.inp{width:100%;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:14px;color:var(--tx);font-size:16px;outline:none;font-family:inherit}
.inp:focus{border-color:rgba(74,156,248,.38);background:rgba(74,156,248,.05)}
.btn{padding:14px;background:linear-gradient(135deg,var(--b5),var(--b4));border:none;border-radius:14px;color:#fff;font-family:"Syne",sans-serif;font-size:16px;font-weight:700;cursor:pointer;width:100%}
.btn:active{opacity:.88}.btn:disabled{opacity:.5}
.btn.sec{background:rgba(255,255,255,.07);color:var(--t2);border:1px solid var(--bdr);font-family:inherit;font-size:14px;font-weight:600}
.btn.red{background:linear-gradient(135deg,#b91c1c,#ef4444)}
.btn.gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a1000}
.err{padding:11px 14px;background:rgba(255,77,109,.09);border:1px solid rgba(255,77,109,.28);border-radius:12px;color:var(--rd);font-size:13px;text-align:center}

/* APP */
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10;padding-top:var(--st)}
#app.hide{display:none}
#vchats,#vsrch{display:flex;flex-direction:column;flex:1;min-height:0;position:relative}
#vchat{display:none;flex-direction:column;flex:1;min-height:0}
#vsett{display:none;flex-direction:column;flex:1;min-height:0;overflow-y:auto}
#vsrch{display:none}

/* TOPBAR */
.tbar{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-shrink:0;background:rgba(4,10,28,.76);backdrop-filter:blur(28px);border-bottom:1px solid var(--bdr);height:58px}
.tbar-t{font-family:"Syne",sans-serif;font-size:19px;font-weight:800;flex:1;display:flex;align-items:center;gap:6px}
.tbar-t span{color:var(--b3)}
.ib{width:38px;height:38px;border:none;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:12px;color:var(--t2);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0}
.ib:active{background:var(--gl)}
.myav{width:36px;height:36px;border-radius:50%;border:2px solid rgba(74,156,248,.28);overflow:hidden;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;position:relative}
.myav img{width:100%;height:100%;object-fit:cover}
.myav.on::after{content:"";position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(--gn);border:2px solid #050d1f}
.av-gold{box-shadow:0 0 0 2px var(--gold),0 0 8px rgba(255,215,0,.3)!important;border-color:var(--gold)!important}

/* SEARCH */
.srch-pad{padding:12px 14px;flex-shrink:0}
.srch-box{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.2);border-radius:16px;padding:12px 16px}
.srch-box input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:16px;font-family:inherit}
.srch-box input::placeholder{color:var(--mu)}
.srch-res{flex:1;overflow-y:auto;padding:0 14px}
.srch-sec{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);padding:12px 4px 8px}
.srch-empty{text-align:center;padding:60px 20px;color:var(--mu)}

/* CHAT LIST */
.sbar{padding:10px 14px;flex-shrink:0}
.si{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:14px;padding:10px 14px}
.si input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:15px;font-family:inherit}
.si input::placeholder{color:var(--mu)}
.pills{display:flex;gap:8px;padding:0 14px 10px;overflow-x:auto;flex-shrink:0}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:20px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--mu);font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;flex-shrink:0}
.pill.on{background:rgba(36,104,200,.2);border-color:rgba(74,156,248,.3);color:var(--b3);font-weight:600}
.clist{flex:1;overflow-y:auto;padding:0 10px 8px;-webkit-overflow-scrolling:touch}
.ci{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:16px;cursor:pointer;border:1px solid transparent;margin-bottom:2px}
.ci:active{background:var(--gl)}.ci.sel{background:rgba(36,104,200,.16);border-color:rgba(74,156,248,.18)}
.ci.pinc{border-left:3px solid var(--b3)}
.ciav{width:50px;height:50px;border-radius:16px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;position:relative}
.ciav.dm{border-radius:50%}.ciav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cin{flex:1;min-width:0}
.cin-nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.cin-sub{font-size:13px;color:var(--mu);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vbg{color:var(--b3);font-size:12px}.vgold{color:var(--gold);font-size:12px}
.fab{position:absolute;right:16px;bottom:calc(64px+16px+var(--sb));width:54px;height:54px;background:linear-gradient(135deg,var(--b5),var(--b4));border-radius:18px;border:none;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 4px 28px rgba(36,104,200,.5);z-index:5}
.fab:active{transform:scale(.91)}

/* NAV */
.bnav{display:flex;background:rgba(4,10,28,.78);backdrop-filter:blur(32px);border-top:1px solid var(--bdr);padding-bottom:var(--sb);flex-shrink:0;height:calc(64px+var(--sb))}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--mu);cursor:pointer;padding:6px 4px;font-size:11px;font-weight:500}
.ni.on{color:var(--b3)}.ni-ic{font-size:22px;line-height:1}

/* CHAT */
.chdr{display:flex;align-items:center;gap:10px;padding:10px 14px;flex-shrink:0;background:rgba(4,10,28,.76);backdrop-filter:blur(28px);border-bottom:1px solid var(--bdr);height:58px}
.bkBtn{width:36px;height:36px;border:none;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:12px;color:var(--t2);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.chav{width:36px;height:36px;border-radius:12px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700}
.chav.dm{border-radius:50%}.chav img{width:100%;height:100%;object-fit:cover}
.chi{flex:1;min-width:0}
.chn{font-family:"Syne",sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.chs{font-size:11px;color:var(--mu);margin-top:1px}
.pban{display:none;background:rgba(36,104,200,.09);border-bottom:1px solid var(--bdr);padding:8px 16px;font-size:12px;color:var(--b3);flex-shrink:0;cursor:pointer;align-items:center;gap:8px}
.pban.show{display:flex}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch}
.dsep{display:flex;align-items:center;gap:10px;padding:10px 0;color:var(--mu);font-size:11px;font-weight:600}
.dsep::before,.dsep::after{content:"";flex:1;height:1px;background:rgba(74,156,248,.1)}
.smsg{text-align:center;padding:5px 14px;background:rgba(36,104,200,.07);border:1px solid var(--bdr);border-radius:20px;font-size:11px;color:var(--mu);margin:3px auto;max-width:86%}
.mrow{display:flex;align-items:flex-end;gap:8px;animation:mIn .18s ease;position:relative;padding:1px 0}
.mrow.own{flex-direction:row-reverse}
@keyframes mIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer}
.mav img{width:100%;height:100%;object-fit:cover}
.mbub{max-width:74%;padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;position:relative}
.mrow:not(.own) .mbub{background:rgba(12,28,62,.82);border:1px solid var(--bdr);border-bottom-left-radius:4px}
.mrow.own .mbub{background:linear-gradient(135deg,rgba(26,79,160,.8),rgba(36,104,200,.65));border:1px solid rgba(74,156,248,.2);border-bottom-right-radius:4px}
.mrow.own.gbub .mbub{background:linear-gradient(135deg,rgba(100,50,0,.78),rgba(160,90,0,.62));border-color:rgba(255,180,0,.3)}
.msdr{font-size:11px;font-weight:700;color:var(--b3);margin-bottom:3px;display:flex;align-items:center;gap:3px}
.mtime{font-size:10px;color:var(--mu);margin-top:4px;text-align:right}
.mrow:not(.own) .mtime{text-align:left}
.rp{padding:6px 10px;background:rgba(74,156,248,.1);border-left:3px solid var(--b3);border-radius:8px;margin-bottom:6px;font-size:12px;cursor:pointer}
.rp-n{color:var(--b3);font-weight:600;margin-bottom:2px}
.rp-t{color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fwd-l{font-size:11px;color:var(--b3);margin-bottom:4px}
.rxbar{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.rx{display:flex;align-items:center;gap:3px;padding:3px 8px;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:12px;font-size:13px;cursor:pointer}
.rx.mine{background:rgba(36,104,200,.2);border-color:rgba(74,156,248,.35)}
.rx span{font-size:11px;color:var(--mu)}
.mac-w{position:absolute;right:0;top:-38px;display:none;background:rgba(5,14,34,.96);border:1px solid var(--bdr);border-radius:12px;padding:4px;gap:3px;z-index:10;white-space:nowrap}
.mrow:hover .mac-w,.mrow:focus-within .mac-w{display:flex}
.mrow.own .mac-w{right:auto;left:0}
.mac{width:30px;height:30px;border:none;background:transparent;font-size:16px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center}
.mac:active{background:rgba(255,255,255,.1)}
.rbar{display:none;padding:8px 14px;background:rgba(36,104,200,.08);border-top:1px solid var(--bdr);align-items:center;gap:10px;flex-shrink:0}
.rbar.show{display:flex}
.rbi{flex:1;min-width:0}.rbn{font-size:12px;color:var(--b3);font-weight:600;margin-bottom:2px}
.rbt{font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbc{width:28px;height:28px;border:none;background:rgba(255,255,255,.07);border-radius:50%;color:var(--mu);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* INPUT */
.iarea{padding:10px 12px;padding-bottom:calc(10px+var(--sb));background:rgba(4,10,28,.66);backdrop-filter:blur(24px);border-top:1px solid var(--bdr);flex-shrink:0}
.estrip{display:flex;gap:2px;padding-bottom:8px;overflow-x:auto}
.estrip::-webkit-scrollbar{display:none}
.eBtn{background:none;border:none;font-size:22px;padding:4px 6px;cursor:pointer;flex-shrink:0}
.irow{display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(74,156,248,.14);border-radius:18px;padding:10px 14px}
.irow:focus-within{border-color:rgba(74,156,248,.36)}
.minp{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-family:inherit;font-size:15px;line-height:1.4;resize:none;max-height:100px}
.minp::placeholder{color:var(--mu)}
.sBtn{width:38px;height:38px;border:none;flex-shrink:0;background:linear-gradient(135deg,var(--b5),var(--b4));border-radius:12px;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sBtn:active{transform:scale(.9)}
.ro-ban{padding:14px;padding-bottom:calc(14px+var(--sb));text-align:center;background:rgba(36,104,200,.06);border-top:1px solid var(--bdr);color:var(--mu);font-size:13px}

/* SETTINGS */
.sw{flex:1;overflow-y:auto;padding:16px}
.ss{margin-bottom:24px}
.ss-t{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:12px;padding-left:4px}
.si2{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:14px;cursor:pointer;margin-bottom:8px}
.si2:active{background:var(--gl)}
.si2-ic{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.si2-i{flex:1}.si2-t{font-weight:600;font-size:15px}.si2-s{font-size:12px;color:var(--mu);margin-top:2px}
.si2-a{color:var(--mu);font-size:18px}
.tog{width:44px;height:24px;background:rgba(255,255,255,.1);border-radius:12px;position:relative;cursor:pointer;flex-shrink:0}
.tog.on{background:var(--b4)}
.tog::after{content:"";position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s}
.tog.on::after{transform:translateX(20px)}
.pfr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,215,0,.1)}
.pfr:last-child{border:none}
.pfr-ic{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.pfr-i{flex:1}.pfr-n{font-weight:600;font-size:13px;color:var(--gold)}.pfr-d{font-size:11px;color:var(--t2);margin-top:1px}
.prem-card{background:linear-gradient(135deg,rgba(120,60,0,.18),rgba(180,100,0,.12));border:1px solid rgba(255,180,0,.22);border-radius:16px;padding:14px;margin-bottom:12px}
.prem-bdg{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.28);border-radius:20px;font-size:12px;font-weight:700;color:var(--gold);margin-top:8px}
.cbox{padding:12px 16px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:12px;text-align:center}
.cbox-l{font-size:10px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.cbox-v{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;color:var(--gold)}
.fxbox{padding:12px 16px;background:rgba(36,104,200,.07);border:1px solid var(--bdr);border-radius:12px;text-align:center}
.fxbox-l{font-size:10px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.fxbox-v{font-family:"Syne",sans-serif;font-size:16px;font-weight:700;color:var(--b3)}
.strbdg{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;background:rgba(230,81,0,.15);border:1px solid rgba(255,109,0,.25);border-radius:20px;font-size:11px;font-weight:700;color:#ff8c00}
.svc-item{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px}
.svc-ic{font-size:28px;flex-shrink:0}.svc-i{flex:1}
.svc-n{font-weight:600;font-size:15px}.svc-d{font-size:12px;color:var(--mu);margin-top:2px}
.svc-btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;background:rgba(255,255,255,.07);border:1px solid var(--bdr);color:var(--mu)}

/* PROFILE MODAL */
.psav{width:88px;height:88px;border-radius:50%;margin:0 auto 14px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;border:3px solid rgba(74,156,248,.28)}
.psav.gr{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,215,0,.2)}
.psav img{width:100%;height:100%;object-fit:cover}
.psnm{text-align:center;font-family:"Syne",sans-serif;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px}
.pshl{text-align:center;color:var(--mu);font-size:13px;margin-top:3px}
.psbio{text-align:center;color:var(--t2);font-size:13px;margin-top:8px;padding:0 16px;line-height:1.5}
.psrl{display:inline-flex;margin:8px auto 0;padding:4px 14px;background:rgba(36,104,200,.14);border:1px solid var(--bdr);border-radius:20px;font-size:11px;font-weight:700;color:var(--b3)}
.psacts{display:flex;gap:8px;margin-top:14px}

.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.ulit{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:14px;cursor:pointer}
.ulit:active{background:var(--gl)}
.ulav{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;overflow:hidden}
.ulav img{width:100%;height:100%;object-fit:cover}
.ulnm{font-weight:600;font-size:14px;display:flex;align-items:center;gap:4px}
.ulhl{font-size:12px;color:var(--mu);margin-top:1px}
.adm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}

.adm-cn{font-family:"Syne",sans-serif;font-size:14px;font-weight:700;color:var(--b3)}
.adm-cd{font-size:12px;color:var(--mu);margin-top:3px}
.fwc{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:12px;cursor:pointer}
.fwc:active{background:var(--gl)}
.fwck{width:22px;height:22px;border-radius:50%;border:2px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.fwck.on{background:var(--b4);border-color:var(--b4)}

/* MODAL */
.mov{position:fixed;inset:0;z-index:200;background:rgba(2,8,24,.8);backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center}
.mov.hide{display:none}
.modal{width:100%;max-width:520px;background:rgba(6,16,36,.96);backdrop-filter:blur(40px);border:1px solid var(--bdr);border-radius:24px 24px 0 0;padding:16px 20px calc(20px+var(--sb));max-height:90vh;overflow-y:auto}
.mhdl{width:36px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;margin:0 auto 18px}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mtit{font-family:"Syne",sans-serif;font-size:17px;font-weight:700}
.mcls{width:32px;height:32px;border:none;background:rgba(255,255,255,.07);border-radius:10px;color:var(--t2);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mform{display:flex;flex-direction:column;gap:14px}
.minput{width:100%;padding:14px;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:14px;color:var(--tx);font-size:16px;outline:none;font-family:inherit}
.minput:focus{border-color:rgba(74,156,248,.38)}
.mlbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:5px}

/* NOTIFY */
.ntf{position:fixed;top:calc(16px+var(--st));left:50%;transform:translateX(-50%) translateY(-130%);z-index:500;background:rgba(5,14,34,.96);backdrop-filter:blur(24px);border:1px solid var(--bdr);border-radius:16px;padding:13px 20px;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:transform .32s cubic-bezier(.34,1.56,.64,1);max-width:90vw}
.ntf.show{transform:translateX(-50%) translateY(0)}

/* UTILS */
.g0{background:linear-gradient(135deg,#1e5fb8,#4a9cf8)}.g1{background:linear-gradient(135deg,#0f3460,#2468c8)}
.g2{background:linear-gradient(135deg,#1a237e,#3949ab)}.g3{background:linear-gradient(135deg,#004d40,#00897b)}
.g4{background:linear-gradient(135deg,#bf360c,#e64a19)}.g5{background:linear-gradient(135deg,#4a148c,#7b1fa2)}
.g6{background:linear-gradient(135deg,#1b5e20,#388e3c)}.g7{background:linear-gradient(135deg,#e65100,#f57c00)}

/* REPUTATION */
.rep-bar{display:flex;align-items:center;gap:10px;margin-top:12px;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:14px}
.rep-score{font-family:"Syne",sans-serif;font-size:22px;font-weight:800}
.rep-score.pos{color:#4dffb0}.rep-score.neg{color:#ff4d6d}.rep-score.zero{color:var(--mu)}
.rep-btns{display:flex;gap:8px;margin-left:auto}
.rep-btn{width:38px;height:38px;border:none;border-radius:12px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);border:1px solid var(--bdr)}
.rep-btn:active{transform:scale(.9)}
.rep-lbl{font-size:11px;color:var(--mu);margin-top:2px}
.status-bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(74,156,248,.1);border:1px solid var(--bdr);border-radius:20px;font-size:12px;color:var(--t2);margin-top:6px}
.top-row{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:14px;cursor:pointer}
.top-row:active{background:var(--gl)}
.top-rnk{width:28px;font-family:"Syne",sans-serif;font-weight:800;font-size:15px;color:var(--mu);text-align:center;flex-shrink:0}
.top-rnk.gd{color:var(--gold)}.top-rnk.sv{color:#aaa}.top-rnk.br{color:#cd7f32}
</style>

<script>
var me=null,chats=[],users={},activeChat=null,filt='all';
var rfT=null,hbT=null,sending=false,cmsgs=[],lastTs=0;
var replyTo=null,fwdId=null,selFwd=new Set();
var srchT=null;

async function api(m,p,b){
  try{
    var o={method:m,credentials:'include',headers:{'Content-Type':'application/json'}};
    if(b)o.body=JSON.stringify(b);
    var r=await fetch('/api'+p,o),d=await r.json();
    if(!r.ok)return{error:d.error||'Ошибка'};
    return d;
  }catch(e){return{error:'Нет соединения'};}
}

function esc(s){return s?(s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function gr(s){var h=0;for(var i=0;i<(s||'').length;i++)h=(h*31+s.charCodeAt(i))&0xff;return'g'+(h%8)}
function ft(ts){if(!ts)return'';var d=new Date(ts),n=new Date();if(d.toDateString()===n.toDateString())return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString('ru',{day:'numeric',month:'short'})}
function fm(t){if(!t)return'';var s=esc(t);s=s.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:var(--b3)">$1</a>');s=s.replace(/@(\w+)/g,'<strong style="color:var(--b3)">@$1</strong>');s=s.replace(/\n/g,'<br>');return s}
function isOn(u){if(!u)return false;if(u.privacy&&u.privacy.hide_online&&u.id!==me.id)return false;return!!(u.online&&Date.now()-u.last_seen<15000)}

function avH(u,sz,r){
  sz=sz||36;r=r||'50%';
  if(!u)return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(sz*.38|0)+'px" class="g0">?</div>';
  if(u.privacy&&u.privacy.hide_avatar&&u.id!==me.id)return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(sz*.38|0)+'px" class="'+gr(u.id)+'">?</div>';
  var extra=(u.premium&&(u.premium_features||{}).gold_ring)?'box-shadow:0 0 0 2px #ffd700':'';
  if(u.avatar)return'<img src="'+u.avatar+'" style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';object-fit:cover;'+extra+'">';
  return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:'+(sz*.38|0)+'px;'+extra+'" class="'+gr(u.id)+'">'+(u.nick||'?')[0].toUpperCase()+'</div>';
}
function vbdg(u){
  if(!u)return'';
  if(u.username==='bloody'||u.role==='creator')return'<span class="vbg" title="Создатель">&#x2713;</span>';
  if(u.premium)return'<span class="vgold" title="Flux Premium">&#x2713;</span>';
  return'';
}
function cvbdg(c){return c&&c.verified?'<span class="vbg">&#x2713;</span>':''}
function cName(c){if(c.type==='dm'){var o=users[c.members.find(function(m){return m!==me.id})];return o?o.nick:'Пользователь';}return c.name||''}
function cAv(c,sz,r){sz=sz||50;r=r||'16px';if(c.type==='dm'){var oid=c.members.find(function(m){return m!==me.id});return avH(users[oid],sz,'50%');}return'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+';display:flex;align-items:center;justify-content:center;font-size:'+(sz*.44|0)+'px" class="'+gr(c.id)+'">'+(c.icon||(c.name||'?')[0])+'</div>';}
function isCA(cid){var c=chats.find(function(x){return x.id===cid});if(!c)return false;return me.role==='creator'||me.role==='admin'||(c.admins&&c.admins.includes(me.id))||(c.creator_id===me.id);}
function rlbl(r){return{creator:'&#x1F451; Создатель',admin:'&#x1F6E1; Администратор',tester:'&#x1F9EA; Тестировщик',user:'&#x1F464; Пользователь'}[r]||'Пользователь'}

var _ntT=null;
function notify(ic,tx){
  document.getElementById('nic').textContent=ic;document.getElementById('ntx').textContent=tx;
  var el=document.getElementById('ntf');el.classList.add('show');
  clearTimeout(_ntT);_ntT=setTimeout(function(){el.classList.remove('show');},3000);
}

// AUTH
document.getElementById('tl').addEventListener('click',function(){this.classList.add('on');document.getElementById('tr').classList.remove('on');document.getElementById('fl').classList.add('show');document.getElementById('fr').classList.remove('show');});
document.getElementById('tr').addEventListener('click',function(){this.classList.add('on');document.getElementById('tl').classList.remove('on');document.getElementById('fr').classList.add('show');document.getElementById('fl').classList.remove('show');});

document.getElementById('lbtn').addEventListener('click',async function(){
  var email=document.getElementById('le').value.trim().toLowerCase();
  var pass=document.getElementById('lp').value;
  var err=document.getElementById('lerr');err.style.display='none';
  if(!email||!pass){err.textContent='Заполните поля';err.style.display='block';return;}
  this.disabled=true;this.textContent='Входим...';
  var res=await api('POST','/login',{email:email,password:pass});
  this.disabled=false;this.textContent='Войти \u26A1';
  if(res.error){err.textContent=res.error;err.style.display='block';return;}
  me=res.user;enterApp();
});
document.getElementById('rbtn').addEventListener('click',async function(){
  var email=document.getElementById('re').value.trim().toLowerCase();
  var nick=document.getElementById('rn').value.trim();
  var username=document.getElementById('ru').value.trim().toLowerCase();
  var pass=document.getElementById('rp').value;
  var err=document.getElementById('rerr');err.style.display='none';
  this.disabled=true;this.textContent='Создаём...';
  var res=await api('POST','/register',{email:email,nick:nick,username:username,password:pass});
  this.disabled=false;this.textContent='\uD83D\uDD25 Зарегистрировать Flux ID';
  if(res.error){err.textContent=res.error;err.style.display='block';return;}
  me=res.user;enterApp();
});

async function doLogout(){
  await api('POST','/logout');
  me=null;activeChat=null;chats=[];users={};
  clearInterval(rfT);clearInterval(hbT);
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').classList.add('hide');
  closeM();
}

async function enterApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').classList.remove('hide');
  // Claim daily bonus silently on login
  var bonus=await api('POST','/users/me/daily-bonus');
  renderMyAv();await loadAll();renderCList();startTimers();showView('chats');
  if(bonus.ok){
    notify('\uD83C\uDF81','Бонус: +'+bonus.coins_earned+' монет | \uD83D\uDD25 '+bonus.streak+' дней!');
  } else {
    notify('\u26A1','Добро пожаловать, '+me.nick+'!');
  }
}

async function loadAll(){
  var r1=await api('GET','/chats'),r2=await api('GET','/users');
  if(!r1.error)chats=r1;
  if(!r2.error){r2.forEach(function(u){users[u.id]=u;});}
  users[me.id]=me;
  // Update online count
  var stats=await api('GET','/stats/online');
  if(!stats.error&&document.getElementById('online-count')){
    document.getElementById('online-count').textContent=stats.online;
  }
}

function startTimers(){
  clearInterval(rfT);clearInterval(hbT);
  hbT=setInterval(function(){api('POST','/users/heartbeat');},8000);
  rfT=setInterval(async function(){await loadAll();renderCList(true);if(activeChat)await pollM();},2500);
}

function renderMyAv(){
  var el=document.getElementById('myav');
  el.innerHTML=avH(me,36,'50%');
  if(isOn(me))el.classList.add('on');else el.classList.remove('on');

function showView(v){

function renderCList(){
  renderMyAv();
  var q=(document.getElementById('sinp').value||'').trim().toLowerCase();
  var cs=chats.filter(function(c){return c.members&&c.members.includes(me.id)});
  if(filt!=='all')cs=cs.filter(function(c){return c.type===filt});
  if(q)cs=cs.filter(function(c){return cName(c).toLowerCase().includes(q)});
  cs.sort(function(a,b){return(b.member_pinned?1:0)-(a.member_pinned?1:0)});
  var el=document.getElementById('clist');
  if(!cs.length){el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--mu);font-size:14px">Нет чатов<br><span style="font-size:36px">\uD83D\uDCAC</span></div>';return;}
  el.innerHTML=cs.map(function(c){
    var nm=cName(c);
    var av=cAv(c,50,c.type==='dm'?'50%':'16px');
    var pin=c.member_pinned?'\uD83D\uDCCC ':'' ;
    var vb=c.type==='dm'?vbdg(users[c.members.find(function(m){return m!==me.id})]):cvbdg(c);
    return'<div class="ci'+(activeChat===c.id?' sel':'')+(c.member_pinned?' pinc':'')+'" data-id="'+c.id+'">'
      +'<div class="ciav'+(c.type==='dm'?' dm':'')+'">'+av+'</div>'
      +'<div class="cin"><div class="cin-nm">'+(pin?'<span>'+pin+'</span>':'')+esc(nm)+vb+'</div>'
      +'<div class="cin-sub">'+(c.username?'@'+c.username+' \u00B7 ':'')+c.members.length+' уч.</div></div></div>';
  }).join('');
  el.querySelectorAll('.ci').forEach(function(el){
    el.addEventListener('click',function(){openChat(this.dataset.id);});
    var t;
    el.addEventListener('touchstart',function(){t=setTimeout(function(){showChatCtx(el.dataset.id);},600);},{passive:true});
    el.addEventListener('touchend',function(){clearTimeout(t);},{passive:true});
  });
}

var srchInp=document.getElementById('srch-inp');
srchInp.addEventListener('input',function(){
  clearTimeout(srchT);

  document.getElementById('srch-clr').style.display=q?'flex':'none';
  if(!q){document.getElementById('srch-res').innerHTML='<div class="srch-empty"><div style="font-size:48px;margin-bottom:12px">\uD83D\uDD0D</div><div>Введи имя или @username</div></div>';return;}
  srchT=setTimeout(function(){doSearch(q);},300);
});
document.getElementById('srch-clr').addEventListener('click',function(){
  srchInp.value='';this.style.display='none';
  document.getElementById('srch-res').innerHTML='<div class="srch-empty"><div style="font-size:48px;margin-bottom:12px">\uD83D\uDD0D</div><div>Введи имя или @username</div></div>';
});

async function doSearch(q){
  var res=await api('GET','/search?q='+encodeURIComponent(q));
  if(res.error){document.getElementById('srch-res').innerHTML='<div class="srch-empty">Ошибка</div>';return;}
  var html='';
  if(res.users&&res.users.length){
    html+='<div class="srch-sec">\uD83D\uDC64 Люди</div>';
    html+=res.users.map(function(u){
      var on=isOn(u);
      return'<div class="ulit" data-uid="'+u.id+'">'
        +'<div class="ulav">'+avH(u,44,'50%')+'</div>'
        +'<div><div class="ulnm">'+esc(u.nick)+vbdg(u)+'</div>'
        +'<div class="ulhl">@'+u.username+(u.bio?' \u00B7 '+esc(u.bio.substring(0,35)):'')+' \u00B7 '+(on?'\uD83D\uDFE2 В сети':'Оффлайн')+'</div></div>'
        +'</div>';
    }).join('');
  }
  if(res.chats&&res.chats.length){
    html+='<div class="srch-sec">\uD83D\uDCAC Каналы и группы</div>';
    html+=res.chats.map(function(c){
      var vb=c.verified?'<span class="vbg">\u2713</span>':'';
      return'<div class="ulit" data-cid="'+c.id+'">'
        +'<div class="ulav" style="border-radius:12px">'+cAv(c,44,'12px')+'</div>'
        +'<div><div class="ulnm">'+esc(c.name||'')+vb+'</div>'
        +'<div class="ulhl">'+(c.username?'@'+c.username+' \u00B7 ':'')+c.type+'</div></div>'
        +'</div>';
    }).join('');
  }
  if(!html)html='<div class="srch-empty"><div style="font-size:48px;margin-bottom:12px">\uD83D\uDE14</div><div>Ничего не найдено</div></div>';
  var wrap=document.getElementById('srch-res');
  wrap.innerHTML=html;
  wrap.querySelectorAll('.ulit[data-uid]').forEach(function(el){el.addEventListener('click',function(){showUP(this.dataset.uid);});});
  wrap.querySelectorAll('.ulit[data-cid]').forEach(function(el){
    el.addEventListener('click',async function(){
      var cid=this.dataset.cid;
      var ex=chats.find(function(c){return c.id===cid});
      if(ex){showView('chats');openChat(cid);}
      else notify('\u2139\uFE0F','Попросите создателя добавить вас');
    });
  });
}

async function openChat(cid){
  var c=chats.find(function(x){return x.id===cid});if(!c)return;
  activeChat=cid;cmsgs=[];lastTs=0;replyTo=null;
  showView('chat');
  var av=document.getElementById('chav');
  if(c.type==='dm'){
    var oid=c.members.find(function(m){return m!==me.id});
    var o=users[oid];
    av.className='chav dm';av.innerHTML=avH(o,36,'50%');
    document.getElementById('chn').innerHTML=esc(o?o.nick:'?')+vbdg(o);
    var on=isOn(o);
    document.getElementById('chs').innerHTML='<span class="dot '+(on?'on':'off')+'" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle"></span>'+(on?'В сети':'Не в сети');
  }else{
    av.className='chav';av.innerHTML=cAv(c,36,'12px');
    document.getElementById('chn').innerHTML=(c.type==='channel'?'\uD83D\uDCE2 ':'')+esc(c.name)+cvbdg(c);
    document.getElementById('chs').textContent=(c.username?'@'+c.username+' \u00B7 ':'')+c.members.length+' участников';
  }
  var canA=isCA(cid);
  document.getElementById('admBtn').style.display=canA?'flex':'none';
  var canW=c.type!=='channel'||canA;
  document.getElementById('wwrap').style.display=canW?'block':'none';
  document.getElementById('rowrap').style.display=canW?'none':'block';
  renderCList(true);await loadM();
}

document.getElementById('backBtn').addEventListener('click',function(){
  activeChat=null;cmsgs=[];lastTs=0;clearReply();showView('chats');renderCList();
});

async function loadM(){
  if(!activeChat)return;
  var res=await api('GET','/chats/'+activeChat+'/messages?since=0');
  if(res.error)return;
  cmsgs=res;if(res.length)lastTs=res[res.length-1].timestamp;
  renderM();updatePBan();
}
async function pollM(){
  if(!activeChat)return;
  var res=await api('GET','/chats/'+activeChat+'/messages?since=0');
  if(res.error)return;
  if(res.length!==cmsgs.length){cmsgs=res;if(res.length)lastTs=res[res.length-1].timestamp;renderM();updatePBan();}
}
function updatePBan(){
  var pin=cmsgs.find(function(m){return m.pinned&&!m.system});
  var ban=document.getElementById('pban');
  if(pin){document.getElementById('pban-txt').textContent=pin.text||'Сообщение';ban.classList.add('show');ban.onclick=function(){var el=document.querySelector('[data-mid="'+pin.id+'"]');if(el)el.scrollIntoView({behavior:'smooth'});};}
  else ban.classList.remove('show');
}

var EMJS=['\u2764\uFE0F','\uD83D\uDE02','\uD83D\uDC4D','\uD83D\uDD25','\uD83D\uDE2E','\uD83D\uDE22','\uD83D\uDC4F','\uD83C\uDF89'];

function renderM(){
  var area=document.getElementById('msgs');
  var atB=area.scrollHeight-area.scrollTop-area.clientHeight<100;
  var h='',ld='';
  cmsgs.forEach(function(m){
    var d=new Date(m.timestamp);
    var ds=d.toLocaleDateString('ru',{day:'numeric',month:'long'});
    if(ds!==ld){h+='<div class="dsep">'+ds+'</div>';ld=ds;}
    if(m.system){h+='<div class="smsg">'+esc(m.text)+'</div>';return;}
    var own=m.sender_id===me.id;
    var sdr=users[m.sender_id]||{id:m.sender_id,nick:m.sender_nick||'?',avatar:null};
    var c=chats.find(function(x){return x.id===activeChat});
    var showSdr=!own&&c&&c.type!=='dm';
    var isPrem=own&&me.premium&&(me.premium_features||{}).gold_bubbles;
    var repH='';
    if(m.reply_to_msg)repH='<div class="rp" data-scroll="'+m.reply_to+'"><div class="rp-n">'+esc(m.reply_to_msg.sender_nick||'?')+'</div><div class="rp-t">'+esc((m.reply_to_msg.text||'').substring(0,80))+'</div></div>';
    var fwdH=m.forwarded_from?'<div class="fwd-l">\u21AA\uFE0F Переслано от '+esc(m.forwarded_from)+'</div>':'';
    var rxH='';
    if(m.reactions&&m.reactions.length)rxH='<div class="rxbar">'+m.reactions.map(function(r){return'<div class="rx'+(m.my_reaction===r.emoji?' mine':'')+'" data-mid="'+m.id+'" data-em="'+r.emoji+'">'+r.emoji+'<span>'+r.cnt+'</span></div>';}).join('')+'</div>';
    var actH='<div class="mac-w">'
      +'<button class="mac rx-btn" data-mid="'+m.id+'">\uD83D\uDE0A</button>'
      +'<button class="mac rp-btn" data-mid="'+m.id+'" data-nick="'+esc(m.sender_nick||'?')+'" data-txt="'+esc((m.text||'').substring(0,80))+'">\u21A9\uFE0F</button>'
      +'<button class="mac fw-btn" data-mid="'+m.id+'">\u21AA\uFE0F</button>'
      +'<button class="mac sv-btn" data-mid="'+m.id+'">\uD83D\uDD16</button>'
      +(own||isCA(activeChat)?'<button class="mac dl-btn" data-mid="'+m.id+'">\uD83D\uDDD1\uFE0F</button>':'')
      +(isCA(activeChat)?'<button class="mac pn-btn" data-mid="'+m.id+'" data-p="'+(m.pinned?'1':'0')+'">\uD83D\uDCCC</button>':'')
      +'</div>';
    h+='<div class="mrow'+(own?' own':'')+(isPrem?' gbub':'')+'" data-mid="'+m.id+'">'
      +actH
      +(!own?'<div class="mav" data-uid="'+m.sender_id+'">'+avH(sdr,28,'50%')+'</div>':'')
      +'<div class="mbub"'+(own&&me.msg_color?' style="background:'+me.msg_color+';opacity:.92"':'')+'>'
      +(showSdr?'<div class="msdr">'+esc(sdr.nick)+vbdg(sdr)+'</div>':'')
      +(m.pinned?'<div style="font-size:10px;color:var(--b3);margin-bottom:4px">\uD83D\uDCCC</div>':'')
      +repH+fwdH
      +(m.text?'<div>'+fm(m.text)+'</div>':'')
      +rxH
      +'<div class="mtime">'+ft(m.timestamp)+'</div>'
      +'</div>'
      +(own?'<div class="mav">'+avH(me,28,'50%')+'</div>':'')
      +'</div>';
  });
  area.innerHTML=h||'<div style="text-align:center;padding:60px 20px;color:var(--mu);font-size:14px">Нет сообщений<br><span style="font-size:36px">\uD83D\uDC4B</span></div>';
  area.querySelectorAll('.mav[data-uid]').forEach(function(el){el.style.cursor='pointer';el.addEventListener('click',function(){showUP(this.dataset.uid);});});
  area.querySelectorAll('.rx-btn').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();showEP(this.dataset.mid,this);});});
  area.querySelectorAll('.rp-btn').forEach(function(el){el.addEventListener('click',function(){setReply(this.dataset.mid,this.dataset.nick,this.dataset.txt);});});
  area.querySelectorAll('.fw-btn').forEach(function(el){el.addEventListener('click',function(){showFwd(this.dataset.mid);});});
  area.querySelectorAll('.sv-btn').forEach(function(el){el.addEventListener('click',async function(){var res=await api('POST','/messages/'+this.dataset.mid+'/save');if(!res.error)notify('\uD83D\uDD16','Сохранено!');else notify('\u274C',res.error);});});
  area.querySelectorAll('.dl-btn').forEach(function(el){el.addEventListener('click',async function(){if(!confirm('Удалить?'))return;await api('POST','/messages/'+this.dataset.mid+'/delete');await loadM();});});
  area.querySelectorAll('.pn-btn').forEach(function(el){el.addEventListener('click',async function(){var p=this.dataset.p==='1';await api('POST','/messages/'+this.dataset.mid+'/pin',{pinned:!p});await loadM();notify('\u2705',p?'Откреплено':'Закреплено');});});
  area.querySelectorAll('.rx').forEach(function(el){el.addEventListener('click',async function(){await api('POST','/messages/'+this.dataset.mid+'/react',{emoji:this.dataset.em});await pollM();});});
  area.querySelectorAll('.rp').forEach(function(el){el.addEventListener('click',function(){var t=document.querySelector('[data-mid="'+this.dataset.scroll+'"]');if(t)t.scrollIntoView({behavior:'smooth'});});});
  if(atB||cmsgs.length===0)area.scrollTop=area.scrollHeight;
}

function setReply(mid,nick,txt){
  replyTo={id:mid,nick:nick,txt:txt};
  document.getElementById('rbn').textContent=nick;
  document.getElementById('rbt').textContent=txt;
  document.getElementById('rbar').classList.add('show');
  document.getElementById('minp').focus();
}
function clearReply(){replyTo=null;document.getElementById('rbar').classList.remove('show');}
document.getElementById('rbar-close').addEventListener('click',clearReply);

function showFwd(mid){
  fwdId=mid;selFwd.clear();
  var myChats=chats.filter(function(c){return c.members&&c.members.includes(me.id)});
  var h='<div class="mhdr"><div class="mtit">\u21AA\uFE0F Переслать</div><button class="mcls" id="fwdc">&#x2715;</button></div>'
    +'<div style="color:var(--t2);font-size:13px;margin-bottom:12px">Выбери чаты:</div>'
    +myChats.map(function(c){return'<div class="fwc" data-cid="'+c.id+'"><div class="fwck" data-cid="'+c.id+'"></div><div style="width:36px;height:36px;border-radius:'+(c.type==='dm'?'50%':'10px')+';overflow:hidden;flex-shrink:0">'+cAv(c,36,c.type==='dm'?'50%':'10px')+'</div><div style="font-size:14px;font-weight:600">'+esc(cName(c))+'</div></div>';}).join('')
    +'<button class="btn" id="fwd-ok" style="margin-top:14px">\u21AA\uFE0F Переслать</button>';
  showM(h);
  document.getElementById('fwdc').addEventListener('click',closeM);
  document.querySelectorAll('.fwc').forEach(function(el){
    el.addEventListener('click',function(){
      var cid=this.dataset.cid;var chk=this.querySelector('.fwck');
      if(selFwd.has(cid)){selFwd.delete(cid);chk.classList.remove('on');chk.textContent='';}
      else{selFwd.add(cid);chk.classList.add('on');chk.textContent='\u2713';}
    });
  });
  document.getElementById('fwd-ok').addEventListener('click',async function(){
    if(!selFwd.size){notify('\u274C','Выбери чат');return;}
    var res=await api('POST','/messages/'+fwdId+'/forward',{chat_ids:Array.from(selFwd)});
    if(res.error){notify('\u274C',res.error);return;}
    closeM();notify('\u2705','Переслано в '+res.forwarded_to.length+' чат(ов)');
  });
}

function showEP(mid,btn){
  document.querySelectorAll('.ep-pop').forEach(function(el){el.remove();});
  var picker=document.createElement('div');
  picker.className='ep-pop';
  picker.style.cssText='position:fixed;background:rgba(5,14,34,.98);border:1px solid var(--bdr);border-radius:12px;padding:6px;display:flex;flex-wrap:wrap;gap:4px;z-index:300;max-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.5)';
  var rect=btn.getBoundingClientRect();
  picker.style.bottom=(window.innerHeight-rect.top+8)+'px';
  picker.style.left=Math.min(rect.left,window.innerWidth-240)+'px';
  EMJS.forEach(function(em){
    var b=document.createElement('button');
    b.style.cssText='background:none;border:none;font-size:24px;padding:5px;cursor:pointer;border-radius:8px;';
    b.textContent=em;
    b.addEventListener('click',async function(){picker.remove();await api('POST','/messages/'+mid+'/react',{emoji:em});await pollM();});
    picker.appendChild(b);
  });
  document.body.appendChild(picker);
  setTimeout(function(){document.addEventListener('click',function rm(){picker.remove();document.removeEventListener('click',rm);});},100);
}

document.getElementById('sendBtn').addEventListener('click',sendMsg);
document.getElementById('minp').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
document.getElementById('minp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
document.querySelectorAll('.eBtn').forEach(function(b){b.addEventListener('click',function(){var i=document.getElementById('minp');i.value+=this.dataset.e;i.focus();});});

async function sendMsg(){
  var inp=document.getElementById('minp');
  var text=inp.value.trim();
  if(!text||!activeChat||sending)return;
  sending=true;
  var body={text:text};
  if(replyTo)body.reply_to=replyTo.id;
  var res=await api('POST','/chats/'+activeChat+'/messages',body);
  sending=false;inp.value='';inp.style.height='auto';clearReply();
  if(res.error){notify('\u274C',res.error);return;}
  if(res.command){
    notify('\u2705','Команда выполнена');
    await loadAll();await loadM();renderCList(true);
    if(res.deleted_chat){activeChat=null;showView('chats');renderCList();}
    return;
  }
  cmsgs.push(res);lastTs=res.timestamp;renderM();
}

function showTransfer(){
  showM('<div class="mhdr"><div class="mtit">\uD83D\uDCB8 Перевод монет</div><button class="mcls" id="trc">&#x2715;</button></div>'
    +'<div class="mform">'

    +'<button class="btn" id="tr-ok">\uD83D\uDCB8 Перевести</button>'
    +'</div>');

  document.getElementById('tr-ok').addEventListener('click',async function(){
    var uname=document.getElementById('tr-u').value.trim().replace(/^@/,'');
    var amount=parseInt(document.getElementById('tr-a').value);
    var note=document.getElementById('tr-n').value.trim();
    if(!uname){notify('\u274C','Укажи получателя');return;}
    if(!amount||amount<1){notify('\u274C','Укажи количество');return;}
    if(amount>(me.flux_coins||0)){notify('\u274C','Недостаточно монет');return;}
    var res=await api('POST','/users/me/transfer-coins',{username:uname,amount:amount,note:note});
    if(res.error){notify('\u274C',res.error);return;}
    me=Object.assign(me,res.user);
    closeM();renderSett();notify('\uD83E\uDE99',res.message||'Переведено!');
  });
}

      +'<div style="flex:1"><div class="ulnm">'+esc(u.nick)+vbdg(u)+'</div>'
      +'<div class="ulhl">@'+u.username+'</div></div>'
      +'<div class="rep-score '+sc+'">'+(rep>0?'+':'')+rep+'</div></div>';
  }).join('');
  showM(h);
  document.getElementById('trc').addEventListener('click',closeM);
  document.querySelectorAll('.top-row[data-uid]').forEach(function(el){
    el.addEventListener('click',function(){closeM();showUP(this.dataset.uid);});
  });
}
function showSetStatus() {
  var cur=me.status_text||'';
  var presets=[
    '\uD83D\uDE0A \u0425\u043E\u0440\u043E\u0448\u0435\u0435 \u043D\u0430\u0441\u0442\u0440\u043E\u0435\u043D\u0438\u0435',
    '\uD83D\uDCBC \u041D\u0430 \u0440\u0430\u0431\u043E\u0442\u0435',
    '\uD83C\uDFE0 \u0414\u043E\u043C\u0430',
    '\uD83D\uDE34 \u0421\u043F\u043B\u044E',
    '\uD83D\uDD15 \u041D\u0435 \u0431\u0435\u0441\u043F\u043E\u043A\u043E\u0438\u0442\u044C',
    '\u26D4 \u041D\u0435\u0434\u043E\u0441\u0442\u0443\u043F\u0435\u043D'
  ];
  var h='<div class="mhdr"><div class="mtit">\uD83D\uDFE2 \u0421\u0442\u0430\u0442\u0443\u0441</div><button class="mcls" id="ssc">\u2715</button></div>'
    +'<div class="mform">'
    +'<div><div class="mlbl">\u0422\u0435\u043A\u0441\u0442 \u0441\u0442\u0430\u0442\u0443\u0441\u0430 (\u0434\u043E 50 \u0441\u0438\u043C\u0432\u043E\u043B\u043E\u0432)</div>'
    +'<input class="minput" id="st-i" value="'+esc(cur)+'" maxlength="50" placeholder="\u0427\u0442\u043E \u0441\u0435\u0439\u0447\u0430\u0441 \u0434\u0435\u043B\u0430\u0435\u0448\u044C..."></div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:6px">'
    +presets.map(function(s,i){return '<button class="btn sec" style="padding:7px 11px;font-size:12px;width:auto" data-si="'+i+'">'+s+'</button>';}).join('')
    +'</div>'
    +'<button class="btn" id="st-ok">\u0421\u043E\u0445\u0440\u0430\u043D\u0438\u0442\u044C</button>'
    +'<button class="btn sec" id="st-cl">\u0423\u0434\u0430\u043B\u0438\u0442\u044C \u0441\u0442\u0430\u0442\u0443\u0441</button>'
    +'</div>';
  showM(h);
  document.getElementById('ssc').addEventListener('click',closeM);
  presets.forEach(function(s,i){
    var el=document.querySelector('[data-si="'+i+'"]');
    if(el)el.addEventListener('click',function(){document.getElementById('st-i').value=s;});
  });
  document.getElementById('st-ok').addEventListener('click',async function(){
    var st=document.getElementById('st-i').value.trim();
    var res=await api('POST','/users/me/status',{status:st});
    if(res.error){notify('\u274C',res.error);return;}
    me.status_text=res.status_text;closeM();renderSett();notify('\u2705','\u0421\u0442\u0430\u0442\u0443\u0441 \u043E\u0431\u043D\u043E\u0432\u043B\u0451\u043D!');
  });
  document.getElementById('st-cl').addEventListener('click',async function(){
    var res=await api('POST','/users/me/status',{status:''});
    if(!res.error){me.status_text='';closeM();renderSett();notify('\u2705','\u0423\u0434\u0430\u043B\u0451\u043D');}
  });
}
function showSetMsgColor() {
  var cur=me.msg_color||'';
  var colors=['#4a9cf8','#ff6b6b','#ffa94d','#ffd43b','#69db7c','#da77f2','#f783ac','#a9e34b','#ff8cc8','#74c0fc'];
  var h='<div class="mhdr"><div class="mtit">\uD83C\uDFA8 \u0426\u0432\u0435\u0442 \u0441\u043E\u043E\u0431\u0449\u0435\u043D\u0438\u0439</div><button class="mcls" id="cmc2">\u2715</button></div>'
    +'<div class="mform">'
    +'<p style="color:var(--t2);font-size:13px">\u0422\u0432\u043E\u0438 \u0441\u043E\u043E\u0431\u0449\u0435\u043D\u0438\u044F \u0432 \u0432\u044B\u0431\u0440\u0430\u043D\u043D\u043E\u043C \u0446\u0432\u0435\u0442\u0435</p>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0" id="cpicks">'
    +colors.map(function(c){return '<div data-c="'+c+'" style="width:38px;height:38px;border-radius:12px;background:'+c+';cursor:pointer;border:3px solid '+(cur===c?'#fff':'transparent')+'"></div>';}).join('')
    +'</div>'
    +'<div><div class="mlbl">HEX (#RRGGBB)</div><input class="minput" id="mc-i" value="'+esc(cur)+'" placeholder="#4a9cf8" maxlength="7"></div>'
    +'<button class="btn" id="mc-ok">\u0421\u043E\u0445\u0440\u0430\u043D\u0438\u0442\u044C</button>'
    +'<button class="btn sec" id="mc-cl">\u0421\u0431\u0440\u043E\u0441\u0438\u0442\u044C</button>'
    +'</div>';
  showM(h);
  document.getElementById('cmc2').addEventListener('click',closeM);
  document.querySelectorAll('#cpicks div[data-c]').forEach(function(el){
    el.addEventListener('click',function(){
      document.getElementById('mc-i').value=this.dataset.c;
      document.querySelectorAll('#cpicks div[data-c]').forEach(function(d){d.style.borderColor='transparent';});
      this.style.borderColor='#fff';
    });
  });
  document.getElementById('mc-ok').addEventListener('click',async function(){
    var color=document.getElementById('mc-i').value.trim();
    var res=await api('POST','/users/me/msg-color',{color:color});
    if(res.error){notify('\u274C',res.error);return;}
    me.msg_color=res.msg_color;closeM();renderSett();notify('\u2705','\u0426\u0432\u0435\u0442 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D!');
  });
  document.getElementById('mc-cl').addEventListener('click',async function(){
    var res=await api('POST','/users/me/msg-color',{color:''});
    if(!res.error){me.msg_color='';closeM();renderSett();notify('\u2705','\u0421\u0431\u0440\u043E\u0448\u0435\u043D');}
  });
}
// BOOT with splash
async function boot(){
  setTimeout(async function(){
    document.getElementById('splash').classList.add('gone');
    var res=await api('GET','/me');
    if(!res.error){
      me=res.user||res;
      document.getElementById('auth').style.display='none';
      document.getElementById('app').classList.remove('hide');
      renderMyAv();await loadAll();renderCList();startTimers();showView('chats');
      // Daily bonus on startup
      var bonus=await api('POST','/users/me/daily-bonus');
      if(bonus.ok)notify('\uD83C\uDF81','Бонус: +'+bonus.coins_earned+' монет \uD83D\uDD25 '+bonus.streak+' дней!');
      else notify('\u26A1','Добро пожаловать, '+me.nick+'!');
    }else{
      document.getElementById('auth').style.display='flex';
    }
  },2600);
}

window.addEventListener('load',boot);
window.addEventListener('beforeunload',function(){api('POST','/logout');});
</script>
